<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mesero">
<meta name="theme-color" content="#0d0a1a">
<link rel="manifest" href="/manifest-mesero.json">
<title>Mesero · La Curva</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --p1:#7c3aed;--p2:#4f46e5;--a1:#f97316;--a2:#fb923c;
  --g1:#10b981;--r1:#ef4444;--amber:#f59e0b;
  --gb:rgba(255,255,255,0.06);--gbd:rgba(255,255,255,0.12);
  --text:#f1f0ff;--text2:rgba(241,240,255,0.65);--text3:rgba(241,240,255,0.35);
  --blur:blur(20px);--rad:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0a1a;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased}
.blobs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.35}
.b1{width:420px;height:420px;background:#7c3aed;top:-120px;left:-80px}
.b2{width:320px;height:320px;background:#f97316;bottom:-100px;right:-80px}
.b3{width:260px;height:260px;background:#10b981;top:45%;left:55%;opacity:.18}
*{position:relative;z-index:1}

/* ── PANTALLAS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;transition:opacity .25s,transform .25s}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(20px)}

/* ══ LOGIN ══ */
#scrLogin{align-items:center;justify-content:center;padding:24px;gap:20px}
.login-logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--p1),var(--p2));display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 32px rgba(124,58,237,.5)}
.login-title{font-size:26px;font-weight:900;text-align:center;letter-spacing:-.02em}
.login-title span{background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:13px;color:var(--text3);text-align:center}
.login-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:380px}
.mesero-btn{padding:16px 12px;border-radius:16px;background:var(--gb);border:1.5px solid var(--gbd);color:var(--text);font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.mesero-btn:active{transform:scale(.93);background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4)}
.mesero-btn.sel{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.6);box-shadow:0 0 20px rgba(124,58,237,.25)}
.mesero-btn-ico{font-size:26px}
.login-err{font-size:12px;color:#fca5a5;text-align:center;min-height:18px}

/* ══ TOPBAR ══ */
.topbar{flex-shrink:0;height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;background:rgba(13,10,26,.9);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--gbd)}
.tb-back{width:36px;height:36px;border-radius:10px;background:var(--gb);border:1px solid var(--gbd);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;transition:all .15s}
.tb-back:active{transform:scale(.88)}
.tb-info{flex:1;min-width:0}
.tb-title{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:10px;color:var(--text3);font-weight:600;margin-top:1px}
.tb-badge{flex-shrink:0;font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:#c4b5fd}

/* ══ SELECTOR DE MESAS ══ */
#scrMesas .zona-scroll{flex:1;overflow-y:auto;padding:12px}
#scrMesas .zona-scroll::-webkit-scrollbar{width:3px}
.mesas-section-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);padding:4px 2px 8px}
.mesas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}

/* Tarjeta de mesa */
.mesa-card{aspect-ratio:1;border-radius:16px;background:var(--gb);border:2px solid var(--gbd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.mesa-card:active{transform:scale(.91)}
.mesa-card.libre{border-color:rgba(255,255,255,.1)}
.mesa-card.libre:active{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.4)}
.mesa-card.ocupada{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.35)}
.mesa-card.en_preparacion{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.35)}
.mesa-card.listo{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.4);animation:mesaPulse 1.5s ease infinite}
.mesa-card.servido{background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.3)}
.mesa-card.mesero,.mesa-card.cuenta{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.4);animation:mesaPulse 1s ease infinite}
.mesa-card.bloqueada{background:rgba(124,58,237,.06);border-color:rgba(124,58,237,.25);cursor:not-allowed;opacity:.7}
@keyframes mesaPulse{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.3)}50%{box-shadow:0 0 0 8px rgba(124,58,237,0)}}
.mesa-num{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;line-height:1}
.mesa-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
.mesa-card.ocupada .mesa-label{color:#fca5a5}
.mesa-card.en_preparacion .mesa-label{color:#fcd34d}
.mesa-card.listo .mesa-label{color:#6ee7b7}
.mesa-card.mesero .mesa-label,.mesa-card.cuenta .mesa-label{color:#d8b4fe}
.mesa-mesero{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:8px;font-weight:700;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
.mesa-led{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%}
.mesa-card.libre .mesa-led{background:rgba(255,255,255,.2)}
.mesa-card.ocupada .mesa-led{background:#ef4444;box-shadow:0 0 6px #ef4444}
.mesa-card.en_preparacion .mesa-led{background:#f59e0b;box-shadow:0 0 6px #f59e0b}
.mesa-card.listo .mesa-led{background:#10b981;box-shadow:0 0 8px #10b981}
.mesa-card.mesero .mesa-led,.mesa-card.cuenta .mesa-led{background:#a855f7;box-shadow:0 0 8px #a855f7}
.mesa-card.bloqueada .mesa-led{background:#7c3aed;box-shadow:0 0 6px #7c3aed}

/* Sin CHARR */
.sin-charr{grid-column:1/-1;padding:20px;text-align:center;font-size:12px;color:var(--text3);border:1px dashed rgba(124,58,237,.2);border-radius:14px;line-height:1.7}

/* ══ VISTA PEDIDO ══ */
#scrPedido{flex-direction:column}
.pedido-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

/* Panel activos */
.activos-strip{flex-shrink:0;background:rgba(16,185,129,.06);border-bottom:1px solid rgba(16,185,129,.15);max-height:120px;overflow-y:auto}
.activos-strip::-webkit-scrollbar{width:2px}
.activo-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.activo-row:last-child{border-bottom:none}
.activo-num{font-family:'JetBrains Mono',monospace;font-size:12px;color:#c4b5fd;font-weight:700;flex-shrink:0}
.activo-items{flex:1;font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.activo-est{font-size:9px;font-weight:800;padding:2px 7px;border-radius:6px;flex-shrink:0}
.est-confirmado{background:rgba(59,130,246,.15);color:#93c5fd}
.est-preparando{background:rgba(245,158,11,.15);color:#fcd34d}
.est-listo{background:rgba(16,185,129,.2);color:#6ee7b7;animation:mesaPulse 1.2s ease infinite}
.activos-empty{padding:10px 14px;font-size:11px;color:var(--text3)}

/* Categorías */
.cats-wrap{flex-shrink:0;padding:8px 0 0;border-bottom:1px solid var(--gbd)}
.cats-scroll{display:flex;gap:7px;padding:0 12px 8px;overflow-x:auto}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;background:var(--gb);border:1px solid var(--gbd);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-pill.on{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.5);color:#c4b5fd}

/* Búsqueda */
.search-wrap{flex-shrink:0;padding:8px 12px;display:flex;gap:8px;align-items:center}
.search-input{flex:1;background:var(--gb);border:1px solid var(--gbd);border-radius:12px;padding:9px 14px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.search-input::placeholder{color:var(--text3)}
.search-clear{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--gbd);color:var(--text3);font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}

/* Productos */
.prods-scroll{flex:1;overflow-y:auto;padding:6px 10px 90px}
.prods-scroll::-webkit-scrollbar{width:3px}
.prods-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px}
.cat-header{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);padding:10px 4px 6px}
.prod-row{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:14px;background:var(--gb);border:1px solid var(--gbd);margin-bottom:7px;transition:all .15s;cursor:pointer}
.prod-row.en-carrito{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.35)}
.prod-emoji{font-size:28px;flex-shrink:0;width:44px;text-align:center;line-height:1}
.prod-info{flex:1;min-width:0;cursor:pointer}
.prod-nombre{font-size:13px;font-weight:800;line-height:1.3}
.prod-desc{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-precio{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#c4b5fd;flex-shrink:0}
.prod-add{width:32px;height:32px;border-radius:10px;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);color:#c4b5fd;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:inherit}
.prod-add:active{transform:scale(.85);background:rgba(124,58,237,.4)}
.qty-ctrl{display:flex;align-items:center;gap:1px;flex-shrink:0}
.qty-btn{width:30px;height:30px;border-radius:9px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:#c4b5fd;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:inherit}
.qty-btn:active{transform:scale(.82);background:rgba(124,58,237,.35)}
.qty-num{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#c4b5fd;min-width:24px;text-align:center}
.empty-search{grid-column:1/-1;text-align:center;padding:32px;font-size:13px;color:var(--text3)}

/* CART BAR */
.cart-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:12px 16px;background:rgba(13,10,26,.97);border-top:1px solid rgba(124,58,237,.25);backdrop-filter:var(--blur);display:none}
.cart-bar-inner{display:flex;align-items:center;gap:10px;padding:14px 18px;background:linear-gradient(135deg,rgba(124,58,237,.25),rgba(79,70,229,.2));border:1.5px solid rgba(124,58,237,.4);border-radius:16px;cursor:pointer;transition:all .15s}
.cart-bar-inner:active{transform:scale(.97)}
.cart-badge{width:28px;height:28px;border-radius:50%;background:var(--p1);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.cart-label{flex:1;font-size:14px;font-weight:800}
.cart-total{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#c4b5fd}

/* ══ MODAL CARRITO ══ */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{width:100%;background:#0d0a1a;border-top:1px solid var(--gbd);border-radius:24px 24px 0 0;padding:0 0 env(safe-area-inset-bottom);max-height:90vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,.68,0,1.2)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.15);margin:12px auto 0}
.modal-head{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gbd)}
.modal-title{font-size:18px;font-weight:900}
.modal-close{width:32px;height:32px;border-radius:10px;background:var(--gb);border:1px solid var(--gbd);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-items{flex:1;overflow-y:auto;padding:12px 16px}
.modal-items::-webkit-scrollbar{width:2px}
.cart-item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.cart-item-row:last-child{border-bottom:none}
.ci-emoji{font-size:24px;flex-shrink:0;width:36px;text-align:center}
.ci-info{flex:1;min-width:0}
.ci-nombre{font-size:13px;font-weight:800}
.ci-precio{font-family:'JetBrains Mono',monospace;font-size:13px;color:#c4b5fd;flex-shrink:0}

/* Notas rápidas */
.notas-section{padding:10px 16px;border-top:1px solid var(--gbd)}
.notas-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.chips-notas{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip-nota{padding:5px 11px;border-radius:20px;background:var(--gb);border:1px solid var(--gbd);font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;flex-shrink:0}
.chip-nota.on{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.5);color:#c4b5fd}
.notas-input{width:100%;background:var(--gb);border:1px solid var(--gbd);border-radius:12px;padding:9px 12px;color:var(--text);font-size:12px;font-family:inherit;outline:none;resize:none}
.notas-input::placeholder{color:var(--text3)}

.modal-footer{padding:14px 16px;border-top:1px solid var(--gbd);display:flex;flex-direction:column;gap:8px}
.modal-total-row{display:flex;justify-content:space-between;align-items:center;padding:0 2px}
.modal-total-label{font-size:13px;font-weight:700;color:var(--text2)}
.modal-total-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#c4b5fd}
.btn-enviar{width:100%;padding:16px;border-radius:16px;background:linear-gradient(135deg,var(--p1),var(--p2));border:none;color:white;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:0 6px 24px rgba(124,58,237,.4)}
.btn-enviar:active{transform:scale(.96);filter:brightness(.9)}
.btn-enviar:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-cuenta{width:100%;padding:12px;border-radius:14px;background:rgba(168,85,247,.1);border:1.5px solid rgba(168,85,247,.3);color:#d8b4fe;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit}

/* ══ OVERLAY ÉXITO ══ */
.exito-overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(7,7,20,.97);opacity:0;pointer-events:none;transition:opacity .3s;text-align:center;padding:32px}
.exito-overlay.show{opacity:1;pointer-events:all}
.exito-ico{font-size:64px;animation:bounceIn .5s cubic-bezier(.22,.68,0,1.5) both}
@keyframes bounceIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.exito-title{font-size:24px;font-weight:900}
.exito-sub{font-size:14px;color:var(--text2)}
.btn-volver{padding:14px 32px;border-radius:16px;background:linear-gradient(135deg,var(--p1),var(--p2));border:none;color:white;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px}

/* NOTIF */
.notif-bar{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:500;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;background:rgba(13,10,26,.97);border:1px solid rgba(124,58,237,.35);color:#c4b5fd;box-shadow:0 6px 24px rgba(0,0,0,.5);backdrop-filter:var(--blur);opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.notif-bar.show{opacity:1}

/* PWA */
#pwaBtn{display:none;position:fixed;bottom:20px;right:16px;z-index:900;padding:10px 16px;border-radius:50px;background:linear-gradient(135deg,var(--p1),var(--p2));border:none;color:white;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(124,58,237,.5)}
</style>
</head>
<body>
<div class="blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>

<!-- ══ LOGIN ══ -->
<div class="screen" id="scrLogin">
  <div class="login-logo">🍽️</div>
  <div class="login-title">Panel <span>Mesero</span></div>
  <div class="login-sub">La Curva Street Food · ¿Quién eres?</div>
  <div class="login-grid" id="loginGrid">
    <div style="grid-column:1/-1;text-align:center;padding:20px;font-size:12px;color:var(--text3)">Cargando meseros...</div>
  </div>
  <div class="login-err" id="loginErr"></div>
</div>

<!-- ══ SELECTOR MESAS ══ -->
<div class="screen hidden" id="scrMesas">
  <div class="topbar">
    <div class="tb-info">
      <div class="tb-title" id="tbNombre">Hola 👋</div>
      <div class="tb-sub">Selecciona una mesa</div>
    </div>
    <div class="tb-badge" id="tbOnline">● 0 activas</div>
  </div>
  <div class="zona-scroll" style="flex:1;overflow-y:auto;padding:12px">
    <!-- Mesas con CHARR TOWER -->
    <div class="mesas-section-title">🏮 Mesas con CHARR TOWER</div>
    <div class="mesas-grid" id="mesasCharr"></div>
    <!-- Otras mesas -->
    <div class="mesas-section-title" id="otrasTitle" style="display:none">📋 Otras mesas</div>
    <div class="mesas-grid" id="mesasOtras" style="display:none"></div>
  </div>
</div>

<!-- ══ PEDIDO ══ -->
<div class="screen hidden" id="scrPedido">
  <div class="topbar">
    <div class="tb-back" onclick="volverMesas()">←</div>
    <div class="tb-info">
      <div class="tb-title" id="tbMesaTitle">Mesa —</div>
      <div class="tb-sub" id="tbMeseroNombre">Mesero</div>
    </div>
    <div class="tb-badge" id="tbCartCount" style="display:none">0 items</div>
  </div>
  <div class="pedido-body">
    <!-- Pedidos activos de la mesa -->
    <div class="activos-strip" id="activosStrip">
      <div class="activos-empty">Sin pedidos activos</div>
    </div>
    <!-- Categorías -->
    <div class="cats-wrap">
      <div class="cats-scroll" id="catsScroll"></div>
    </div>
    <!-- Búsqueda -->
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="search" placeholder="Buscar producto..." oninput="buscar(this.value)" autocomplete="off">
      <div class="search-clear" id="searchClear" onclick="limpiarBusqueda()">✕</div>
    </div>
    <!-- Productos -->
    <div class="prods-scroll" id="prodsScroll"></div>
  </div>
  <!-- Cart bar -->
  <div class="cart-bar" id="cartBar">
    <div class="cart-bar-inner" onclick="abrirModal()">
      <div class="cart-badge" id="cartBadge">0</div>
      <div class="cart-label">Ver pedido</div>
      <div class="cart-total" id="cartTotal">$0</div>
    </div>
  </div>
</div>

<script>
var SU="https://vbxuwzcfzfjwhllkppkg.supabase.co";
var SK="sb_publishable_I5lP9lq6-6t0B0K0PmjyWQ_RiIxiJM5";
var REST_ID="2cc8adc0-068b-4cc5-b880-5239346539ef";

var rest=null, mesero=null, mesaActual=null;
var menuItems=[], carrito={}, catActual="todas";
var charrtowers=[], estadosMesas={}, meserosPorMesa={};
var pollInterval=null, deferredPWA=null;

var CHIPS_RAPIDOS=["Sin cebolla","Sin tomate","Sin picante","Bien cocido","Término medio","Sin sal","Sin gluten","Extra salsa","Para llevar"];

function fmt(n){return"$"+Math.round(Number(n)||0).toLocaleString("es-CO");}
function api(tabla,filtro){
  return fetch(SU+"/rest/v1/"+tabla+"?"+(filtro||""),{
    headers:{"apikey":SK,"Authorization":"Bearer "+SK}
  }).then(function(r){return r.json();});
}
function notif(msg,color){
  var el=document.getElementById("notifBar");
  el.textContent=msg;
  el.style.borderColor=color||"rgba(124,58,237,.4)";
  el.classList.add("show");
  setTimeout(function(){el.classList.remove("show");},2500);
}
function showScreen(id){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.add("hidden");});
  document.getElementById(id).classList.remove("hidden");
}

// ── INIT ──
window.addEventListener("load",function(){
  var rid=new URLSearchParams(window.location.search).get("rest")||REST_ID;
  api("restaurantes","id=eq."+rid+"&select=id,nombre,numero_mesas").then(function(d){
    if(!d||!d.length){document.getElementById("loginErr").textContent="Restaurante no encontrado";return;}
    rest=d[0];
    cargarMeseros();
    cargarMenu();
    cargarCharrTowers();
  }).catch(function(e){document.getElementById("loginErr").textContent="Error: "+e.message;});
});

function cargarMeseros(){
  api("meseros","restaurante_id=eq."+rest.id+"&activo=eq.true&order=nombre&select=id,nombre").then(function(ms){
    var grid=document.getElementById("loginGrid");
    if(!ms||!ms.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:20px;font-size:12px;color:var(--text3)">Sin meseros registrados</div>';return;}
    grid.innerHTML=ms.map(function(m){
      var inicial=m.nombre?m.nombre[0].toUpperCase():"M";
      return '<div class="mesero-btn" onclick="selMesero(this)" data-id="'+m.id+'" data-nombre="'+m.nombre+'">'
        +'<div class="mesero-btn-ico" style="width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,rgba(124,58,237,.3),rgba(79,70,229,.2));border:1px solid rgba(124,58,237,.3);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#c4b5fd">'+inicial+'</div>'
        +'<span>'+m.nombre+'</span>'
        +'</div>';
    }).join("");
  }).catch(function(e){document.getElementById("loginErr").textContent="Error cargando meseros";});
}

async function cargarMenu(){
  try{
    var r=await fetch("/api/menu?restaurante_id="+rest.id);
    if(!r.ok)return;
    menuItems=await r.json();
  }catch(e){
    menuItems=await api("menu_items","restaurante_id=eq."+rest.id+"&disponible=eq.true&order=categoria,orden&select=*")||[];
  }
}

async function cargarCharrTowers(){
  try{
    var r=await fetch("/api/esp32-dispositivos?restaurante_id="+rest.id);
    charrtowers=await r.json()||[];
  }catch(e){charrtowers=[];}
}

function selMesero(el){
  document.querySelectorAll(".mesero-btn").forEach(function(b){b.classList.remove("sel");});
  el.classList.add("sel");
  mesero={id:el.dataset.id,nombre:el.dataset.nombre};
  setTimeout(entrarApp,220);
}

function entrarApp(){
  document.getElementById("tbNombre").textContent="Hola, "+mesero.nombre+" 👋";
  showScreen("scrMesas");
  cargarEstadoMesas();
  if(pollInterval)clearInterval(pollInterval);
  pollInterval=setInterval(cargarEstadoMesas,8000);
}

// ── MESAS ──
async function cargarEstadoMesas(){
  if(!rest)return;
  try{
    // Estado de LEDs desde el servidor
    var r=await fetch("/api/mesas-estado?restaurante_id="+rest.id);
    var estadosArr=await r.json()||[];
    estadosMesas={};
    estadosArr.forEach(function(m){estadosMesas[m.mesa]=m.estado||"libre";});
    // Pedidos activos para saber qué mesero atiende cada mesa
    var pedidos=await api("pedidos","restaurante_id=eq."+rest.id
      +"&estado=in.(confirmado,preparando,en_preparacion,listo,cuenta)"
      +"&select=direccion,domiciliario_nombre,estado");
    meserosPorMesa={};
    (pedidos||[]).forEach(function(p){
      if(!p.direccion)return;
      var m=p.direccion.match(/[Mm]esa\s*(\d+)/);
      if(m){
        var num=parseInt(m[1]);
        if(p.domiciliario_nombre)meserosPorMesa[num]=p.domiciliario_nombre;
      }
    });
    renderMesas();
  }catch(e){renderMesas();}
}

function renderMesas(){
  var totalMesas=parseInt(rest.numero_mesas)||8;
  // Mesas con CHARR TOWER
  var mesasConCharr=charrtowers.filter(function(ct){return ct.mesa&&ct.mesa>0;}).map(function(ct){return ct.mesa;});
  mesasConCharr.sort(function(a,b){return a-b;});
  // Mesas sin CHARR
  var todasMesas=[];for(var i=1;i<=totalMesas;i++)todasMesas.push(i);
  var mesasSinCharr=todasMesas.filter(function(n){return mesasConCharr.indexOf(n)===-1;});

  var contActivas=0;
  var htmlCharr="", htmlOtras="";

  function buildCard(num){
    var est=estadosMesas[num]||"libre";
    var mNombre=meserosPorMesa[num]||"";
    var esMio=mNombre===mesero.nombre;
    var esOtro=mNombre&&!esMio&&est!=="libre";
    var bloqueada=esOtro;
    if(est!=="libre")contActivas++;
    var cls=bloqueada?"bloqueada":est;
    var label={libre:"Libre",ocupada:"Ocupada",confirmado:"Ocupada",en_preparacion:"Preparando",listo:"¡Listo!",servido:"Servido",mesero:"Mesero",cuenta:"Cuenta",celebracion:"Fiesta",apagada:"Apagada"}[est]||"Libre";
    var onclick=bloqueada
      ?"notif('🔒 Mesa de "+mNombre+"','rgba(124,58,237,.7)')"
      :"abrirMesa("+num+")";
    return '<div class="mesa-card '+cls+'" onclick="'+onclick+'">'
      +'<div class="mesa-led"></div>'
      +'<div class="mesa-num">'+num+'</div>'
      +'<div class="mesa-label">'+(esMio?"👤 mía":label)+'</div>'
      +(mNombre&&est!=="libre"?'<div class="mesa-mesero">'+mNombre+'</div>':"")
      +'</div>';
  }

  if(mesasConCharr.length){
    htmlCharr=mesasConCharr.map(buildCard).join("");
  }else{
    htmlCharr='<div class="sin-charr">📡 No hay CHARR TOWERs asignados aún<br><span style="font-size:10px">Ve al panel de restaurante → Mesas → Asignar</span></div>';
  }

  if(mesasSinCharr.length){
    htmlOtras=mesasSinCharr.map(buildCard).join("");
  }

  document.getElementById("mesasCharr").innerHTML=htmlCharr;
  document.getElementById("tbOnline").textContent="● "+contActivas+" activas";

  if(mesasSinCharr.length){
    document.getElementById("otrasTitle").style.display="block";
    document.getElementById("mesasOtras").style.display="grid";
    document.getElementById("mesasOtras").innerHTML=htmlOtras;
  }else{
    document.getElementById("otrasTitle").style.display="none";
    document.getElementById("mesasOtras").style.display="none";
  }
}

// ── ABRIR MESA ──
function abrirMesa(num){
  mesaActual=num;
  carrito={};
  document.getElementById("tbMesaTitle").textContent="🪑 Mesa "+num;
  document.getElementById("tbMeseroNombre").textContent=mesero.nombre;
  document.getElementById("tbCartCount").style.display="none";
  showScreen("scrPedido");
  actualizarBar();
  renderCats();
  renderProds();
  cargarActivosMesa(num);
  // Inicializar chips de notas
  document.getElementById("chipsNotas").innerHTML=CHIPS_RAPIDOS.map(function(c){
    return '<div class="chip-nota" onclick="toggleChipNota(this,\''+c+'\')">'+c+'</div>';
  }).join("");
  document.getElementById("notasInput").value="";
}

function volverMesas(){
  clearInterval(pollInterval);
  mesaActual=null;carrito={};
  showScreen("scrMesas");
  document.getElementById("cartBar").style.display="none";
  pollInterval=setInterval(cargarEstadoMesas,8000);
  cargarEstadoMesas();
}

// ── PEDIDOS ACTIVOS ──
function cargarActivosMesa(num){
  api("pedidos","restaurante_id=eq."+rest.id
    +"&estado=in.(confirmado,preparando,en_preparacion,listo)"
    +"&select=numero_pedido,estado,items,total,direccion,id"
    +"&order=created_at.desc&limit=10"
  ).then(function(todos){
    var activos=(todos||[]).filter(function(p){
      if(!p.direccion)return false;
      return p.direccion.toLowerCase()==="mesa "+String(num).toLowerCase();
    });
    var strip=document.getElementById("activosStrip");
    if(!activos.length){
      strip.innerHTML='<div class="activos-empty">Sin pedidos activos en esta mesa</div>';
      return;
    }
    var estIcon={confirmado:"🔵",preparando:"🟡",en_preparacion:"🟡",listo:"🟢"};
    var estClass={confirmado:"est-confirmado",preparando:"est-preparando",en_preparacion:"est-preparando",listo:"est-listo"};
    var estLabel={confirmado:"Recibido",preparando:"Preparando",en_preparacion:"Preparando",listo:"¡Listo!"};
    strip.innerHTML=activos.map(function(p){
      var items=Array.isArray(p.items)?p.items:[];
      var resumen=items.slice(0,3).map(function(i){
        var n=typeof i==="string"?i.replace(/^\d+[xX×]\s*/,"").replace(/\s*\$[\d.,]+\s*$/,""):(i.nombre||"");
        return n.trim();
      }).filter(Boolean).join(", ");
      var est=p.estado||"confirmado";
      var html='<div class="activo-row">'
        +'<div class="activo-num">#'+p.numero_pedido+'</div>'
        +'<div class="activo-items">'+resumen+'</div>'
        +'<div class="activo-est '+estClass[est]+'">'+estIcon[est]+" "+estLabel[est]+'</div>'
        +'</div>';
      if(est==="listo"||est==="en_camino"){
        html+='<div style="padding:4px 14px 8px">'
          +'<button data-pid="'+p.id+'" onclick="marcarEntregado(this.getAttribute(\'data-pid\'),'+num+')" style="width:100%;padding:8px;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.35);border-radius:10px;color:#6ee7b7;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit">✓ Marcar entregado</button>'
          +'</div>';
      }
      return html;
    }).join("");
  }).catch(function(){});
}

// ── MENÚ ──
function renderCats(){
  var cats=[];
  menuItems.forEach(function(i){if(cats.indexOf(i.categoria)===-1)cats.push(i.categoria);});
  var h='<div class="cat-pill on" onclick="selCat(this,\'todas\')">Todo</div>';
  cats.forEach(function(c){h+='<div class="cat-pill" onclick="selCat(this,\''+c+'\')">'+c+'</div>';});
  document.getElementById("catsScroll").innerHTML=h;
}

function selCat(el,cat){
  document.querySelectorAll(".cat-pill").forEach(function(p){p.classList.remove("on");});
  el.classList.add("on");catActual=cat;
  document.getElementById("searchInput").value="";
  document.getElementById("searchClear").style.display="none";
  renderProds();
}

function buscar(q){
  document.getElementById("searchClear").style.display=q?"flex":"none";
  renderProds(q);
}
function limpiarBusqueda(){
  document.getElementById("searchInput").value="";
  document.getElementById("searchClear").style.display="none";
  renderProds();
}

function renderProds(q){
  q=q||document.getElementById("searchInput").value||"";
  var wrap=document.getElementById("prodsScroll");
  var filtrados=menuItems.filter(function(i){
    if(!i.disponible&&i.disponible!==undefined)return false;
    if(catActual!=="todas"&&i.categoria!==catActual)return false;
    if(!q)return true;
    var txt=(i.nombre||"").toLowerCase();
    if(txt.indexOf(q.toLowerCase())!==-1)return true;
    var j=0;var ql=q.toLowerCase();
    for(var k=0;k<ql.length;k++){var pos=txt.indexOf(ql[k],j);if(pos===-1)return false;j=pos+1;}
    return true;
  });
  filtrados.sort(function(a,b){return (carrito[b.id]?1:0)-(carrito[a.id]?1:0);});
  if(!filtrados.length){wrap.innerHTML='<div class="empty-search">Sin resultados para "'+q+'"</div>';return;}
  var grupos={};var agrupar=!q&&catActual==="todas";
  filtrados.forEach(function(i){var g=agrupar?i.categoria:"_";if(!grupos[g])grupos[g]=[];grupos[g].push(i);});
  var h="";
  Object.keys(grupos).forEach(function(g){
    if(agrupar)h+='<div class="cat-header">'+g+'</div>';
    grupos[g].forEach(function(i){
      var qty=carrito[i.id]?carrito[i.id].qty:0;
      h+='<div class="prod-row'+(qty>0?" en-carrito":"")+'" id="pr-'+i.id+'">'
        +'<div class="prod-emoji" onclick="agregar(\''+i.id+'\')">'+(i.emoji||"🍽️")+'</div>'
        +'<div class="prod-info" onclick="agregar(\''+i.id+'\')">'
        +'<div class="prod-nombre">'+esc(i.nombre)+'</div>'
        +(i.descripcion?'<div class="prod-desc">'+esc(i.descripcion)+'</div>':"")
        +'</div>'
        +'<div class="prod-precio">'+fmt(i.precio)+'</div>';
      if(qty>0){
        h+='<div class="qty-ctrl">'
          +'<button class="qty-btn" data-id="'+i.id+'" data-d="-1" onclick="qtyClick(this)">−</button>'
          +'<span class="qty-num">'+qty+'</span>'
          +'<button class="qty-btn" data-id="'+i.id+'" data-d="1" onclick="qtyClick(this)">+</button>'
          +'</div>';
      }else{
        h+='<button class="prod-add" onclick="agregar(\''+i.id+'\')">+</button>';
      }
      h+='</div>';
    });
  });
  wrap.innerHTML=h;
}

function getItem(id){return menuItems.find(function(i){return i.id===id;});}
function agregar(id){
  var item=getItem(id);if(!item)return;
  if(carrito[id])carrito[id].qty++;
  else carrito[id]={qty:1,nombre:item.nombre,precio:item.precio,emoji:item.emoji||"🍽️",id:id};
  actualizarBar();renderProds();
  notif("✓ "+item.nombre);
}
function qtyClick(btn){cambiarQty(btn.getAttribute("data-id"),Number(btn.getAttribute("data-d")));}
function cambiarQty(id,delta){
  if(!carrito[id])return;
  carrito[id].qty+=delta;
  if(carrito[id].qty<=0)delete carrito[id];
  actualizarBar();renderProds();
}
function calcTotal(){return Object.values(carrito).reduce(function(s,i){return s+i.precio*i.qty;},0);}
function calcCount(){return Object.values(carrito).reduce(function(s,i){return s+i.qty;},0);}

function actualizarBar(){
  var count=calcCount();
  var bar=document.getElementById("cartBar");
  bar.style.display=count>0?"block":"none";
  document.getElementById("cartBadge").textContent=count;
  document.getElementById("cartTotal").textContent=fmt(calcTotal());
  var badge=document.getElementById("tbCartCount");
  badge.style.display=count>0?"flex":"none";
  badge.textContent=count+" item"+(count!==1?"s":"");
}

// ── MODAL ──
function abrirModal(){renderModal();document.getElementById("modalOverlay").classList.add("open");}
function cerrarModal(){document.getElementById("modalOverlay").classList.remove("open");}

function renderModal(){
  var items=Object.values(carrito);
  var el=document.getElementById("modalItems");
  if(!items.length){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3)">Carrito vacío</div>';return;}
  var h="";
  items.forEach(function(i){
    h+='<div class="cart-item-row">'
      +'<div class="ci-emoji">'+i.emoji+'</div>'
      +'<div class="ci-info"><div class="ci-nombre">'+esc(i.nombre)+'</div></div>'
      +'<div class="qty-ctrl" style="margin-right:8px">'
      +'<button class="qty-btn" data-id="'+i.id+'" data-d="-1" onclick="qtyClick(this);renderModal();actualizarBar();">−</button>'
      +'<span class="qty-num">'+i.qty+'</span>'
      +'<button class="qty-btn" data-id="'+i.id+'" data-d="1" onclick="qtyClick(this);renderModal();actualizarBar();">+</button>'
      +'</div>'
      +'<div class="ci-precio">'+fmt(i.precio*i.qty)+'</div>'
      +'</div>';
  });
  el.innerHTML=h;
  document.getElementById("modalTotal").textContent=fmt(calcTotal());
  document.getElementById("btnEnviar").disabled=items.length===0;
}

function toggleChipNota(el,texto){
  el.classList.toggle("on");
  var chips=document.querySelectorAll(".chip-nota.on");
  var textos=Array.from(chips).map(function(c){return c.textContent;});
  var extra=document.getElementById("notasInput").value.replace(/^[\w\s,]+\|/,"").trim();
  var notas=textos.join(", ")+(extra?"\n"+extra:"");
  document.getElementById("notasInput").value=notas;
}

// ── ENVIAR PEDIDO ──
async function enviarPedido(){
  var items=Object.values(carrito);
  if(!items.length)return;
  var btn=document.getElementById("btnEnviar");
  btn.disabled=true;btn.textContent="Enviando...";
  var notas=document.getElementById("notasInput").value.trim();
  var total=calcTotal();
  var itemsArr=items.map(function(i){return i.qty+"x "+i.nombre+" "+fmt(i.precio*i.qty);});
  var payload={
    restaurante_id:rest.id,
    numero_pedido:Math.floor(Date.now()/1000)%100000,
    cliente_tel:"MESA-"+mesaActual,
    cliente_nombre:"Mesa "+mesaActual,
    domiciliario_nombre:mesero?mesero.nombre:null,
    items:itemsArr,
    subtotal:total,desechables:0,domicilio:0,servicio:0,total:total,
    direccion:"Mesa "+mesaActual,
    metodo_pago:"en mesa",
    estado:"confirmado",
    notas_especiales:notas||null
  };
  try{
    var r=await fetch(SU+"/rest/v1/pedidos",{
      method:"POST",
      headers:{"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify(payload)
    });
    if(!r.ok)throw new Error("Status "+r.status);
    // Actualizar LED automáticamente
    await fetch("/api/mesa-estado",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({restaurante_id:rest.id,mesa:mesaActual,estado:"ocupada"})}).catch(function(){});
    cerrarModal();carrito={};actualizarBar();renderProds();
    document.getElementById("exitoSub").textContent="Pedido de Mesa "+mesaActual+" enviado a cocina.";
    document.getElementById("exitoOverlay").classList.add("show");
  }catch(e){
    notif("❌ Error: "+e.message,"rgba(239,68,68,.7)");
    btn.disabled=false;btn.textContent="Enviar a cocina 🍳";
  }
}

function cerrarExito(){
  document.getElementById("exitoOverlay").classList.remove("show");
  cargarActivosMesa(mesaActual);
  cargarEstadoMesas();
}

async function marcarEntregado(pedidoId,mesaNum){
  try{
    await fetch(SU+"/rest/v1/pedidos?id=eq."+pedidoId,{
      method:"PATCH",
      headers:{"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify({estado:"entregado"})
    });
    notif("✅ Pedido entregado","rgba(16,185,129,.7)");
    cargarActivosMesa(mesaNum);
    cargarEstadoMesas();
  }catch(e){notif("❌ Error","rgba(239,68,68,.7)");}
}

async function pedirCuenta(){
  cerrarModal();
  if(!rest||!mesaActual)return;
  notif("Enviando solicitud...","rgba(168,85,247,.6)");
  try{
    await fetch(SU+"/rest/v1/pedidos",{
      method:"POST",
      headers:{"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify({
        restaurante_id:rest.id,
        numero_pedido:Math.floor(Date.now()/1000)%100000,
        cliente_tel:"MESA-"+mesaActual,
        cliente_nombre:"Mesa "+mesaActual,
        items:["💳 SOLICITUD DE CUENTA"],
        subtotal:0,desechables:0,domicilio:0,total:0,
        direccion:"Mesa "+mesaActual,
        metodo_pago:"cuenta",estado:"cuenta",
        notas_especiales:mesero?"Mesero: "+mesero.nombre:null,
        domiciliario_nombre:mesero?mesero.nombre:null
      })
    });
    // LED morado
    await fetch("/api/mesa-estado",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({restaurante_id:rest.id,mesa:mesaActual,estado:"cuenta"})}).catch(function(){});
    notif("💳 ¡Cuenta solicitada!","rgba(168,85,247,.9)");
  }catch(e){notif("Error: "+e.message.substring(0,30),"rgba(239,68,68,.8)");}
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ── PWA ──
window.addEventListener("beforeinstallprompt",function(e){
  e.preventDefault();deferredPWA=e;
  document.getElementById("pwaBtn").style.display="block";
});
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(function(){}); }
function instalarPWA(){
  if(!deferredPWA)return;
  deferredPWA.prompt();
  deferredPWA.userChoice.then(function(){deferredPWA=null;document.getElementById("pwaBtn").style.display="none";});
}
</script>
