async function enviarPedido() {
  var tel = document.getElementById("cliTel").value.trim();
  var nom = document.getElementById("cliNom").value.trim();

  // Validaciones
  if (Object.keys(carrito).length === 0) { showToast("Carrito vacío"); return; }
  if (tel.length !== 10) { showToast("Ingresa tu WhatsApp (10 dígitos)"); return; }
  if (!nom) { showToast("Ingresa tu nombre"); return; }
  if (!pagoSel) { showToast("Selecciona método de pago"); return; }
  if (tipoPedido === "domicilio") {
    var dir = document.getElementById("cliDir").value.trim();
    if (!dir) { showToast("Ingresa tu dirección"); return; }
  }
  if ((pagoSel === "nequi" || pagoSel === "bancolombia") && !compB64) {
    showToast("Sube el comprobante");
    return;
  }

  var btn = document.getElementById("btnEnviar");
  btn.disabled = true;
  btn.innerHTML = '<span>⏳ Enviando...</span>';

  try {
    // CRÍTICO: items como STRINGS (formato del backend original) — NO objetos
    // Esto evita el bug "[object Object]"
    var items = Object.values(carrito);
    var itemsStr = items.map(function(ci) {
      var line = ci.qty + "x " + ci.nombre + " " + fmt(ci.precio * ci.qty);
      if (ci.notas) line += " (" + ci.notas + ")";
      if (ci.gaseosa) line += " [Gaseosa: " + ci.gaseosa + "]";
      return line;
    });

    var subtotal = items.reduce(function(s, x) { return s + (x.precio * x.qty); }, 0);
    // Desechables: $500 por cada COMIDA (no bebidas ni arepas)
    var desechTotal = 0;
    items.forEach(function(ci) {
      var item = getItemById(ci.id);
      if (item && !item.es_bebida && !item.es_arepa && !String(item.categoria||"").toLowerCase().includes("bebida") && !String(item.categoria||"").toLowerCase().includes("arepa")) {
        desechTotal += 500 * ci.qty;
      }
    });
    var domi = (tipoPedido === "domicilio") ? (domCalculado || 0) : 0;
    var desc = 0;
    if (descTipo === "porcentaje") desc = Math.round(subtotal * descVal / 100);
    else if (descTipo === "fijo") desc = descVal;
    var total = subtotal + desechTotal + domi - desc;

    // Subir comprobante primero si aplica
    var compUrl = null;
    if (compB64) {
      console.log("[comp] Subiendo comprobante... (" + (compB64.length/1024).toFixed(0) + "KB)");
      try {
        var compResp = await fetch("/api/subir-comprobante", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ imagen_base64: "data:image/jpeg;base64," + compB64, restaurante_id: rest.id, telefono: tel })
        });
        var compData = await compResp.json();
        console.log("[comp] Respuesta:", JSON.stringify(compData).substring(0, 200));
        if (compData.ok && compData.url) {
          compUrl = compData.url;
          console.log("[comp] ✅ Subido a Storage:", compUrl);
        } else {
          console.error("[comp] ❌ Storage falló:", compData.error || "sin url");
          // Fallback: guardar data URI completo para que al menos se vea la imagen
          compUrl = "data:image/jpeg;base64," + compB64;
          console.warn("[comp] ⚠️ Guardando como data URI (" + (compUrl.length/1024).toFixed(0) + "KB)");
        }
      } catch(e) {
        console.error("[comp] ❌ Error de red:", e);
        // Fallback: guardar data URI completo
        compUrl = "data:image/jpeg;base64," + compB64;
        console.warn("[comp] ⚠️ Guardando como data URI (fallback red)");
      }
    }

    // Payload con nombres EXACTOS del backend
    var payload = {
      restaurante_id: rest.id,
      cliente_tel: tel,
      nombre_cliente: nom,
      direccion: tipoPedido === "domicilio" ? document.getElementById("cliDir").value.trim() : "",
      barrio: tipoPedido === "domicilio" ? document.getElementById("cliBarrio").value.trim() : "",
      tipo_pedido: tipoPedido,
      metodo_pago: pagoSel,
      notas_especiales: document.getElementById("cliNotas").value.trim() || null,
      items: itemsStr,                  // ← Array de strings, NO objetos
      subtotal: subtotal,
      domicilio: domi,
      desechables: desechTotal,
      descuento: desc,
      total: total,
      comprobante_url: compUrl,
      cupon: descVal > 0 ? document.getElementById("cupCode").value.trim().toUpperCase() : null
    };

    var r = await fetch("/api/pedido-manual", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    var d = await r.json();
    if (!d.ok) throw new Error(d.error || "Error al enviar");

    cerrarCheckout();
    var ptsGanados = Math.floor(total / 1000);
    mostrarExito(d.numero || "?", nom, ptsGanados);
  } catch(e) {
    showToast("❌ " + (e.message || "Error de conexión"));
    console.error("[enviar] error:", e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>Enviar pedido por WhatsApp</span>';
  }
}

  document.getElementById("exitoTitle").textContent = "Pedido enviado, " + nombre.split(" ")[0];
  document.getElementById("exitoSub").textContent = tipoPedido === "domicilio"
    ? "Tu pedido va en camino"

var mpRefreshInterval = null;

async function fetchPedidos(tel) {
  var body = document.getElementById("mpBody");
  try {
    var r = await fetch(SU + "/rest/v1/pedidos?or=(cliente_tel.eq." + tel + ",cliente_tel.eq.57" + tel + ")&restaurante_id=eq." + rest.id + "&order=created_at.desc&limit=20&select=numero_pedido,items,total,estado,created_at,metodo_pago,direccion,tipo_pedido,notas_especiales", {
      headers: { "apikey": SK, "Authorization": "Bearer " + SK }
    });
    var pedidos = await r.json();
    if (!pedidos || !pedidos.length) {
      body.innerHTML = '<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Aún no tienes pedidos</div><div class="empty-sub">Haz tu primer pedido desde el menú</div></div>';
      return;
    }

    // Separar: activos (no entregados) vs historial
    var activos = pedidos.filter(function(p) { return p.estado !== "entregado"; });
    var historial = pedidos.filter(function(p) { return p.estado === "entregado"; });

    var h = '';

    // ── PEDIDOS ACTIVOS con tracking ──
    if (activos.length > 0) {
      h += '<div class="mp-section-title">📍 Pedido en curso</div>';
      h += '<div class="mp-list">';
      activos.forEach(function(p) {
        h += renderPedidoCard(p, true);
      });
      h += '</div>';

      // Auto-refresh cada 15 segundos si hay pedidos activos
      clearInterval(mpRefreshInterval);
      mpRefreshInterval = setInterval(function() {
        if (document.getElementById("mpOv").classList.contains("open")) {
          fetchPedidos(tel);
        } else {
          clearInterval(mpRefreshInterval);
        }
      }, 15000);
    }

    // ── HISTORIAL ──
    if (historial.length > 0) {
      h += '<div class="mp-section-title">📋 Historial</div>';
      h += '<div class="mp-list">';
      historial.slice(0, 10).forEach(function(p) {
        h += renderPedidoCard(p, false);
      });
      h += '</div>';
    }

    body.innerHTML = h;
  } catch(e) {
    console.error("[misPedidos]", e);
    body.innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Error cargando pedidos</div></div>';
  }
}

function renderPedidoCard(p, esActivo) {
  var fecha = new Date(p.created_at);
  var fechaStr = fecha.toLocaleDateString("es-CO", { day:"numeric", month:"short" }) + " " + fecha.toLocaleTimeString("es-CO", { hour:"2-digit", minute:"2-digit" });
  var estado = p.estado || "confirmado";
  var estadoLabel = { confirmado:"Recibido", preparando:"Preparando", en_camino:"En camino", entregado:"Entregado" };
  var estadoEmoji = { confirmado:"📋", preparando:"👨‍🍳", en_camino:"🛵", entregado:"✅" };

  var itemsStr = "";
  try {
    var its = Array.isArray(p.items) ? p.items : JSON.parse(p.items);
    itemsStr = its.map(function(i) { return typeof i === "string" ? i : (i.qty + "x " + i.nombre); }).join("<br>");
  } catch(e) { itemsStr = String(p.items || ""); }

  var pagoLabel = { efectivo:"💵 Efectivo", nequi:"📱 Nequi", bancolombia:"🏦 Bancolombia", datafono:"💳 Datáfono" };

  var h = '<div class="mp-card' + (esActivo ? " activo" : "") + '">';
  h += '<div class="mp-card-head"><div class="mp-card-num">#' + (p.numero_pedido || "?") + '</div><div class="mp-card-date">' + fechaStr + '</div></div>';
  h += '<div class="mp-card-status ' + estado + '">' + (estadoEmoji[estado] || "") + " " + (estadoLabel[estado] || estado) + '</div>';

  // Tracking visual solo para pedidos activos
  if (esActivo) {
    var pasos = ["confirmado", "preparando", "en_camino", "entregado"];
    var idxActual = pasos.indexOf(estado);
    h += '<div class="mp-track">';
    pasos.forEach(function(paso, i) {
      var cls = i < idxActual ? "done" : i === idxActual ? "current" : "";
      var ico = i < idxActual ? "✓" : (estadoEmoji[paso] || "");
      var labels = { confirmado:"Recibido", preparando:"Preparando", en_camino:"En camino", entregado:"Entregado" };
      h += '<div class="mp-track-step ' + cls + '"><div class="mp-track-dot">' + ico + '</div><div class="mp-track-label">' + labels[paso] + '</div></div>';
      if (i < pasos.length - 1) {
        h += '<div class="mp-track-line' + (i < idxActual ? " done" : "") + '"></div>';
      }
    });
    h += '</div>';
  }

  h += '<div class="mp-card-items">' + itemsStr + '</div>';
  h += '<div class="mp-card-bottom">';
  h += '<div class="mp-card-total">' + fmt(p.total) + '</div>';
  h += '<div class="mp-card-pago">' + (pagoLabel[p.metodo_pago] || p.metodo_pago || "") + '</div>';
  h += '</div>';
  h += '</div>';
  return h;
}

function abrirRewards() {
  document.getElementById('rewOv').classList.add('open');
  document.body.style.overflow = 'hidden';
  cargarRewards();
}
function cerrarRewards() { document.getElementById('rewOv').classList.remove('open'); document.body.style.overflow = ''; }

async function cargarRewards() {
  var body = document.getElementById("rewBody");
  body.innerHTML = '<div class="empty"><div class="empty-ico">⏳</div><div class="empty-txt">Cargando...</div></div>';
  var tel = "";
  try { tel = localStorage.getItem("luzCli_" + (rest ? rest.id : "")) || ""; } catch(e) {}
  if (!tel) {
    body.innerHTML = '<div class="empty"><div class="empty-ico">📱</div><div class="empty-txt">Ingresa tu WhatsApp para ver tus puntos</div>'
      + '<div style="padding:16px 0"><input type="tel" class="fld-input" id="rewTelInput" placeholder="3001234567" maxlength="10">'
      + '<button class="btn-md primary" style="margin-top:8px;width:100%" onclick="buscarRewardsPorTel()">Ver mis puntos</button></div></div>';
    return;
  }
  await fetchRewards(tel);
}

function buscarRewardsPorTel() {
  var tel = (document.getElementById("rewTelInput") || {}).value || "";
  if (tel.length !== 10) { showToast("Ingresa 10 dígitos"); return; }
  try { localStorage.setItem("luzCli_" + rest.id, tel); } catch(e) {}
  fetchRewards(tel);
}

async function fetchRewards(tel) {
  var body = document.getElementById("rewBody");
  try {
    var r = await fetch("/api/cliente/" + tel + "?restaurante_id=" + rest.id);
    var data = await r.json();
    var cli = data.cliente || data;
    var puntos = (cli && cli.puntos) ? cli.puntos : 0;
    var nombre = (cli && cli.nombre_cliente) ? cli.nombre_cliente : (cli && cli.nombre) ? cli.nombre : "";
    var nivel = (cli && cli.nivel_fidelidad) ? cli.nivel_fidelidad : "bronce";
    var totalPedidos = (cli && cli.total_pedidos) ? cli.total_pedidos : 0;

    var nivelEmoji = nivel === "oro" ? "🥇" : nivel === "plata" ? "🥈" : "🥉";
    var nivelColor = nivel === "oro" ? "#fbbf24" : nivel === "plata" ? "#d1d5db" : "#cd7f32";
    var nivelBg = nivel === "oro" ? "rgba(245,158,11,0.15)" : nivel === "plata" ? "rgba(156,163,175,0.12)" : "rgba(205,127,50,0.1)";
    var siguienteNivel = nivel === "bronce" ? { nombre: "Plata", faltan: 10 - totalPedidos, emoji: "🥈" } : nivel === "plata" ? { nombre: "Oro", faltan: 25 - totalPedidos, emoji: "🥇" } : null;

    var h = '';
    // Hero con nivel prominente
    h += '<div style="text-align:center;padding:20px 16px;background:linear-gradient(135deg,' + nivelBg + ',rgba(0,0,0,0.1));border-radius:18px;margin-bottom:14px">';
    h += '<div style="font-size:44px;margin-bottom:4px">' + nivelEmoji + '</div>';
    h += '<div style="font-size:26px;font-weight:900;color:' + nivelColor + ';letter-spacing:0.02em">Nivel ' + nivel.charAt(0).toUpperCase() + nivel.slice(1) + '</div>';
    if (nombre) h += '<div style="font-size:14px;color:var(--text);font-weight:600;margin-top:4px">' + escHtml(nombre) + '</div>';
    h += '<div style="display:flex;justify-content:center;gap:20px;margin-top:14px">';
    h += '<div style="text-align:center"><div style="font-size:28px;font-weight:900;font-family:\'JetBrains Mono\',monospace;color:var(--accent,#e8341c)">' + puntos + '</div><div style="font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:0.08em">Puntos</div></div>';
    h += '<div style="text-align:center"><div style="font-size:28px;font-weight:900;font-family:\'JetBrains Mono\',monospace;color:var(--text)">' + totalPedidos + '</div><div style="font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:0.08em">Pedidos</div></div>';
    h += '</div>';
    // Progreso al siguiente nivel
    if (siguienteNivel && siguienteNivel.faltan > 0) {
      var progreso = nivel === "bronce" ? Math.round((totalPedidos / 10) * 100) : Math.round((totalPedidos / 25) * 100);
      if (progreso > 100) progreso = 100;
      h += '<div style="margin-top:14px;padding:10px 16px;background:rgba(255,255,255,0.06);border-radius:12px">';
      h += '<div style="font-size:11px;color:var(--t2);margin-bottom:6px">' + siguienteNivel.emoji + ' Te faltan <b style="color:' + nivelColor + '">' + siguienteNivel.faltan + ' pedidos</b> para ' + siguienteNivel.nombre + '</div>';
      h += '<div style="width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden"><div style="width:' + progreso + '%;height:100%;background:' + nivelColor + ';border-radius:3px;transition:width 0.6s ease"></div></div>';
      h += '</div>';
    }
    h += '</div>';

    // Beneficios del nivel
    h += '<div style="padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;margin-bottom:14px">';
    h += '<div style="font-size:12px;font-weight:800;color:var(--text);margin-bottom:8px">Tus beneficios</div>';
    h += '<div style="font-size:12px;color:var(--t2);line-height:1.7">';
    h += '🛒 <b>1 punto por cada $1.000</b> en compras<br>';
    if (nivel === "plata" || nivel === "oro") h += '🏷️ <b>' + (nivel === "oro" ? "10" : "5") + '% descuento</b> automático en todo<br>';
    h += '🎁 Canjea tus puntos por productos gratis';
    h += '</div></div>';

    // Sección de canje
    h += '<div style="font-size:12px;font-weight:800;color:var(--text);margin-bottom:10px">🎁 Canjear puntos</div>';
    h += '<div id="canjeProductos"><div style="text-align:center;color:var(--t3);font-size:12px;padding:12px">Cargando productos...</div></div>';

    body.innerHTML = h;

    // Actualizar banner de rewards en la página principal
    var rewTitle = document.getElementById("rewTitle");
    var rewSub = document.getElementById("rewSub");
    if (rewTitle) rewTitle.textContent = nivelEmoji + " " + puntos + " puntos · " + nivel.charAt(0).toUpperCase() + nivel.slice(1);
    if (rewSub) rewSub.textContent = nombre ? "Hola, " + nombre.split(" ")[0] : "Toca para ver tus beneficios";

    // Cargar productos de canje
    cargarProductosCanje(tel, puntos);

  } catch(e) {
    body.innerHTML = '<div style="text-align:center;padding:30px"><div style="font-size:40px;margin-bottom:8px">⭐</div><div style="font-size:14px;color:var(--t2)">No pudimos cargar tus puntos</div></div>';
  }
}

async function cargarProductosCanje(tel, puntosCliente) {
  var container = document.getElementById("canjeProductos");
  if (!container) return;
  try {
    var r = await fetch("/api/productos-canje?restaurante_id=" + rest.id);
    var productos = await r.json();
    if (!productos || !productos.length) {
      container.innerHTML = '<div style="text-align:center;color:var(--t3);font-size:12px;padding:16px;background:rgba(255,255,255,0.03);border-radius:12px">Pronto habrá productos para canjear con tus puntos</div>';
      return;
    }
    var h = '';
    productos.forEach(function(p) {
      var puedeCanjar = puntosCliente >= (p.puntos_requeridos || 999999);
      h += '<div style="display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,' + (puedeCanjar ? "0.06" : "0.02") + ');border:1px solid rgba(255,255,255,' + (puedeCanjar ? "0.12" : "0.05") + ');border-radius:14px;margin-bottom:8px;' + (puedeCanjar ? "" : "opacity:0.5;") + '">';
      h += '<div style="font-size:28px;flex-shrink:0">' + (p.emoji || "🎁") + '</div>';
      h += '<div style="flex:1;min-width:0">';
      h += '<div style="font-size:13px;font-weight:700;color:var(--text)">' + escHtml(p.nombre) + '</div>';
      if (p.descripcion) h += '<div style="font-size:11px;color:var(--t3);margin-top:1px">' + escHtml(p.descripcion) + '</div>';
      h += '<div style="font-size:12px;font-weight:800;color:#fbbf24;margin-top:3px">⭐ ' + (p.puntos_requeridos || 0) + ' puntos</div>';
      h += '</div>';
      if (puedeCanjar) {
        h += '<button onclick="canjearProducto(\'' + p.id + '\',\'' + encodeURIComponent(p.nombre) + '\',' + (p.puntos_requeridos || 0) + ',\'' + tel + '\')" style="padding:8px 14px;background:linear-gradient(135deg,#f59e0b,#f97316);border:none;border-radius:10px;color:white;font-size:11px;font-weight:800;cursor:pointer;flex-shrink:0;font-family:inherit">Canjear</button>';
      } else {
        h += '<div style="font-size:10px;color:var(--t3);font-weight:600;flex-shrink:0;text-align:right">Faltan<br>' + ((p.puntos_requeridos || 0) - puntosCliente) + ' pts</div>';
      }
      h += '</div>';
    });
    container.innerHTML = h;
  } catch(e) {
    container.innerHTML = '<div style="text-align:center;color:var(--t3);font-size:12px;padding:12px">Error cargando productos</div>';
  }
}

async function canjearProducto(productoId, nombreEnc, puntosReq, tel) {
  if (!confirm("¿Canjear " + decodeURIComponent(nombreEnc) + " por " + puntosReq + " puntos?")) return;
  try {
    var r = await fetch("/api/canjear", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ restaurante_id: rest.id, telefono: tel, producto_canje_id: productoId })
    });
    var d = await r.json();
    if (d.ok) {
      showToast("🎁 ¡" + decodeURIComponent(nombreEnc) + " canjeado! Menciónalo en tu próximo pedido.");
      fetchRewards(tel);
    } else {
      showToast("❌ " + (d.error || "No se pudo canjear"));
    }
  } catch(e) {
    showToast("❌ Error de conexión");
  }
}

// DRAG-TO-DISMISS sheets
// ═══════════════════════════════════════════════════════════
function initSheetDrag() {
  document.querySelectorAll(".sheet").forEach(function(sheet) {
    var handle = sheet.querySelector(".sheet-handle-wrap");
    if (!handle) return;
    var isDragging = false;
    var startY = 0;
    var currentY = 0;
    var sheetBg = sheet.closest(".sheet-bg");

    function onStart(e) {
      isDragging = true;
      startY = (e.touches ? e.touches[0].clientY : e.clientY);
      currentY = 0;
      sheetBg.classList.add("dragging");
    }
    function onMove(e) {
      if (!isDragging) return;
      var y = (e.touches ? e.touches[0].clientY : e.clientY);
      currentY = y - startY;
      if (currentY < 0) currentY = 0;
      sheet.style.transform = "translateY(" + currentY + "px)";
      var progress = Math.min(currentY / 300, 1);
      sheetBg.style.background = "rgba(0,0,0," + (0.55 * (1 - progress)) + ")";
    }
    function onEnd() {
      if (!isDragging) return;
      isDragging = false;
      sheetBg.classList.remove("dragging");
      sheet.style.transform = "";
      sheetBg.style.background = "";
      if (currentY > 120) {
        sheetBg.classList.remove("open");
        document.body.style.overflow = "";
      }
    }

    handle.addEventListener("touchstart", onStart, { passive: true });
    handle.addEventListener("touchmove", onMove, { passive: true });
    handle.addEventListener("touchend", onEnd);
    handle.addEventListener("mousedown", onStart);
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onEnd);
  });
}

// INIT

window.addEventListener("load", async function() {
  console.log("%c[LUZ IA v3.0] Fase 2 — Productos + Tradicionales", "color:#FF7A1A;font-weight:bold;font-size:14px");

  // Config inicial
  actualizarSaludo();
  renderPromos();
  initSheetDrag();

  // Cargar restaurante
  var restId = gp("rest") || gp("r");
  var mesa = gp("mesa") || gp("m");
  if (mesa) {
    var mt = document.getElementById("t-mesa");
    if (mt) mt.classList.remove("hide");
    setTipo("mesa");
  }

  try {
    // Cargar restaurante desde el backend (no Supabase directo)
    var restUrl = restId
      ? "/api/restaurante?id=" + restId
      : "/api/restaurante";
    var r = await fetch(restUrl);
    if (!r.ok) throw new Error("HTTP " + r.status);
    var d = await r.json();
    rest = Array.isArray(d) ? (d.length ? d[0] : null) : (d || null);
    console.log("[init] Restaurante:", rest ? rest.nombre : "NO ENCONTRADO");
  } catch (e) {
    console.warn("[init] /api/restaurante falló, intentando Supabase directo...", e.message);
    // Fallback: Supabase directo
    try {
      var url = restId
        ? SU + "/rest/v1/restaurantes?id=eq." + restId + "&select=*"
        : SU + "/rest/v1/restaurantes?estado=eq.activo&limit=1&select=*";
      var r2 = await fetch(url, {
        headers: { "apikey": SK, "Authorization": "Bearer " + SK }
      });
      var d2 = await r2.json();
      rest = Array.isArray(d2) && d2.length ? d2[0] : null;
      console.log("[init] Fallback Supabase:", rest ? rest.nombre : "NO ENCONTRADO");
    } catch (e2) {
      console.error("[init] Ambos métodos fallaron:", e2.message);
    }
  }

  if (!rest) {
    document.getElementById("prodsArea").innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Restaurante no disponible</div></div>';
    var s = document.getElementById("splash");
    if (s) s.classList.add("out");
    return;
  }

  // Aplicar config del restaurante
  if (rest.nombre) document.title = rest.nombre + " · Menú";
  if (rest.hero_slogan) {
    var sub = document.getElementById("heroSub");
    if (sub) sub.textContent = rest.hero_slogan;
  }

  // Cargar menú (tradicionales se renderizan siempre, menuItems desde Supabase)
  await cargarMenu();

  // Re-renderizar promos con datos del restaurante (banners_json)
  renderPromos();

  // Auto-cargar nivel del cliente si ya está registrado
  try {
    var telAuto = localStorage.getItem("luzCli_" + rest.id);
    if (telAuto && telAuto.length === 10) {
      fetch("/api/cliente/" + telAuto + "?restaurante_id=" + rest.id)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var cli = data.cliente || data;
          if (cli && (cli.nombre_cliente || cli.puntos)) {
            var puntos = cli.puntos || 0;
            var nivel = cli.nivel_fidelidad || "bronce";
            var nombre = cli.nombre_cliente || "";
            var nivelEmoji = nivel === "oro" ? "🥇" : nivel === "plata" ? "🥈" : "🥉";
            var rewTitle = document.getElementById("rewTitle");
            var rewSub = document.getElementById("rewSub");
            if (rewTitle) rewTitle.textContent = nivelEmoji + " " + puntos + " puntos · " + nivel.charAt(0).toUpperCase() + nivel.slice(1);
            if (rewSub) rewSub.textContent = nombre ? "Hola, " + nombre.split(" ")[0] : "Toca para ver tus beneficios";
          }
        }).catch(function() {});
    }
  } catch(e) {}

  // Ocultar splash con fade
  setTimeout(function() {
    var s = document.getElementById("splash");
    if (s) s.classList.add("out");
  }, 400);
  setTimeout(function() {
    var s = document.getElementById("splash");
    if (s) s.remove();
  }, 1000);

  // Cerrar sheets con Escape
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
      document.querySelectorAll(".sheet-bg.open").forEach(function(sh){
        sh.classList.remove("open");
      });
      document.body.style.overflow = "";
    }
  });

  // Cerrar sheet al tocar background
  document.querySelectorAll(".sheet-bg").forEach(function(sh) {
    sh.addEventListener("click", function(e) {
      if (e.target === sh) {
        sh.classList.remove("open");
        document.body.style.overflow = "";
      }
    });
  });

  console.log("%c[LUZ IA v3.0] Ready — Fase 3 pendiente: carrito + checkout", "color:#22C55E;font-weight:bold");
});
</script>
