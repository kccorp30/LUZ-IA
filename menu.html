<!-- VERSION LIMPIA Y ESTABLE - SOLO SECCIÓN CRÍTICA JS -->
<script>

// VARIABLES GLOBALES
var SU = "https://vbxuwzcfzfjwhllkppkg.supabase.co"
var SK = "sb_publishable_I5lP9lq6-6t0B0K0PmjyWQ_RiIxiJM5"

var rest = null
var menuItems = []
var carrito = {}
var zonasData = []
var domCalculado = null
var trackId = null, trackTimer = null
var _ultimoEstado = {}

// INIT
window.addEventListener("load", async () => {
  await cargarRestaurante()
  await cargarMenu()
  await cargarZonasMenu()

  document.getElementById("iTel")
    ?.addEventListener("input", actualizarBtnMisPedidos)
})

// RESTAURANTE
async function cargarRestaurante(){
  let r = await fetch(`/api/restaurante?id=2cc8adc0-068b-4cc5-b880-5239346539ef`)
  rest = await r.json()
}

// MENU
async function cargarMenu(){
  let r = await fetch(`/api/menu?restaurante_id=${rest.id}`)
  let data = await r.json()
  menuItems = data || []
}

// ZONAS (FIXED)
async function cargarZonasMenu(){
  try {
    let r = await fetch(`/api/zonas?restaurante_id=${rest.id}`)
    let data = await r.json()

    if(!data || !data.length) throw "zonas vacías"

    zonasData = data

  } catch(e){
    console.warn("fallback zonas", e)

    let r = await fetch(`${SU}/rest/v1/zonas_domicilio?restaurante_id=eq.${rest.id}`, {
      headers: { apikey: SK }
    })

    zonasData = await r.json() || []
  }
}

// CARRITO
function addItem(id, precio, nombre){
  let prod = menuItems.find(x=>x.id==id)

  if(!carrito[id]){
    carrito[id] = {id, precio, nombre, qty:1}
  } else {
    carrito[id].qty++
  }

  updateCartUI()

  // SUGERENCIA BEBIDA (FIX)
  let countComida = Object.values(carrito)
    .filter(i => {
      let p = menuItems.find(x=>x.id==i.id)
      return p && !p.es_bebida
    })
    .reduce((a,b)=>a+b.qty,0)

  if(countComida % 3 === 0){
    sugerirBebida()
  }
}

// MIS PEDIDOS BTN (FIX)
function actualizarBtnMisPedidos(){
  let tel = document.getElementById("iTel")?.value
  let btn = document.getElementById("btnMisPedidos")

  if(!btn) return

  btn.style.display = (tel && tel.length >= 8) ? "block" : "none"
}

// TRACKING (FIX TOTAL)
function actuTracking(id){
  if(trackTimer) clearInterval(trackTimer)

  trackId = id

  trackTimer = setInterval(async ()=>{
    try {
      let r = await fetch(`${SU}/rest/v1/pedidos?id=eq.${id}`, {
        headers:{apikey:SK}
      })

      let data = await r.json()
      if(!data || !data[0]) return

      let estado = data[0].estado

      if(_ultimoEstado[id] !== estado){
        _ultimoEstado[id] = estado
        notificarEstadoLocal(estado, data[0].numero_pedido)
      }

      actualizarUITracking(estado)

    } catch(e){
      console.error("tracking error", e)
    }
  }, 5000)
}

// LLAMAR TRACKING DESPUES DE PEDIDO
function onPedidoCreado(res){
  mostrarExito(res.numero, res.id)
  actuTracking(res.id)
}

</script>
