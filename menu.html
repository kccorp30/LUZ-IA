<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>La Curva Street Food</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080709;--s1:#141118;--s2:#1c1923;--s3:#24202e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#e8341c;--orange:#f97316;--gold:#f5a623;--green:#22c55e;
  --text:#f0ecf8;--t2:rgba(240,236,248,0.55);--t3:rgba(240,236,248,0.3);
  --font-d:'Barlow Condensed',sans-serif;--font-b:'Barlow',sans-serif;--font-u:'Syne',sans-serif;
}
html,body{height:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overscroll-behavior-y:contain;}

/* LOADING */
#ls{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .6s,transform .6s;}
#ls.out{opacity:0;transform:scale(1.04);pointer-events:none;}
.ls-logo{font-family:var(--font-d);font-size:52px;font-weight:900;letter-spacing:6px;animation:lp 1.8s ease-in-out infinite alternate;}
.ls-logo span{color:var(--accent);}
.ls-bar{width:120px;height:2px;background:var(--s3);border-radius:2px;overflow:hidden;}
.ls-prog{height:100%;background:linear-gradient(90deg,var(--accent),var(--orange));animation:lbar 1s ease-in-out infinite alternate;}
@keyframes lp{from{opacity:.5}to{opacity:1}}
@keyframes lbar{from{width:20%}to{width:100%}}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,7,9,0);backdrop-filter:blur(0);transition:all .3s;}
.hdr.scrolled{background:rgba(8,7,9,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.hdr-logo{font-family:var(--font-d);font-size:22px;font-weight:900;letter-spacing:4px;}
.hdr-logo span{color:var(--accent);}
.hdr-logo img{height:38px;object-fit:contain;}
.hdr-cart{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--border2);border-radius:100px;padding:8px 14px 8px 10px;cursor:pointer;transition:all .2s;position:relative;}
.hdr-cart.on{background:var(--accent);border-color:var(--accent);}
.hdr-cart-n{font-family:var(--font-u);font-size:13px;font-weight:700;}
.hdr-cart-t{font-family:var(--font-d);font-size:15px;font-weight:700;display:none;}
.hdr-cart.on .hdr-cart-t{display:block;}

/* HERO */
.hero{height:280px;position:relative;overflow:hidden;margin-top:0;}
.hero-fallback{width:100%;height:100%;background:linear-gradient(140deg,#2a1108,#1a0a05,#0e0812,var(--bg));display:flex;align-items:center;justify-content:center;font-size:90px;opacity:.25;}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,7,9,.4) 0%,rgba(8,7,9,.05) 30%,rgba(8,7,9,.7) 70%,var(--bg) 100%);}
.hero-c{position:absolute;bottom:0;left:0;right:0;padding:20px 20px 20px;}
.hero-tag{display:none;align-items:center;gap:6px;background:var(--accent);color:#fff;font-family:var(--font-u);font-size:10px;font-weight:700;padding:4px 11px;border-radius:100px;margin-bottom:8px;letter-spacing:.08em;text-transform:uppercase;}
.hero-tag.show{display:inline-flex;}
.hero-name{font-family:var(--font-d);font-size:44px;font-weight:900;letter-spacing:2px;line-height:.95;text-shadow:0 4px 24px rgba(0,0,0,.7);margin-bottom:4px;}
.hero-sub{font-size:13px;font-weight:300;color:var(--t2);}

/* TIPO */
.tipo-wrap{padding:14px 16px 8px;}
.tipo-row{display:flex;gap:6px;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:4px;}
.tbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 8px;border-radius:12px;border:none;background:transparent;color:var(--t2);font-family:var(--font-u);font-size:12px;font-weight:600;cursor:pointer;transition:all .22s;}
.tbtn.on{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(232,52,28,.35);}

/* PROMOS */
.promos-wrap{padding:4px 16px 8px;display:none;}
.promos-wrap.show{display:block;}
.promos-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;scroll-snap-type:x mandatory;}
.promos-scroll::-webkit-scrollbar{display:none;}
.promo-card{flex-shrink:0;width:230px;border-radius:18px;overflow:hidden;cursor:pointer;scroll-snap-align:start;border:1px solid rgba(255,255,255,.06);}
.promo-inner{padding:14px;position:relative;z-index:1;}
.promo-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:100px;padding:3px 9px;font-family:var(--font-u);font-size:9px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase;}
.promo-title{font-family:var(--font-d);font-size:19px;font-weight:800;color:#fff;margin-bottom:4px;}
.promo-desc{font-size:11px;color:rgba(255,255,255,.6);line-height:1.4;}
.promo-dots{display:flex;gap:5px;padding:6px 0 2px;}
.pdot{width:6px;height:6px;border-radius:3px;background:var(--t3);transition:all .25s;}
.pdot.on{background:var(--accent);width:18px;}

/* MENU AREA */
.menu-sticky{position:sticky;top:56px;z-index:90;background:var(--bg);}
.search-wrap{padding:8px 16px 0;}
.search-wrap input{width:100%;padding:11px 16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;color:var(--text);font-family:var(--font-u);font-size:14px;outline:none;-webkit-appearance:none;box-sizing:border-box;}
.search-wrap input::placeholder{color:var(--t3);}
.cats-row{display:flex;gap:8px;padding:10px 16px 12px;overflow-x:auto;scrollbar-width:none;}
.cats-row::-webkit-scrollbar{display:none;}
.cat-pill{flex-shrink:0;padding:9px 18px;border-radius:100px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--t2);font-family:var(--font-u);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;}
.cat-pill.on{color:#fff;background:linear-gradient(135deg,var(--accent),#c42912);border-color:transparent;box-shadow:0 4px 16px rgba(232,52,28,.4);}

/* PRODUCTS */
.prods-area{padding:0 16px 180px;}
.cat-section{margin-bottom:24px;}
.cat-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.cat-hdr-line{flex:1;height:1px;background:var(--border);}
.cat-hdr-lbl{font-family:var(--font-d);font-size:22px;font-weight:800;letter-spacing:1.5px;}
.grid-v{display:flex;flex-direction:column;gap:10px;}

/* PRODUCT CARD - LISTA */
.pcard{display:flex;flex-direction:row;align-items:stretch;background:linear-gradient(135deg,var(--s2) 0%,var(--s1) 100%);border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;cursor:pointer;transition:all .18s;min-height:105px;box-shadow:0 3px 16px rgba(0,0,0,.4);}
.pcard:active{transform:scale(0.97);}
.pcard.incart{border-color:rgba(232,52,28,.45);box-shadow:0 3px 16px rgba(232,52,28,.15);}
.pcard-body{padding:14px 12px 14px 16px;flex:1;display:flex;flex-direction:column;justify-content:space-between;order:1;min-width:0;}
.pcard-name{font-family:var(--font-u);font-size:15px;font-weight:800;line-height:1.3;margin-bottom:4px;color:var(--text);}
.pcard-desc{font-size:11px;color:var(--t3);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px;}
.pcard-bot{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.pcard-price{font-family:var(--font-d);font-size:20px;font-weight:900;color:var(--orange);}
.pcard-img{width:110px;min-width:110px;background:var(--s3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;order:2;}
.pcard-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.pcard-img-emoji{font-size:42px;opacity:.6;}
.oferta-tag{position:absolute;top:6px;left:6px;z-index:3;background:var(--accent);color:#fff;font-family:var(--font-u);font-size:9px;font-weight:700;padding:3px 7px;border-radius:6px;}

/* ADD BTN */
.add-btn{width:34px;height:34px;border-radius:11px;border:none;background:var(--accent);color:#fff;font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(232,52,28,.4);flex-shrink:0;}
.qty-ctrl{display:flex;align-items:center;gap:3px;background:rgba(8,7,9,.88);border:1px solid var(--border2);border-radius:11px;padding:3px 5px;flex-shrink:0;}
.qb{width:27px;height:27px;border-radius:8px;border:none;background:transparent;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qb.p{background:var(--accent);}
.qn{font-family:var(--font-d);font-size:18px;font-weight:700;min-width:16px;text-align:center;}

/* BEBIDA CARD */
.grid-h{display:flex;flex-direction:column;gap:8px;}
.bcard{display:flex;align-items:center;background:var(--s1);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;min-height:72px;}
.bcard.incart{border-color:rgba(232,52,28,.4);}
.bcard-img{width:72px;height:72px;flex-shrink:0;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden;position:relative;}
.bcard-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.bcard-body{flex:1;padding:10px 14px;display:flex;flex-direction:column;justify-content:center;}
.bcard-name{font-family:var(--font-u);font-size:13px;font-weight:700;margin-bottom:2px;}
.bcard-desc{font-size:11px;color:var(--t3);margin-bottom:4px;}
.bcard-bot{display:flex;align-items:center;justify-content:space-between;}
.bcard-price{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--orange);}

/* FLOATING BAR */
.fbar{position:fixed;bottom:0;left:0;right:0;z-index:90;padding:10px 16px calc(18px + env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(8,7,9,.98) 50%,transparent);pointer-events:none;opacity:0;transform:translateY(12px);transition:all .3s cubic-bezier(.34,1.56,.64,1);}
.fbar.show{opacity:1;transform:translateY(0);pointer-events:all;}
.fbar-btn{width:100%;padding:16px 20px;background:linear-gradient(135deg,var(--accent),#c42912);border:none;border-radius:18px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 32px rgba(232,52,28,.45);transition:transform .15s;}
.fbar-btn:active{transform:scale(.98);}
.fbar-left{display:flex;align-items:center;gap:10px;}
.fbar-badge{background:rgba(255,255,255,.2);border-radius:8px;padding:3px 10px;font-family:var(--font-u);font-size:13px;font-weight:700;}
.fbar-label{font-family:var(--font-u);font-size:14px;font-weight:600;}
.fbar-total{font-family:var(--font-d);font-size:24px;font-weight:700;}

/* SHEETS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
.ov.on{opacity:1;pointer-events:all;}
.sheet{position:fixed;bottom:0;left:0;right:0;max-height:92vh;background:var(--s1);border-radius:26px 26px 0 0;z-index:201;transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1);overflow-y:auto;border:1px solid var(--border);border-bottom:none;}
.sheet.on{transform:translateY(0);}
.sh-handle{width:38px;height:4px;background:var(--s3);border-radius:2px;margin:14px auto 0;display:block;}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--s1);z-index:2;}
.sh-title{font-family:var(--font-d);font-size:26px;font-weight:800;letter-spacing:1px;}
.sh-close{width:34px;height:34px;border-radius:11px;background:var(--s2);border:1px solid var(--border);color:var(--t2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}

/* PRODUCT DETAIL SHEET */
.prod-img-big{width:100%;height:220px;object-fit:cover;display:block;}
.prod-img-fallback{width:100%;height:180px;display:flex;align-items:center;justify-content:center;font-size:80px;background:var(--s2);}
.prod-det-body{padding:16px 20px;}
.prod-det-name{font-family:var(--font-u);font-size:20px;font-weight:800;margin-bottom:6px;}
.prod-det-desc{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:12px;}
.prod-det-price{font-family:var(--font-d);font-size:32px;font-weight:900;color:var(--orange);margin-bottom:16px;}
.sec-label{font-family:var(--font-u);font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.adic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.adic-opt{padding:12px 10px;border-radius:14px;border:1.5px solid var(--border);background:var(--s2);cursor:pointer;text-align:center;transition:all .18s;position:relative;}
.adic-opt.on{border-color:var(--accent);background:rgba(232,52,28,.08);}
.adic-opt.on::after{content:'✓';position:absolute;top:6px;right:8px;font-size:10px;font-weight:800;color:var(--accent);}
.adic-emo{font-size:24px;margin-bottom:4px;}
.adic-nm{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:2px;}
.adic-pr{font-size:12px;color:var(--orange);font-weight:700;font-family:var(--font-d);}
.salsa-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
.sopt{padding:7px 14px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-u);white-space:nowrap;transition:all .15s;}
.sopt.on{background:var(--orange);border-color:var(--orange);color:#fff;}
.qty-det-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.qty-det-ctrl{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:8px 16px;}
.qdb{width:36px;height:36px;border-radius:10px;border:none;background:var(--s3);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qdb.p{background:var(--accent);}
.qdn{font-family:var(--font-d);font-size:24px;font-weight:700;min-width:28px;text-align:center;}
.qty-det-total{font-family:var(--font-d);font-size:24px;font-weight:900;color:var(--orange);}

/* CART */
.ci-list{padding:8px 20px;}
.ci-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.ci-row:last-child{border:none;}
.ci-emo{font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-family:var(--font-u);font-size:13px;font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-unit{font-size:11px;color:var(--t2);}
.ci-ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.cib{width:28px;height:28px;border-radius:9px;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font-u);transition:all .12s;}
.cib.m{background:var(--s2);color:var(--t2);border:1px solid var(--border);}
.cib.p{background:var(--accent);color:#fff;}
.ci-n{font-family:var(--font-d);font-size:17px;font-weight:700;min-width:14px;text-align:center;}

/* FORM */
.fsec{padding:14px 20px;}
.fl{font-family:var(--font-u);font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;display:block;}
.fi{width:100%;padding:13px 15px;background:var(--s2);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-family:var(--font-b);font-size:14px;outline:none;transition:border-color .15s;margin-bottom:13px;box-sizing:border-box;}
.fi:focus{border-color:rgba(232,52,28,.6);}
.fi::placeholder{color:var(--t3);}
textarea.fi{resize:none;min-height:64px;}

/* BARRIO SEARCH */
.barrio-wrap{position:relative;margin-bottom:13px;}
.barrio-wrap .fi{margin:0;}
.barrio-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s1);border:1px solid var(--border2);border-radius:14px;z-index:50;display:none;max-height:200px;overflow-y:auto;}
.barrio-drop.show{display:block;}
.barrio-item{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;cursor:pointer;border-bottom:1px solid var(--border);}
.barrio-item:last-child{border:none;}
.barrio-item:hover{background:rgba(232,52,28,.08);}
.barrio-nm{font-size:13px;font-weight:700;}
.barrio-zona{font-size:11px;color:var(--t2);margin-top:1px;}
.barrio-price{font-size:14px;font-weight:900;color:var(--orange);font-family:var(--font-d);}

/* FIDELIDAD */
.fid-box{display:none;align-items:center;gap:10px;padding:12px 14px;border-radius:14px;margin-bottom:13px;border:1px solid;}
.fid-box.show{display:flex;}

/* PAGO */
.pago-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.popt{padding:12px 8px;border-radius:14px;border:1.5px solid var(--border);background:transparent;color:var(--t2);font-family:var(--font-u);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .18s;}
.popt .pi{font-size:22px;display:block;margin-bottom:4px;}
.popt.on{border-color:var(--accent);background:rgba(232,52,28,.1);color:var(--text);}
.pago-info{display:none;background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);border-radius:13px;padding:12px 15px;margin-bottom:12px;font-size:13px;line-height:1.8;}
.pago-info.show{display:block;}
.uzone{border:2px dashed var(--border2);border-radius:15px;padding:20px;text-align:center;cursor:pointer;transition:all .22s;margin-bottom:12px;position:relative;}
.uzone.done{border-color:var(--green);background:rgba(34,197,94,.05);}
.uzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.uz-txt{font-family:var(--font-u);font-size:13px;color:var(--t2);font-weight:600;}
.uz-prev{width:100%;border-radius:10px;max-height:140px;object-fit:cover;margin-top:10px;display:none;}

/* TOTALES */
.tot-box{margin:0 20px;background:var(--s2);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.tot-row{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;font-size:13px;border-bottom:1px solid var(--border);}
.tot-row:last-child{border:none;}
.tot-l{color:var(--t2);}
.tot-v{font-family:var(--font-u);font-weight:600;}
.tot-grand{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;}
.tg-l{font-family:var(--font-d);font-size:20px;letter-spacing:1px;}
.tg-v{font-family:var(--font-d);font-size:30px;color:var(--orange);}

/* CTA */
.cta-btn{width:calc(100% - 40px);margin:14px 20px calc(24px + env(safe-area-inset-bottom));padding:17px;background:linear-gradient(135deg,var(--accent),#c42912);border:none;border-radius:16px;color:#fff;font-family:var(--font-u);font-size:15px;font-weight:700;cursor:pointer;transition:all .18s;box-shadow:0 8px 24px rgba(232,52,28,.3);}
.cta-btn:active{transform:scale(.98);}
.cta-btn:disabled{background:var(--s2);color:var(--t3);box-shadow:none;}

/* SUCCESS */
#succ{display:none;position:fixed;inset:0;background:var(--bg);z-index:400;flex-direction:column;align-items:center;overflow-y:auto;}
#succ.show{display:flex;}
.succ-top{padding:64px 24px 24px;text-align:center;}
.succ-ico{font-size:72px;margin-bottom:14px;display:block;animation:sp .6s cubic-bezier(.175,.885,.32,1.275) both;}
@keyframes sp{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.succ-title{font-family:var(--font-d);font-size:42px;font-weight:900;letter-spacing:2px;margin-bottom:8px;}
.succ-sub{font-size:14px;color:var(--t2);line-height:1.6;}
.ord-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:18px 24px;margin:0 24px 16px;text-align:center;width:calc(100% - 48px);position:relative;overflow:hidden;}
.ord-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--orange));}
.ord-lbl{font-family:var(--font-u);font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;}
.ord-num{font-family:var(--font-d);font-size:56px;color:var(--orange);font-weight:900;letter-spacing:4px;}
.track-wrap{padding:4px 24px;width:100%;}
.tstep{display:flex;align-items:center;gap:14px;padding:12px 15px;border-radius:15px;background:var(--s1);margin-bottom:8px;transition:all .35s;border:1px solid transparent;}
.tstep.done{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.15);}
.tstep.act{background:rgba(232,52,28,.07);border-color:rgba(232,52,28,.2);}
.ts-dot{width:10px;height:10px;border-radius:50%;background:var(--s3);flex-shrink:0;transition:background .3s;}
.tstep.done .ts-dot{background:var(--green);}
.tstep.act .ts-dot{background:var(--accent);}
.ts-lbl{font-family:var(--font-u);font-size:13px;font-weight:600;color:var(--t3);transition:color .3s;}
.tstep.done .ts-lbl{color:var(--green);}
.tstep.act .ts-lbl{color:var(--accent);}
.nuevo-btn{margin:10px 24px 48px;width:calc(100% - 48px);padding:16px;background:var(--s1);border:1.5px solid var(--border2);border-radius:16px;color:var(--text);font-family:var(--font-u);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}

/* BEBIDA SUGGEST */
#bsug{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:440px;background:var(--s1);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:16px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none;}
#bsug.show{display:block;}
.bsug-title{font-weight:800;font-size:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.bsug-close{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;padding:2px;}
.bsug-items{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.bsug-items::-webkit-scrollbar{display:none;}
.bsug-item{flex-shrink:0;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;cursor:pointer;text-align:center;min-width:90px;transition:background .2s;}
.bsug-item:active{background:rgba(232,52,28,.15);}
.bsug-nm{font-size:11px;font-weight:700;margin-bottom:4px;}
.bsug-pr{font-size:13px;font-weight:900;color:var(--orange);font-family:var(--font-d);}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(20,17,24,.97);color:var(--text);padding:11px 20px;border-radius:13px;font-family:var(--font-u);font-size:13px;font-weight:600;z-index:700;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08);opacity:0;pointer-events:none;transition:all .28s;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:52px 20px;color:var(--t3);}
.empty-ico{font-size:48px;margin-bottom:12px;opacity:.5;}
.empty-txt{font-size:14px;font-weight:300;line-height:1.6;}
.sp{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
#mesaField{display:none;}
</style>
</head>
<body>

<div id="ls"><div class="ls-logo">LA<span>CURVA</span></div><div class="ls-bar"><div class="ls-prog"></div></div></div>
<div class="toast" id="toast"></div>

<header class="hdr" id="hdr">
  <div class="hdr-logo" id="hdLogo">LA<span>CURVA</span></div>
  <button class="hdr-cart" id="cartBtn" onclick="abrirCarrito()">
    <span>🛒</span>
    <span class="hdr-cart-n" id="cartN">0</span>
    <span class="hdr-cart-t" id="cartT"></span>
  </button>
</header>

<div class="hero" id="heroSection">
  <div class="hero-fallback" id="heroFallback">🍔</div>
  <div class="hero-ov"></div>
  <div class="hero-c">
    <div class="hero-tag" id="heroTag">🔥 <span id="heroTagTxt"></span></div>
    <div class="hero-name" id="heroName">LA CURVA</div>
    <div class="hero-sub" id="heroSub">Street Food · Sabor inigualable</div>
  </div>
</div>

<div class="tipo-wrap">
  <div class="tipo-row">
    <button class="tbtn on" id="t-domicilio" onclick="setTipo('domicilio')"><span>🛵</span>Domicilio</button>
    <button class="tbtn" id="t-recoger" onclick="setTipo('recoger')"><span>🏪</span>Recoger</button>
    <button class="tbtn" id="t-mesa" onclick="setTipo('mesa')" style="display:none"><span>🪑</span>Mesa</button>
  </div>
</div>

<div class="promos-wrap" id="promosWrap">
  <div class="promos-scroll" id="promosScroll"></div>
  <div class="promo-dots" id="promoDots"></div>
</div>

<div class="menu-sticky">
  <div class="search-wrap">
    <input type="search" id="searchBar" placeholder="🔍 Buscar producto..." oninput="buscar(this.value)" autocomplete="off">
  </div>
  <div class="cats-row" id="catsRow"></div>
</div>

<div class="prods-area" id="prodsArea"></div>

<div class="fbar" id="fbar">
  <button class="fbar-btn" onclick="abrirCarrito()">
    <div class="fbar-left">
      <span class="fbar-badge" id="fbarN">0</span>
      <span class="fbar-label">Ver pedido</span>
    </div>
    <span class="fbar-total" id="fbarT">$0</span>
  </button>
</div>

<!-- PRODUCT DETAIL SHEET -->
<div class="ov" id="detOv" onclick="cerrarDet()"></div>
<div class="sheet" id="detSheet">
  <span class="sh-handle"></span>
  <div id="detContent"></div>
</div>

<!-- CART SHEET -->
<div class="ov" id="cartOv" onclick="cerrarCarrito()"></div>
<div class="sheet" id="cartSheet">
  <span class="sh-handle"></span>
  <div class="sh-head">
    <div class="sh-title">Tu Pedido</div>
    <button class="sh-close" onclick="cerrarCarrito()">✕</button>
  </div>
  <div class="ci-list" id="ciList"></div>
  <div class="fsec">
    <label class="fl">Tu nombre</label>
    <input class="fi" id="iNombre" placeholder="¿Cómo te llamas?" oninput="chkCliente()">
    <label class="fl">WhatsApp</label>
    <input class="fi" id="iTel" placeholder="3001234567" type="tel" oninput="chkCliente()">
    <div class="fid-box" id="fidBox">
      <span id="fidIco"></span>
      <div><div id="fidName" style="font-family:var(--font-u);font-size:14px;font-weight:700;"></div><div id="fidLvl" style="font-size:11px;opacity:.65;"></div></div>
    </div>
    <div id="domFields">
      <label class="fl">Dirección</label>
      <input class="fi" id="iDir" placeholder="Calle, número, referencias">
      <label class="fl">Barrio (para calcular domicilio)</label>
      <div class="barrio-wrap">
        <input class="fi" id="iBarrio" placeholder="Escribe tu barrio..." oninput="buscarBarrio(this.value)" autocomplete="off">
        <div class="barrio-drop" id="barrioDrop"></div>
      </div>
    </div>
    <div id="mesaField">
      <label class="fl">Número de mesa</label>
      <input class="fi" id="iMesa" placeholder="Ej: 5" type="number">
    </div>
    <label class="fl">Notas especiales</label>
    <textarea class="fi" id="iNotas" placeholder="Sin cebolla, bien cocido..."></textarea>
    <label class="fl">Método de pago</label>
    <div class="pago-grid">
      <button class="popt" id="p-nequi" onclick="setPago('nequi')"><span class="pi">📱</span>Nequi</button>
      <button class="popt" id="p-bancolombia" onclick="setPago('bancolombia')"><span class="pi">🏦</span>Bancolombia</button>
      <button class="popt" id="p-efectivo" onclick="setPago('efectivo')"><span class="pi">💵</span>Efectivo</button>
      <button class="popt" id="p-datafono" onclick="setPago('datafono')" style="display:none"><span class="pi">💳</span>Datáfono</button>
    </div>
    <div class="pago-info" id="pagoInfo"></div>
    <div id="compWrap" style="display:none">
      <label class="fl">Comprobante</label>
      <div class="uzone" id="uzone">
        <input type="file" id="compFile" accept="image/*" onchange="handleComp(event)">
        <div class="uz-txt">📎 Toca para subir comprobante</div>
        <img class="uz-prev" id="uzPrev">
      </div>
    </div>
  </div>
  <div class="tot-box" id="totBox"></div>
  <div class="tot-grand"><span class="tg-l">TOTAL</span><span class="tg-v" id="totV">$0</span></div>
  <button class="cta-btn" id="ctaBtn" onclick="enviar()">Confirmar pedido →</button>
</div>

<!-- BEBIDA SUGGEST -->
<div id="bsug">
  <div class="bsug-title">🥤 ¿Agregas una bebida? <button class="bsug-close" onclick="cerrarBsug()">✕</button></div>
  <div class="bsug-items" id="bsugItems"></div>
</div>

<!-- SUCCESS -->
<div id="succ">
  <div class="succ-top">
    <span class="succ-ico">🎉</span>
    <div class="succ-title">¡Pedido Recibido!</div>
    <div class="succ-sub" id="succMsg"></div>
  </div>
  <div class="ord-box"><div class="ord-lbl">Número de pedido</div><div class="ord-num" id="ordNum">#000</div></div>
  <div class="track-wrap">
    <div class="tstep act" id="ts-confirmado"><div class="ts-dot"></div><div class="ts-lbl">✅ Recibido</div></div>
    <div class="tstep" id="ts-preparando"><div class="ts-dot"></div><div class="ts-lbl">🔥 En preparación</div></div>
    <div class="tstep" id="ts-listo"><div class="ts-dot"></div><div class="ts-lbl">🎉 Listo</div></div>
    <div class="tstep" id="ts-camino"><div class="ts-dot"></div><div class="ts-lbl">🛵 En camino</div></div>
    <div class="tstep" id="ts-entregado"><div class="ts-dot"></div><div class="ts-lbl">🏠 Entregado</div></div>
  </div>
  <button class="nuevo-btn" onclick="nuevoPedido()">+ Hacer otro pedido</button>
</div>

<script>
// ── CONFIG ──
var SU="https://vbxuwzcfzfjwhllkppkg.supabase.co";
var SK="sb_publishable_I5lP9lq6-6t0B0K0PmjyWQ_RiIxiJM5";

// ── STATE ──
var rest=null, menuItems=[], carrito={}, tipoPedido="domicilio";
var pagoSel=null, compB64=null, descVal=0, descTipo=null;
var catActiva="todas", zonasData=[], domicilioSel=null;
var clienteData=null, chkTimer=null, trackId=null, trackTimer=null;
var detItem=null, adicSel={}, salsaSel=null, detQty=1;
var bsugTimer=null, addCount=0;

// ── ADICIONALES ──
var ADICIONALES=[
  {id:"queso",nombre:"Queso tajado",precio:1600,emoji:"🧀"},
  {id:"tocineta",nombre:"Tocineta",precio:2000,emoji:"🥓"},
  {id:"jamon",nombre:"Jamón",precio:2000,emoji:"🍖"},
  {id:"maduro",nombre:"Maduro calado",precio:3000,emoji:"🍌"},
  {id:"jalapenos",nombre:"Jalapeños",precio:2000,emoji:"🌶️"},
  {id:"maiz",nombre:"Maíz pira",precio:6000,emoji:"🌽"},
  {id:"salchicha",nombre:"Salchicha",precio:6000,emoji:"🌭"},
  {id:"ranchera",nombre:"Salsa Ranchera",precio:4000,emoji:"🫙"}
];
var SALSAS=["BBQ","Buffalo","Mango Habanero","Teriyaki","Ajo Parmesano","Honey Mustard","Picante clásica","Sin salsa"];
var PROMOS_DEFAULT=[
  {titulo:"Pague 2 Lleve 3",desc:"En Hamburguesas Tradicionales la tercera es gratis",color1:"#7c1a08",color2:"#3d0d04",emoji:"🍔"},
  {titulo:"Domicilio Gratis",desc:"En pedidos mayores a $100.000",color1:"#0a2a1a",color2:"#051409",emoji:"🛵"},
  {titulo:"Acumula Puntos",desc:"Acumula y canjea productos gratis",color1:"#1a1408",color2:"#0a0904",emoji:"⭐"}
];

// ── UTILS ──
function fmt(n){return "$"+Number(n).toLocaleString("es-CO");}
function gp(k){return new URLSearchParams(window.location.search).get(k);}
function esc(s){return (s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function esBebida(cat){return (cat||"").toLowerCase().includes("bebida");}
function esAdic(cat){return (cat||"").toLowerCase().includes("adicional");}
function esAlita(nombre){return (nombre||"").toLowerCase().includes("alita");}
function api(t,q){return fetch(SU+"/rest/v1/"+t+"?"+q,{headers:{"apikey":SK,"Authorization":"Bearer "+SK}}).then(function(r){return r.json();});}

// ── INIT ──
window.addEventListener("scroll",function(){
  document.getElementById("hdr").classList.toggle("scrolled",window.scrollY>200);
},{passive:true});

window.addEventListener("load",async function(){
  var restId=gp("rest")||gp("r");
  var mesa=gp("mesa")||gp("m");
  if(mesa){document.getElementById("t-mesa").style.display="flex";setTipo("mesa");document.getElementById("iMesa").value=mesa;}
  try{
    var url="/api/restaurante"+(restId?"?id="+encodeURIComponent(restId):"");
    var rs=await fetch(url).then(function(r){return r.json();});
    if(rs&&rs.length){rest=rs[0];aplicarRest();}
    await Promise.all([cargarMenu(),cargarZonas()]);
  }catch(e){console.error("init error:",e);}
  setTimeout(function(){
    var l=document.getElementById("ls");
    l.classList.add("out");
    setTimeout(function(){l.style.display="none";},600);
  },800);
});

function aplicarRest(){
  if(!rest)return;
  var n=rest.nombre||"La Curva Street Food";
  document.title=n;
  document.getElementById("heroName").textContent=n.toUpperCase();
  document.getElementById("heroSub").textContent=rest.descripcion||"Street Food · Sabor inigualable";
  if(rest.logo_url){
    document.getElementById("hdLogo").innerHTML='<img src="'+rest.logo_url+'" alt="logo">';
  }
  if(rest.imagen_hero||rest.imagen_url){
    var img=document.createElement("img");
    img.src=rest.imagen_hero||rest.imagen_url;
    img.alt="hero";
    var hs=document.getElementById("heroSection");
    hs.insertBefore(img,hs.firstChild);
    document.getElementById("heroFallback").style.display="none";
  }
  // promo del día
  var dias=["domingo","lunes","martes","miercoles","jueves","viernes","sabado"];
  var hoy=dias[new Date().getDay()];
  if(rest.promos_semanales){
    var lp=(rest.promos_semanales||"").split("\n").find(function(l){return l.toLowerCase().includes(hoy);});
    if(lp){
      var txt=lp.replace(/^[-*\s]*/,"").replace(/^(lunes|martes|miercoles|jueves|viernes|sabado|domingo):\s*/i,"");
      var tag=document.getElementById("heroTag");
      tag.classList.add("show");
      document.getElementById("heroTagTxt").textContent=txt;
    }
  }
  cargarPromos();
}

function cargarPromos(){
  var promos=PROMOS_DEFAULT;
  if(rest){var raw=rest.banners_json||rest.promos_json;if(raw){try{promos=JSON.parse(raw);}catch(e){}}}
  if(!promos||!promos.length)return;
  document.getElementById("promosWrap").classList.add("show");
  document.getElementById("promosScroll").innerHTML=promos.map(function(p){
    return '<div class="promo-card" style="background:linear-gradient(140deg,'+(p.color1||"#1a0a05")+','+(p.color2||"#0a0504")+')">'
      +'<div class="promo-inner"><span style="font-size:26px;display:block;margin-bottom:8px">'+(p.emoji||"🔥")+'</span>'
      +'<div class="promo-badge">🔥 PROMO</div>'
      +'<div class="promo-title">'+p.titulo+'</div>'
      +'<div class="promo-desc">'+(p.desc||p.descripcion||"")+'</div>'
      +'</div></div>';
  }).join("");
  document.getElementById("promoDots").innerHTML=promos.map(function(_,i){
    return '<div class="pdot'+(i===0?" on":"")+'" id="pd'+i+'"></div>';
  }).join("");
  var sc=document.getElementById("promosScroll");
  sc.addEventListener("scroll",function(){
    var idx=Math.round(sc.scrollLeft/240);
    promos.forEach(function(_,i){var d=document.getElementById("pd"+i);if(d)d.classList.toggle("on",i===idx);});
  },{passive:true});
}

async function cargarMenu(){
  if(!rest)return;
  try{
    var r=await fetch("/api/menu?restaurante_id="+encodeURIComponent(rest.id));
    if(!r.ok)throw new Error("status "+r.status);
    var all=await r.json();
    menuItems=(all||[]).filter(function(i){return !esAdic(i.categoria);});
    console.log("Menu cargado:",menuItems.length,"productos");
  }catch(e){
    console.error("cargarMenu error:",e);
    menuItems=[];
  }
  renderCats();
  renderProds("todas");
}

async function cargarZonas(){
  if(!rest)return;
  try{
    var r=await fetch("/api/zonas?restaurante_id="+encodeURIComponent(rest.id));
    if(r.ok)zonasData=await r.json()||[];
  }catch(e){zonasData=[];}
}

// ── RENDER CATS ──
function renderCats(){
  var cats=["todas"];
  menuItems.forEach(function(i){if(cats.indexOf(i.categoria)===-1)cats.push(i.categoria);});
  document.getElementById("catsRow").innerHTML=cats.map(function(c){
    return '<button class="cat-pill'+(c===catActiva?" on":"")+'" onclick="setCat(\''+esc(c)+'\')">'
      +(c==="todas"?"🍽 Todo":c)+'</button>';
  }).join("");
}

function setCat(c){
  catActiva=c;
  document.getElementById("searchBar").value="";
  renderCats();
  renderProds(c);
}

// ── RENDER PRODUCTS ──
function renderProds(cat){
  var items=cat==="todas"?menuItems:menuItems.filter(function(i){return i.categoria===cat;});
  if(!items.length){
    document.getElementById("prodsArea").innerHTML='<div class="empty"><div class="empty-ico">🍽️</div><div class="empty-txt">Sin productos disponibles</div></div>';
    return;
  }
  var grupos={};
  items.forEach(function(i){
    if(!grupos[i.categoria])grupos[i.categoria]=[];
    grupos[i.categoria].push(i);
  });
  var h="";
  Object.keys(grupos).forEach(function(c){
    h+='<div class="cat-section">';
    if(cat==="todas"){
      h+='<div class="cat-hdr"><div class="cat-hdr-lbl">'+c+'</div><div class="cat-hdr-line"></div></div>';
    }
    if(esBebida(c)){
      h+='<div class="grid-h">';
      grupos[c].forEach(function(i){h+=renderBcard(i);});
      h+='</div>';
    } else {
      h+='<div class="grid-v">';
      grupos[c].forEach(function(i){h+=renderPcard(i);});
      h+='</div>';
    }
    h+='</div>';
  });
  document.getElementById("prodsArea").innerHTML=h;
}

function renderPcard(i){
  var qty=carrito[i.id]?carrito[i.id].qty:0;
  var imgHtml=i.imagen_url
    ?'<img src="'+i.imagen_url+'" loading="lazy" alt="'+i.nombre+'">'
    :'<div class="pcard-img-emoji">'+(i.emoji||"🍔")+'</div>';
  var ctrl=qty>0
    ?'<div class="qty-ctrl"><button class="qb" onclick="event.stopPropagation();cambiarQty(\''+i.id+'\',-1)">−</button><span class="qn">'+qty+'</span><button class="qb p" onclick="event.stopPropagation();cambiarQty(\''+i.id+'\',1)">+</button></div>'
    :'<button class="add-btn" onclick="event.stopPropagation();abrirDet(\''+i.id+'\')">+</button>';
  return '<div class="pcard'+(qty>0?" incart":"")+'" id="pc-'+i.id+'" onclick="abrirDet(\''+i.id+'\')">'
    +'<div class="pcard-body">'
    +'<div class="pcard-name">'+i.nombre+'</div>'
    +(i.descripcion?'<div class="pcard-desc">'+i.descripcion+'</div>':'')
    +'<div class="pcard-bot"><div class="pcard-price">'+fmt(i.precio)+'</div>'+ctrl+'</div>'
    +'</div>'
    +'<div class="pcard-img">'+(i.en_oferta?'<div class="oferta-tag">OFERTA</div>':'')+imgHtml+'</div>'
    +'</div>';
}

function renderBcard(i){
  var qty=carrito[i.id]?carrito[i.id].qty:0;
  var imgHtml=i.imagen_url?'<img src="'+i.imagen_url+'" alt="'+i.nombre+'" loading="lazy">':'';
  var ctrl=qty>0
    ?'<div class="qty-ctrl"><button class="qb" onclick="event.stopPropagation();cambiarQty(\''+i.id+'\',-1)">−</button><span class="qn">'+qty+'</span><button class="qb p" onclick="event.stopPropagation();cambiarQty(\''+i.id+'\',1)">+</button></div>'
    :'<button class="add-btn" onclick="event.stopPropagation();agregarDirecto(\''+i.id+'\','+i.precio+',\''+esc(i.nombre)+'\')">+</button>';
  return '<div class="bcard'+(qty>0?" incart":"")+'" id="pc-'+i.id+'" onclick="agregarDirecto(\''+i.id+'\','+i.precio+',\''+esc(i.nombre)+'\')">'
    +'<div class="bcard-img">'+(imgHtml||'<span style="font-size:28px">'+(i.emoji||"🥤")+'</span>')+'</div>'
    +'<div class="bcard-body">'
    +'<div class="bcard-name">'+i.nombre+'</div>'
    +(i.descripcion?'<div class="bcard-desc">'+i.descripcion+'</div>':'')
    +'<div class="bcard-bot"><div class="bcard-price">'+fmt(i.precio)+'</div>'+ctrl+'</div>'

// ── PRODUCT DETAIL SHEET ──
function abrirDet(id){
  var item=menuItems.find(function(i){return i.id===id;});
  if(!item)return;
  detItem=item;
  adicSel={};
  salsaSel=null;
  detQty=1;
  renderDet();
  document.getElementById("detOv").classList.add("on");
  document.getElementById("detSheet").classList.add("on");
}

function renderDet(){
  if(!detItem)return;
  var i=detItem;
  var extraTotal=Object.keys(adicSel).filter(function(k){return adicSel[k];})
    .reduce(function(s,k){var a=ADICIONALES.find(function(x){return x.id===k;});return s+(a?a.precio:0);},0);
  var total=(i.precio+extraTotal)*detQty;

  var imgHtml=i.imagen_url
    ?'<img class="prod-img-big" src="'+i.imagen_url+'" alt="'+i.nombre+'">'
    :'<div class="prod-img-fallback">'+(i.emoji||"🍔")+'</div>';

  var adicHtml='';
  var showAdic=!esBebida(i.categoria);
  if(showAdic){
    adicHtml='<div class="sec-label">Adicionales (opcional)</div>'
      +'<div class="adic-grid">'
      +ADICIONALES.map(function(a){
        return '<div class="adic-opt'+(adicSel[a.id]?' on':'')+'" onclick="toggleAdic(\''+a.id+'\')">'
          +'<div class="adic-emo">'+a.emoji+'</div>'
          +'<div class="adic-nm">'+a.nombre+'</div>'
          +'<div class="adic-pr">+'+fmt(a.precio)+'</div>'
          +'</div>';
      }).join("")
      +'</div>';
  }

  var salsaHtml='';
  if(esAlita(i.nombre)){
    salsaHtml='<div class="sec-label">Elige tu salsa</div>'
      +'<div class="salsa-row">'
      +SALSAS.map(function(s){
        return '<button class="sopt'+(salsaSel===s?' on':'')+'" onclick="toggleSalsa(\''+esc(s)+'\')">'
          +s+'</button>';
      }).join("")
      +'</div>';
  }

  document.getElementById("detContent").innerHTML=
    '<div class="sh-head"><div class="sh-title" style="font-size:18px;letter-spacing:0">'+i.nombre+'</div><button class="sh-close" onclick="cerrarDet()">✕</button></div>'
    +imgHtml
    +'<div class="prod-det-body">'
    +(i.descripcion?'<div class="prod-det-desc">'+i.descripcion+'</div>':'')
    +'<div class="prod-det-price">'+fmt(i.precio)+'</div>'
    +adicHtml
    +salsaHtml
    +'<div class="qty-det-row">'
    +'<div class="qty-det-ctrl">'
    +'<button class="qdb" onclick="cambiarDetQty(-1)">−</button>'
    +'<span class="qdn" id="detQn">'+detQty+'</span>'
    +'<button class="qdb p" onclick="cambiarDetQty(1)">+</button>'
    +'</div>'
    +'<div class="qty-det-total" id="detTotal">'+fmt(total)+'</div>'
    +'</div>'
    +'<button class="cta-btn" style="width:100%;margin:0 0 24px" onclick="confirmarDet()">Agregar al pedido →</button>'
    +'</div>';
}

function toggleAdic(id){
  adicSel[id]=!adicSel[id];
  renderDet();
}

function toggleSalsa(s){
  salsaSel=salsaSel===s?null:s;
  renderDet();
}

function cambiarDetQty(d){
  detQty=Math.max(1,detQty+d);
  renderDet();
}

function confirmarDet(){
  if(!detItem)return;
  var selArr=Object.keys(adicSel).filter(function(k){return adicSel[k];});
  var extraPrecio=selArr.reduce(function(s,k){var a=ADICIONALES.find(function(x){return x.id===k;});return s+(a?a.precio:0);},0);
  var extraNoms=selArr.map(function(k){var a=ADICIONALES.find(function(x){return x.id===k;});return a?a.nombre:"";}).filter(Boolean);
  var totalPrecio=detItem.precio+extraPrecio;
  var nomCompleto=detItem.nombre+(extraNoms.length?" + "+extraNoms.join(", "):"")+(salsaSel?" 🌶️ "+salsaSel:"");
  var id=detItem.id;
  if(!carrito[id])carrito[id]={qty:0,precio:totalPrecio,nombre:nomCompleto};
  carrito[id].qty+=detQty;
  carrito[id].precio=totalPrecio;
  carrito[id].nombre=nomCompleto;
  actualizarUI();
  cerrarDet();
  sugerirBebida();
  toast("Agregado al carrito 🛒");
}

function cerrarDet(){
  document.getElementById("detOv").classList.remove("on");
  document.getElementById("detSheet").classList.remove("on");
  detItem=null;
}

// ── AGREGAR DIRECTO (bebidas) ──
function agregarDirecto(id,precio,nombre){
  if(!carrito[id])carrito[id]={qty:0,precio:precio,nombre:nombre};
  carrito[id].qty++;
  actualizarUI();
  toast(nombre+" agregado 🛒");
}

function cambiarQty(id,d){
  if(!carrito[id])return;
  var q=carrito[id].qty+d;
  if(q<=0){delete carrito[id];}
  else{carrito[id].qty=q;}
  actualizarUI();
}

// ── UPDATE UI ──
function actualizarUI(){
  var items=Object.values(carrito);
  var count=items.reduce(function(s,i){return s+i.qty;},0);
  var total=items.reduce(function(s,i){return s+i.precio*i.qty;},0);
  var btn=document.getElementById("cartBtn");
  document.getElementById("cartN").textContent=count;
  document.getElementById("cartT").textContent=fmt(total);
  btn.classList.toggle("on",count>0);
  var fbar=document.getElementById("fbar");
  fbar.classList.toggle("show",count>0);
  if(count>0){
    document.getElementById("fbarN").textContent=count;
    document.getElementById("fbarT").textContent=fmt(total);
  }
  // actualizar tarjetas visibles
  menuItems.forEach(function(item){
    var el=document.getElementById("pc-"+item.id);
    if(!el)return;
    var qty=carrito[item.id]?carrito[item.id].qty:0;
    el.classList.toggle("incart",qty>0);
    var pcard=el.classList.contains("pcard");
    var bot=el.querySelector(".pcard-bot,.bcard-bot");
    if(!bot)return;
    var price=bot.querySelector(".pcard-price,.bcard-price");
    var priceHtml=price?price.outerHTML:"";
    var ctrl=qty>0
      ?'<div class="qty-ctrl"><button class="qb" onclick="event.stopPropagation();cambiarQty(\''+item.id+'\',-1)">−</button><span class="qn">'+qty+'</span><button class="qb p" onclick="event.stopPropagation();cambiarQty(\''+item.id+'\',1)">+</button></div>'
      :(pcard
        ?'<button class="add-btn" onclick="event.stopPropagation();abrirDet(\''+item.id+'\')">+</button>'
        :'<button class="add-btn" onclick="event.stopPropagation();agregarDirecto(\''+esc(item.id)+'\','+item.precio+',\''+esc(item.nombre)+'\')">+</button>');
    bot.innerHTML=priceHtml+ctrl;
  });
}

function buscarBarrio(q){

  var ql=q.toLowerCase().trim();

  (zonasData||[]).forEach(function(z){

      ?z.barrios.split(",").map(function(b){return b.trim();})

    return '<div class="barrio-item" onclick="selBarrio(\''+esc(r.barrio)+'\',\''+esc(r.zona)+'\','+r.precio+')">'

// ── TOTALES ──
function calcularTotales(){
  var items=Object.values(carrito);
  var sub=items.reduce(function(s,i){return s+i.precio*i.qty;},0);
  var des=tipoPedido!=="mesa"?items.filter(function(ci){
    var m=menuItems.find(function(x){return x.id===ci.id;});
    return m&&!m.es_bebida&&!esBebida(m.categoria||"");
  }).length*500:0;
  var dom=0;
  if(tipoPedido==="domicilio"){
    dom=domicilioSel?domicilioSel.precio:(rest&&rest.domicilio_base?Number(rest.domicilio_base):4000);
  }
  var dsc=0;
  if(descVal>0&&descTipo)dsc=descTipo==="porcentaje"?Math.round(sub*descVal/100):descVal;
  var total=sub+des+dom-dsc;
  var h="";
  if(sub)h+='<div class="tot-row"><span class="tot-l">Subtotal</span><span class="tot-v">'+fmt(sub)+'</span></div>';
  if(des)h+='<div class="tot-row"><span class="tot-l">Desechables</span><span class="tot-v">'+fmt(des)+'</span></div>';
  if(dom)h+='<div class="tot-row"><span class="tot-l">Domicilio'+(domicilioSel?' · '+domicilioSel.barrio:'')+'</span><span class="tot-v">'+fmt(dom)+'</span></div>';
  if(dsc)h+='<div class="tot-row"><span class="tot-l" style="color:var(--green)">Descuento</span><span class="tot-v" style="color:var(--green)">−'+fmt(dsc)+'</span></div>';
  var totEl=document.getElementById("totBox");
  var totV=document.getElementById("totV");
  if(totEl)totEl.innerHTML=h;
  if(totV)totV.textContent=fmt(total);
}

// ── ENVIAR ──
async function enviar(){
  var items=Object.values(carrito);
  if(!items.length){toast("Agrega productos primero");return;}
  var nombre=document.getElementById("iNombre").value.trim();
  if(!nombre){toast("¿Cómo te llamas? 😊");document.getElementById("iNombre").focus();return;}
  if(!pagoSel){toast("Elige cómo vas a pagar");return;}
  if(tipoPedido==="domicilio"){
    var dir=document.getElementById("iDir").value.trim();
    if(!dir){toast("Dinos dónde entregamos 📍");document.getElementById("iDir").focus();return;}
  }
  if((pagoSel==="nequi"||pagoSel==="bancolombia")&&!compB64){toast("Sube tu comprobante 📎");return;}
  var btn=document.getElementById("ctaBtn");
  btn.disabled=true;btn.innerHTML='<span class="sp"></span>Enviando...';
  try{
    var sub=items.reduce(function(s,i){return s+i.precio*i.qty;},0);
    var des=tipoPedido!=="mesa"?items.filter(function(ci){var m=menuItems.find(function(x){return x.id===ci.id;});return m&&!m.es_bebida&&!esBebida(m.categoria||"");}).length*500:0;
    var dom=0;
    if(tipoPedido==="domicilio"){dom=domicilioSel?domicilioSel.precio:(rest&&rest.domicilio_base?Number(rest.domicilio_base):4000);}
    var dsc=0;if(descVal>0&&descTipo)dsc=descTipo==="porcentaje"?Math.round(sub*descVal/100):descVal;
    var total=sub+des+dom-dsc;
    var tel=document.getElementById("iTel").value.trim().replace(/\D/g,"")||"web-"+Date.now();
    var notas=document.getElementById("iNotas").value.trim();
    var dir=tipoPedido==="domicilio"
      ?(document.getElementById("iDir").value.trim()+(domicilioSel?" - Barrio: "+domicilioSel.barrio:""))
      :tipoPedido==="mesa"?"Mesa "+document.getElementById("iMesa").value
      :"RECOGER EN TIENDA";
    var compUrl=null;
    if(compB64){try{compUrl=await comprimirImg(compB64,600,.65);}catch(e){compUrl=compB64;}}
    var resp=await fetch("/api/pedido-manual",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        restaurante_id:rest.id,telefono:tel,nombre_cliente:nombre,
        items:items.map(function(i){return i.qty+"x "+i.nombre+" "+fmt(i.precio*i.qty);}),
        total,desechables:des,domicilio:dom,direccion:dir,
        metodo_pago:pagoSel,notas_especiales:notas||null,comprobante_url:compUrl
      })
    });
    if(!resp.ok)throw new Error("Error "+resp.status);
    var data=await resp.json();
    if(!data.ok)throw new Error(data.error||"Error desconocido");
    // Fidelidad
    var telFid=tel.replace(/^57/,"");
    if(rest&&telFid.length>=10){
      try{
        var tot=(clienteData?clienteData.total_pedidos:0)+1;
        var nv=tot>=25?"oro":tot>=10?"plata":"bronce";
        var ptsGanados=(rest&&rest.puntos_por_pedido)||10;
        var ptsTotales=(clienteData&&clienteData.puntos||0)+ptsGanados;
        await fetch(SU+"/rest/v1/clientes_frecuentes?on_conflict=restaurante_id,telefono",{
          method:"POST",
          headers:{"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates,return=minimal"},
          body:JSON.stringify({restaurante_id:rest.id,telefono:telFid,nombre_cliente:nombre,total_pedidos:tot,nivel_fidelidad:nv,puntos:ptsTotales,updated_at:new Date().toISOString()})
        });
      }catch(e){}
    }
    cerrarCarrito();
    mostrarExito(data.numero_pedido||"---",data.id||null,tipoPedido,nombre);
  }catch(e){
    console.error(e);toast("Error al enviar. Intenta de nuevo.");
    btn.disabled=false;btn.innerHTML="Confirmar pedido →";
  }
}

// ── SUCCESS ──
function mostrarExito(num,id,tipo,nombre){
  document.getElementById("ordNum").textContent="#"+num;
  var msg=tipo==="domicilio"?"Hola <b>"+nombre+"</b>! Pedido en preparación 🔥 Te avisamos cuando salga."
    :tipo==="mesa"?"<b>"+nombre+"</b>, pedido en cocina. Lo llevamos a tu mesa 🪑"
    :"<b>"+nombre+"</b>, pasa a recoger en unos minutos 🏪";
  document.getElementById("succMsg").innerHTML=msg;
  if(tipo!=="domicilio")document.getElementById("ts-camino").style.display="none";
  document.getElementById("succ").classList.add("show");
  trackId=id;
  if(id)trackTimer=setInterval(function(){actuTracking(id);},5000);
}

async function actuTracking(id){
  try{
    var d=await api("pedidos","id=eq."+id+"&select=estado");
    if(!d||!d.length)return;
    var est=d[0].estado;
    var order=["confirmado","en_preparacion","listo","en_camino","entregado"];
    var map={confirmado:"confirmado",en_preparacion:"preparando",listo:"listo",en_camino:"camino",entregado:"entregado"};
    var idx=order.indexOf(est);
    order.forEach(function(s,i){
      var el=document.getElementById("ts-"+map[s]);if(!el)return;
      el.classList.remove("done","act");
      if(i<idx)el.classList.add("done");
      else if(i===idx)el.classList.add("act");
    });
    if(est==="entregado")clearInterval(trackTimer);
  }catch(e){}
}

function nuevoPedido(){
  carrito={};pagoSel=null;compB64=null;descVal=0;descTipo=null;clienteData=null;domicilioSel=null;
  trackId=null;if(trackTimer){clearInterval(trackTimer);trackTimer=null;}
  document.getElementById("succ").classList.remove("show");
  document.getElementById("ts-camino").style.display="flex";
  actualizarUI();renderProds(catActiva);
}

// ── BEBIDA SUGGEST ──
function sugerirBebida(){
  var bebidas=menuItems.filter(function(i){return esBebida(i.categoria);});
  if(!bebidas.length)return;
  addCount++;
  if(addCount%3!==1)return;
  var wrap=document.getElementById("bsugItems");
  wrap.innerHTML="";
  bebidas.slice(0,6).forEach(function(b){
    var d=document.createElement("div");
    d.className="bsug-item";
    d.innerHTML='<div class="bsug-nm">'+b.nombre+'</div><div class="bsug-pr">'+fmt(b.precio)+'</div>';
    d.onclick=function(){agregarDirecto(b.id,b.precio,b.nombre);cerrarBsug();};
    wrap.appendChild(d);
  });
  var el=document.getElementById("bsug");
  el.classList.add("show");
  clearTimeout(bsugTimer);
  bsugTimer=setTimeout(cerrarBsug,10000);
}

function cerrarBsug(){
  document.getElementById("bsug").classList.remove("show");
  clearTimeout(bsugTimer);
}

// ── UTILS ──
function comprimirImg(b64,maxW,q){
  return new Promise(function(resolve){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement("canvas");
      var ratio=Math.min(maxW/img.width,maxW/img.height,1);
      canvas.width=img.width*ratio;canvas.height=img.height*ratio;
      canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
      resolve(canvas.toDataURL("image/jpeg",q||.7));
    };
    img.onerror=function(){resolve(b64);};
    img.src=b64;
  });
}

var _toastT=null;
function toast(msg){
  var el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(_toastT);
  _toastT=setTimeout(function(){el.classList.remove("show");},2600);
}
