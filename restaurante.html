<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LUZ IA — Mi Restaurante</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--surface:#161616;--card:#1e1e1e;--card2:#252525;--border:rgba(255,255,255,0.08);--orange:#ff6b2b;--orange2:#e55a1f;--green:#22c55e;--blue:#3b82f6;--amber:#f59e0b;--red:#ef4444;--white:#f0f0f0;--muted:#666;--muted2:#333}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--white);font-family:'Archivo',sans-serif;min-height:100vh;overflow-x:hidden}
#pinScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,rgba(255,107,43,0.12) 0%,transparent 65%);padding:20px}
.pin-box{width:100%;max-width:320px;text-align:center}
.pin-logo{font-family:'Archivo Black',sans-serif;font-size:42px;letter-spacing:-0.02em;margin-bottom:4px}
.pin-logo span{color:var(--orange)}
.pin-subtitle{font-size:13px;color:var(--muted);margin-bottom:40px}
.pin-display{display:flex;gap:12px;justify-content:center;margin-bottom:32px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--muted2);transition:all 0.2s}
.pin-dot.filled{background:var(--orange);border-color:var(--orange);transform:scale(1.1)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{aspect-ratio:1;background:var(--card);border:1px solid var(--border);border-radius:16px;font-size:22px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;user-select:none}
.key:active{background:var(--card2);transform:scale(0.94)}
.key.del{font-size:18px;color:var(--muted)}
.key.empty{background:transparent;border:none;cursor:default}
.pin-err{color:var(--red);font-size:13px;margin-top:16px;min-height:20px}
.pin-shake{animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
#app{display:none}
.topbar{position:sticky;top:0;z-index:100;background:rgba(13,13,13,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between}
.topbar-name{font-family:'Archivo Black',sans-serif;font-size:16px}
.topbar-name span{color:var(--orange)}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--green)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 0;transition:all 0.15s}
.nav-tab .ti{font-size:20px}
.nav-tab .tl{font-size:10px;color:var(--muted);font-weight:500}
.nav-tab.active .tl{color:var(--orange)}
.nav-tab.active .ti{transform:scale(1.1)}
.content{padding:16px 16px calc(80px + env(safe-area-inset-bottom))}
.page{display:none}
.page.active{display:block;animation:fadeUp 0.2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-tile{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.stl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.stv{font-family:'Archivo Black',sans-serif;font-size:28px}
.stv.orange{color:var(--orange)}
.stv.green{color:var(--green)}
.pedido-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.pnum{font-family:'Archivo Black',sans-serif;font-size:20px;color:var(--orange)}
.ptime{font-size:11px;color:var(--muted)}
.pbody{padding:14px 16px}
.pitem{font-size:13px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.pitem:last-child{border:none}
.pmeta{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.chip{background:var(--card2);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--muted)}
.ptotal{font-family:'Archivo Black',sans-serif;font-size:22px;color:var(--green);margin-bottom:12px}
.ebtns{display:flex;gap:8px;flex-wrap:wrap}
.ebtn{flex:1;min-width:100px;padding:12px 8px;border-radius:12px;font-family:'Archivo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;border:none;display:flex;align-items:center;justify-content:center;gap:5px}
.ebtn:active{transform:scale(0.96)}
.bp{background:rgba(59,130,246,0.25);color:#60a5fa;border:2px solid rgba(59,130,246,0.4)}
.bl{background:rgba(245,158,11,0.25);color:#fbbf24;border:2px solid rgba(245,158,11,0.4)}
.bc{background:rgba(34,197,94,0.25);color:#4ade80;border:2px solid rgba(34,197,94,0.4)}
.be{background:rgba(255,255,255,0.08);color:var(--muted);border:2px solid var(--border)}
.etag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tr{background:rgba(255,107,43,0.15);color:var(--orange)}
.tp{background:rgba(59,130,246,0.15);color:#60a5fa}
.tl2{background:rgba(245,158,11,0.15);color:#fbbf24}
.tc{background:rgba(34,197,94,0.15);color:#4ade80}
.te{background:rgba(255,255,255,0.08);color:var(--muted)}
.empty{text-align:center;padding:60px 20px}
.ei{font-size:48px;margin-bottom:12px}
.et{color:var(--muted);font-size:14px}
.mcat{margin-bottom:20px}
.mct{font-size:10px;color:var(--orange);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,107,43,0.2)}
.mitem{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.mitem:last-child{border:none}
.mname{font-size:14px;font-weight:500}
.mdesc{font-size:11px;color:var(--muted);margin-top:1px}
.mprice{font-weight:700;color:var(--green);font-size:14px;min-width:70px;text-align:right}
.tog{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;transition:all 0.2s;position:relative;flex-shrink:0}
.tog.on{background:var(--orange)}
.tog.off{background:var(--muted2)}
.tog::after{content:'';position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:white;transition:left 0.2s}
.tog.on::after{left:23px}
.tog.off::after{left:3px}
.aform{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px}
.aft{font-weight:700;font-size:15px;margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ffield{margin-bottom:10px}
.flabel{font-size:11px;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.06em}
.finput{width:100%;padding:10px 12px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'Archivo',sans-serif;font-size:14px;outline:none;transition:border 0.2s}
.finput:focus{border-color:var(--orange)}
.badd{width:100%;padding:13px;background:var(--orange);border:none;border-radius:12px;color:white;font-family:'Archivo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;margin-top:4px}
.badd:active{background:var(--orange2);transform:scale(0.98)}
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--orange);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.notif.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.hnum{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--orange)}
.hinfo{font-size:12px;color:var(--muted);margin-top:2px}
.htot{font-family:'Archivo Black',sans-serif;font-size:18px;color:var(--green)}
</style>
</head>
<body>
<div id="pinScreen">
  <div class="pin-box">
    <div class="pin-logo">LUZ <span>IA</span></div>
    <div class="pin-subtitle">Panel del Restaurante</div>
    <div class="pin-display">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-keypad">
      <div class="key" id="k1">1</div><div class="key" id="k2">2</div><div class="key" id="k3">3</div>
      <div class="key" id="k4">4</div><div class="key" id="k5">5</div><div class="key" id="k6">6</div>
      <div class="key" id="k7">7</div><div class="key" id="k8">8</div><div class="key" id="k9">9</div>
      <div class="key empty"></div><div class="key" id="k0">0</div><div class="key del" id="kdel">⌫</div>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div class="topbar-name" id="restNombre">Mi <span>Restaurante</span></div>
    <div class="live-badge"><div class="live-dot"></div> En vivo</div>
  </div>
  <div class="content">
    <div class="page active" id="page-pedidos">
      <div class="stats-row">
        <div class="stat-tile"><div class="stl">Pedidos hoy</div><div class="stv orange" id="countHoy">0</div></div>
        <div class="stat-tile"><div class="stl">Ventas hoy</div><div class="stv green" id="ventasHoy">$0</div></div>
      </div>
      <div id="pedidosLista"></div>
    </div>
    <div class="page" id="page-historial"><div id="historialLista"></div></div>
    <div class="page" id="page-menu">
      <div class="aform">
        <div class="aft">➕ Agregar producto</div>
        <div class="frow">
          <div class="ffield"><label class="flabel">Categoría</label><input class="finput" id="mi-cat" placeholder="Hamburguesas"></div>
          <div class="ffield"><label class="flabel">Nombre</label><input class="finput" id="mi-nombre" placeholder="La Especial"></div>
        </div>
        <div class="ffield"><label class="flabel">Descripción</label><input class="finput" id="mi-desc" placeholder="Ingredientes..."></div>
        <div class="frow">
          <div class="ffield"><label class="flabel">Precio</label><input class="finput" id="mi-precio" type="number" placeholder="18900"></div>
          <div class="ffield"><label class="flabel">Tipo</label>
            <select class="finput" id="mi-tipo"><option value="comida">Comida</option><option value="bebida">Bebida</option><option value="arepa">Arepa</option></select>
          </div>
        </div>
        <button class="badd" id="btnAdd">Guardar producto</button>
      </div>
      <div id="menuLista"></div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-tab active" id="tab-pedidos"><div class="ti">🛒</div><div class="tl">Pedidos</div></div>
    <div class="nav-tab" id="tab-historial"><div class="ti">📊</div><div class="tl">Historial</div></div>
    <div class="nav-tab" id="tab-menu"><div class="ti">📋</div><div class="tl">Mi Menú</div></div>
  </div>
</div>
<div class="notif" id="notif"></div>
<script>
var SU="https://vbxuwzcfzfjwhllkppkg.supabase.co",SK="sb_publishable_I5lP9lq6-6t0B0K0PmjyWQ_RiIxiJM5",SS="",rest=null,pin="",known={},timer=null;
var ESTADOS={confirmado:{l:"Recibido",c:"tr",n:"en_preparacion",bl:"🔵 Preparando",bc:"bp"},en_preparacion:{l:"Preparando",c:"tp",n:"listo",bl:"🟡 Listo",bc:"bl"},listo:{l:"Listo",c:"tl2",n:"en_camino",bl:"🛵 En camino",bc:"bc"},en_camino:{l:"En camino",c:"tc",n:"entregado",bl:"✅ Entregado",bc:"be"},entregado:{l:"Entregado",c:"te",n:null,bl:null,bc:null}};

function get(t,f){return fetch(SU+"/rest/v1/"+t+"?"+(f||""),{headers:{"apikey":SK,"Authorization":"Bearer "+SK}}).then(function(r){return r.json()});}
function patch(t,f,d){var k=SS||SK;return fetch(SU+"/rest/v1/"+t+"?"+f,{method:"PATCH",headers:{"apikey":k,"Authorization":"Bearer "+k,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify(d)}).then(function(r){if(!r.ok)return r.text().then(function(tx){throw new Error(tx)});return r});}
function post(t,d){var k=SS||SK;return fetch(SU+"/rest/v1/"+t,{method:"POST",headers:{"apikey":k,"Authorization":"Bearer "+k,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify(d)}).then(function(r){if(!r.ok)return r.text().then(function(tx){throw new Error(tx)});return r});}
function notif(m){var e=document.getElementById("notif");e.textContent=m;e.classList.add("show");setTimeout(function(){e.classList.remove("show")},2500);}
function fmt(n){return"$"+Number(n).toLocaleString("es-CO");}
function ago(d){var diff=Math.floor((Date.now()-new Date(d))/60000);return diff<1?"ahora":diff<60?diff+" min":Math.floor(diff/60)+"h";}
function bell(){try{var c=new(window.AudioContext||window.webkitAudioContext)();[[523,0],[659,0.18],[784,0.36]].forEach(function(n){var o=c.createOscillator(),g=c.createGain(),t=c.currentTime+n[1];o.type="sine";o.frequency.setValueAtTime(n[0],t);o.frequency.exponentialRampToValueAtTime(n[0]*0.5,t+1.2);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.35,t+0.01);g.gain.exponentialRampToValueAtTime(0.001,t+1.5);o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+1.5);});}catch(e){}}

// PIN
for(var i=0;i<=9;i++){(function(n){var el=document.getElementById("k"+n);if(el)el.addEventListener("click",function(){pinKey(String(n));});})(i);}
document.getElementById("kdel").addEventListener("click",function(){pin=pin.slice(0,-1);dots();});
function pinKey(k){if(pin.length>=4)return;pin+=k;dots();if(pin.length===4)setTimeout(chkPin,150);}
function dots(){for(var i=0;i<4;i++){var d=document.getElementById("d"+i);i<pin.length?d.classList.add("filled"):d.classList.remove("filled");}}
function chkPin(){
  get("restaurantes","pin=eq."+pin+"&estado=eq.activo&select=*").then(function(d){
    if(d&&d.length>0){rest=d[0];goApp();}
    else{document.getElementById("pinErr").textContent="PIN incorrecto";var b=document.querySelector(".pin-box");b.classList.add("pin-shake");setTimeout(function(){b.classList.remove("pin-shake");document.getElementById("pinErr").textContent="";},500);pin="";dots();}
  }).catch(function(){document.getElementById("pinErr").textContent="Error";pin="";dots();});
}
function goApp(){
  fetch("/supabase-write-key").then(function(r){return r.json();}).then(function(d){if(d.key)SS=d.key;}).catch(function(){});
  document.getElementById("pinScreen").style.display="none";
  document.getElementById("app").style.display="block";
  var p=rest.nombre.split(" "),l=p.pop();
  document.getElementById("restNombre").innerHTML=p.join(" ")+" <span>"+l+"</span>";
  loadPedidos();loadStats();
  timer=setInterval(function(){loadPedidos();loadStats();},15000);
}

// TABS
document.getElementById("tab-pedidos").addEventListener("click",function(){showTab("pedidos");});
document.getElementById("tab-historial").addEventListener("click",function(){showTab("historial");});
document.getElementById("tab-menu").addEventListener("click",function(){showTab("menu");});
function showTab(n){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".nav-tab").forEach(function(t){t.classList.remove("active");});
  document.getElementById("page-"+n).classList.add("active");
  document.getElementById("tab-"+n).classList.add("active");
  if(n==="historial")loadHistorial();
  if(n==="menu")loadMenu();
}

// PEDIDOS
function loadPedidos(){
  if(!rest)return;
  get("pedidos","restaurante_id=eq."+rest.id+"&estado=neq.entregado&order=created_at.desc&limit=20").then(function(pedidos){
    pedidos.forEach(function(p){if(!known[p.id]&&Object.keys(known).length>0){notif("🛒 Pedido #"+p.numero_pedido);bell();}known[p.id]=true;});
    var lista=document.getElementById("pedidosLista");
    if(!pedidos.length){lista.innerHTML='<div class="empty"><div class="ei">🍔</div><div class="et">No hay pedidos activos.<br>Los nuevos aparecen aquí.</div></div>';return;}
    var h="";
    pedidos.forEach(function(p){
      var cfg=ESTADOS[p.estado]||ESTADOS.confirmado;
      var items=Array.isArray(p.items)?p.items:[];
      h+='<div class="pedido-card">';
      h+='<div class="ph"><div><div class="pnum">#'+p.numero_pedido+'</div><div class="ptime">'+ago(p.created_at)+'</div></div><span class="etag '+cfg.c+'">'+cfg.l+'</span></div>';
      h+='<div class="pbody">';
      h+='<div>'+items.map(function(i){return'<div class="pitem">• '+i+'</div>';}).join("")+'</div>';
      h+='<div class="pmeta">';
      h+='<div class="chip">📍 '+(p.direccion||"Sin dirección")+'</div>';
      if(p.cliente_tel)h+='<div class="chip">📱 '+p.cliente_tel+'</div>';
      if(p.metodo_pago)h+='<div class="chip">💳 '+p.metodo_pago+'</div>';
      h+='</div>';
      h+='<div class="ptotal">'+fmt(p.total)+'</div>';
      h+='<div class="ebtns">';
      if(cfg.n)h+='<button class="ebtn '+cfg.bc+'" data-id="'+p.id+'" data-e="'+cfg.n+'" data-t="'+(p.cliente_tel||"")+'">'+cfg.bl+'</button>';
      if(p.estado!=="entregado")h+='<button class="ebtn be" data-id="'+p.id+'" data-e="entregado" data-t="'+(p.cliente_tel||"")+'">✅ Entregado</button>';
      h+='</div></div></div>';
    });
    lista.innerHTML=h;
    lista.querySelectorAll(".ebtn").forEach(function(b){
      b.addEventListener("click",function(e){
        e.stopPropagation();
        cambiarEstado(this.getAttribute("data-id"),this.getAttribute("data-e"),this.getAttribute("data-t"));
      });
    });
  }).catch(function(e){console.error(e);});
}

function cambiarEstado(id,estado,tel){
  notif("Actualizando...");
  patch("pedidos","id=eq."+id,{estado:estado}).then(function(){
    if(estado==="en_camino"&&tel){
      fetch("/notificar-cliente",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({telefono:tel})}).catch(function(){});
      notif("🛵 Cliente notificado!");
    }else{notif("✓ Listo");}
    loadPedidos();loadStats();
  }).catch(function(e){notif("❌ "+e.message.substring(0,40));});
}

function loadStats(){
  if(!rest)return;
  var h=new Date().toISOString().split("T")[0];
  get("pedidos","restaurante_id=eq."+rest.id+"&created_at=gte."+h+"T00:00:00&select=total").then(function(p){
    document.getElementById("countHoy").textContent=p.length;
    document.getElementById("ventasHoy").textContent=fmt(p.reduce(function(s,x){return s+Number(x.total)},0));
  }).catch(function(){});
}

function loadHistorial(){
  if(!rest)return;
  get("pedidos","restaurante_id=eq."+rest.id+"&order=created_at.desc&limit=30").then(function(ps){
    var l=document.getElementById("historialLista");
    if(!ps.length){l.innerHTML='<div class="empty"><div class="ei">📊</div><div class="et">No hay pedidos aún</div></div>';return;}
    var tot=ps.reduce(function(s,p){return s+Number(p.total)},0);
    var h='<div class="stats-row" style="margin-bottom:16px"><div class="stat-tile"><div class="stl">Total pedidos</div><div class="stv orange">'+ps.length+'</div></div><div class="stat-tile"><div class="stl">Total ventas</div><div class="stv green" style="font-size:18px">'+fmt(tot)+'</div></div></div>';
    ps.forEach(function(p){
      var cfg=ESTADOS[p.estado]||ESTADOS.confirmado;
      h+='<div class="hcard"><div><div class="hnum">#'+p.numero_pedido+'</div><div class="hinfo">'+(p.cliente_tel||"—")+" · "+(p.metodo_pago||"—")+'</div><div class="hinfo">'+new Date(p.created_at).toLocaleString("es-CO",{dateStyle:"short",timeStyle:"short"})+'</div></div><div style="text-align:right"><div class="htot">'+fmt(p.total)+'</div><span class="etag '+cfg.c+'" style="font-size:10px">'+cfg.l+'</span></div></div>';
    });
    l.innerHTML=h;
  }).catch(function(){});
}

function loadMenu(){
  if(!rest)return;
  get("menu_items","restaurante_id=eq."+rest.id+"&order=categoria,orden").then(function(items){
    var l=document.getElementById("menuLista");
    if(!items.length){l.innerHTML='<div class="empty"><div class="ei">📋</div><div class="et">Agrega tu primer producto</div></div>';return;}
    var g={};
    items.forEach(function(i){if(!g[i.categoria])g[i.categoria]=[];g[i.categoria].push(i);});
    var h="";
    Object.keys(g).forEach(function(cat){
      h+='<div class="mcat"><div class="mct">'+cat+'</div>';
      g[cat].forEach(function(i){
        h+='<div class="mitem"><div style="flex:1"><div class="mname">'+i.nombre+'</div><div class="mdesc">'+(i.descripcion||"")+'</div></div><div class="mprice">'+fmt(i.precio)+'</div><button class="tog '+(i.disponible?"on":"off")+'" data-iid="'+i.id+'" data-d="'+i.disponible+'"></button></div>';
      });
      h+='</div>';
    });
    l.innerHTML=h;
    l.querySelectorAll(".tog").forEach(function(b){
      b.addEventListener("click",function(){
        patch("menu_items","id=eq."+this.getAttribute("data-iid"),{disponible:this.getAttribute("data-d")==="true"?false:true})
          .then(function(){loadMenu();notif("Actualizado ✓");})
          .catch(function(e){notif("❌ "+e.message.substring(0,30));});
      });
    });
  }).catch(function(){});
}

document.getElementById("btnAdd").addEventListener("click",function(){
  if(!rest)return;
  var n=document.getElementById("mi-nombre").value.trim(),p=parseInt(document.getElementById("mi-precio").value);
  if(!n||!p){notif("Completa nombre y precio");return;}
  var t=document.getElementById("mi-tipo").value;
  post("menu_items",{restaurante_id:rest.id,categoria:document.getElementById("mi-cat").value||"General",nombre:n,precio:p,descripcion:document.getElementById("mi-desc").value||null,es_bebida:t==="bebida",es_arepa:t==="arepa",disponible:true})
    .then(function(){["mi-cat","mi-nombre","mi-desc","mi-precio"].forEach(function(id){document.getElementById(id).value="";});loadMenu();notif("Producto agregado ✓");})
    .catch(function(e){notif("❌ "+e.message.substring(0,30));});
});
</script>
</body>
</html>
