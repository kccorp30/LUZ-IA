<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>рџЌі Cocina вЂ” LUZ IA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050508;--bg2:#0a0a10;--card:#111118;
  --border:rgba(255,255,255,0.08);
  --text:#f0eeff;--text2:rgba(240,238,255,0.65);--text3:rgba(240,238,255,0.35);
  --g:#10b981;--o:#f97316;--r:#ef4444;--y:#fbbf24;--p:#a855f7;--b:#3b82f6;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* в”Ђв”Ђ TOPBAR в”Ђв”Ђ */
.topbar{height:56px;background:rgba(5,5,8,0.98);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;position:relative;z-index:50}
.tb-brand{font-size:18px;font-weight:900;letter-spacing:-.01em}
.tb-brand span{color:var(--o)}
.tb-stats{display:flex;gap:16px;align-items:center}
.tb-stat{text-align:center}
.tb-stat-val{font-size:20px;font-weight:900;font-family:'Courier New',monospace;line-height:1}
.tb-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.tb-mic{width:40px;height:40px;border-radius:50%;background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0}
.tb-mic.listening{background:rgba(239,68,68,0.25);border-color:#ef4444;animation:micPulse 1s ease infinite}
.tb-mic.processing{background:rgba(245,158,11,0.2);border-color:#f59e0b}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}

/* в”Ђв”Ђ LAYOUT в”Ђв”Ђ */
.main{height:calc(100vh - 56px);display:flex;flex-direction:column;overflow:hidden}
.luz-bar{flex-shrink:0;background:linear-gradient(135deg,rgba(168,85,247,0.08),rgba(79,70,229,0.04));border-bottom:1px solid rgba(168,85,247,0.15);padding:8px 16px;display:flex;align-items:center;gap:10px}
.luz-bar-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#4f46e5);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.luz-bar-txt{font-size:12px;color:#c4b5fd;font-style:italic;flex:1;transition:all .3s}
.luz-voice-wave{display:flex;gap:2px;align-items:center;height:16px;opacity:0;transition:opacity .2s;flex-shrink:0}
.luz-voice-wave.on{opacity:1}
.luz-vb{width:2px;border-radius:1px;background:#a855f7;animation:vbw .8s ease infinite}
.luz-vb:nth-child(1){height:4px;animation-delay:0s}
.luz-vb:nth-child(2){height:10px;animation-delay:.1s}
.luz-vb:nth-child(3){height:16px;animation-delay:.2s}
.luz-vb:nth-child(4){height:10px;animation-delay:.3s}
.luz-vb:nth-child(5){height:4px;animation-delay:.4s}
@keyframes vbw{0%,100%{transform:scaleY(.5);opacity:.6}50%{transform:scaleY(1);opacity:1}}

/* в”Ђв”Ђ GRID PEDIDOS в”Ђв”Ђ */
.pedidos-grid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;align-content:start}
.pedidos-grid::-webkit-scrollbar{width:4px}
.pedidos-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* в”Ђв”Ђ TARJETA PEDIDO в”Ђв”Ђ */
.ped-card{background:var(--card);border:2px solid var(--border);border-radius:16px;overflow:hidden;transition:all .2s;position:relative}
.ped-card.urgente{border-color:rgba(239,68,68,0.5);box-shadow:0 0 20px rgba(239,68,68,0.15)}
.ped-card.nuevo{border-color:rgba(249,115,22,0.5);box-shadow:0 0 20px rgba(249,115,22,0.15);animation:cardNew .5s ease}
@keyframes cardNew{0%{transform:scale(0.96);opacity:0}100%{transform:scale(1);opacity:1}}

/* Header card */
.ped-head{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border)}
.ped-num{font-size:22px;font-weight:900;font-family:'Courier New',monospace;color:var(--o)}
.ped-tipo{display:flex;align-items:center;gap:6px}
.ped-tipo-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.badge-domi{background:rgba(59,130,246,0.15);color:#93c5fd;border:1px solid rgba(59,130,246,0.25)}
.badge-mesa{background:rgba(16,185,129,0.15);color:#6ee7b7;border:1px solid rgba(16,185,129,0.25)}
.badge-recoger{background:rgba(245,158,11,0.15);color:#fcd34d;border:1px solid rgba(245,158,11,0.25)}
.ped-timer{font-size:13px;font-weight:800;font-family:'Courier New',monospace;padding:4px 10px;border-radius:8px;min-width:52px;text-align:center}
.timer-ok{background:rgba(16,185,129,0.15);color:#6ee7b7}
.timer-warn{background:rgba(245,158,11,0.15);color:#fcd34d}
.timer-urgent{background:rgba(239,68,68,0.2);color:#fca5a5;animation:timerBlink .8s ease infinite}
@keyframes timerBlink{0%,100%{opacity:1}50%{opacity:.5}}

/* Items */
.ped-items{padding:12px 14px}
.ped-item{margin-bottom:12px;padding:10px 12px;background:rgba(255,255,255,0.04);border-radius:10px;border-left:3px solid var(--o)}
.ped-item:last-child{margin-bottom:0}
.ped-item-name{font-size:15px;font-weight:800;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.ped-item-cat{font-size:10px;background:rgba(249,115,22,0.12);color:#fb923c;padding:2px 7px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.ped-item-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-top:3px}
.ped-item-qty{font-size:18px;font-weight:900;color:var(--o);font-family:'Courier New',monospace;margin-right:4px}

/* Notas */
.ped-notas{margin:0 14px 12px;padding:10px 12px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);border-radius:10px}
.ped-notas-titulo{font-size:10px;font-weight:800;color:#fca5a5;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.ped-notas-txt{font-size:13px;font-weight:700;color:#fca5a5;line-height:1.5}

/* Info extra */
.ped-info{padding:0 14px 12px;display:flex;gap:8px;flex-wrap:wrap}
.ped-info-tag{font-size:11px;padding:3px 9px;border-radius:8px;background:rgba(255,255,255,0.05);color:var(--text3);font-weight:600}

/* Botones acciГіn */
.ped-actions{padding:10px 14px;display:flex;gap:8px;border-top:1px solid var(--border)}
.btn-prep{flex:1;padding:13px;background:rgba(249,115,22,0.15);border:2px solid rgba(249,115,22,0.3);border-radius:12px;color:#fb923c;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.btn-prep:active{transform:scale(.95);background:rgba(249,115,22,0.3)}
.btn-listo{flex:1;padding:13px;background:rgba(16,185,129,0.15);border:2px solid rgba(16,185,129,0.3);border-radius:12px;color:#6ee7b7;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.btn-listo:active{transform:scale(.95);background:rgba(16,185,129,0.3)}
.btn-listo.on{background:rgba(16,185,129,0.25);border-color:#10b981;box-shadow:0 0 20px rgba(16,185,129,0.2)}
.btn-cerrar{width:46px;padding:13px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:12px;color:var(--text3);font-size:16px;cursor:pointer;transition:all .15s;text-align:center}
.btn-cerrar:active{transform:scale(.9);background:rgba(255,255,255,0.1)}

/* Estado en preparaciГіn */
.ped-card.preparando .ped-head{background:rgba(249,115,22,0.07)}
.ped-card.preparando{border-color:rgba(249,115,22,0.4)}
.ped-card.listo .ped-head{background:rgba(16,185,129,0.07)}
.ped-card.listo{border-color:rgba(16,185,129,0.5)}

/* Empty */
.empty-cocina{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:.4}
.empty-cocina-ico{font-size:64px}
.empty-cocina-txt{font-size:18px;font-weight:700;color:var(--text2)}
.empty-cocina-sub{font-size:13px;color:var(--text3)}

/* Voice feedback overlay */
.voice-overlay{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(10,8,20,0.95);border:1px solid rgba(168,85,247,0.4);border-radius:20px;padding:12px 24px;font-size:14px;color:#c4b5fd;font-weight:600;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px;text-align:center}
.voice-overlay.show{opacity:1}

/* EMOJI CATEGORГЌAS */
.cat-hamburguesa::before{content:"рџЌ” "}
.cat-alitas::before{content:"рџЌ— "}
.cat-papas::before{content:"рџЌџ "}
.cat-bebida::before{content:"рџҐ¤ "}
.cat-postre::before{content:"рџЌ° "}
.cat-arepa::before{content:"рџ«“ "}
.cat-bandeja::before{content:"рџЌ± "}
.cat-salsa::before{content:"рџ«™ "}
.cat-otro::before{content:"рџЌЅпёЏ "}

/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#10b981;color:white;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:700;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* Luz chat en cocina */
.luz-ask{position:fixed;bottom:20px;right:16px;z-index:200}
.luz-ask-btn{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(124,58,237,0.5)}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-brand">рџЌі <span>COCINA</span></div>
  <div class="tb-stats">
    <div class="tb-stat">
      <div class="tb-stat-val" id="statPendientes" style="color:var(--o)">0</div>
      <div class="tb-stat-lbl">En cola</div>
    </div>

<div class="main">

    <div class="luz-bar-av">рџ¤–</div>
    <div class="luz-bar-txt" id="luzBarTxt">Monitoreando pedidos en tiempo real...</div>
    <div class="luz-voice-wave" id="luzWave">
      <div class="luz-vb"></div><div class="luz-vb"></div><div class="luz-vb"></div>
      <div class="luz-vb"></div><div class="luz-vb"></div>
    </div>
  </div>

  <!-- GRID PEDIDOS -->
  <div class="pedidos-grid" id="pedidosGrid">
    <div class="empty-cocina">
      <div class="empty-cocina-ico">рџЌі</div>

    </div>
  </div>
</div>

<!-- VOICE OVERLAY -->
<div class="voice-overlay" id="voiceOverlay"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// в”Ђв”Ђ CONFIG в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
var SU = "https://vbxuwzcfzfjwhllkppkg.supabase.co";
var SK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieHV3emNmemZqd2hsbGtwcGtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTcxNzk2MDMsImV4cCI6MjAzMjc1NTYwM30.oOTC8F7-1MNaJfhgxJKI5TajJt4S1fC9VGMJmROqRrk";
var urlParams = new URLSearchParams(window.location.search);
var REST_ID = urlParams.get("rest") || null;
var pedidosActuales = {};
var menuItems = {};
var pollTimer = null;
var listosHoy = 0;
var vozActiva = false;
var recognition = null;
var luzAudioPlaying = false;

// в”Ђв”Ђ CATEGORГЌAS CON EMOJIS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
var CATS = {
  "hamburguesa":"рџЌ”","hamburgues":"рџЌ”","burger":"рџЌ”",
  "alita":"рџЌ—","pollo":"рџЌ—","chicken":"рџЌ—",
  "papa":"рџЌџ","papas":"рџЌџ","frita":"рџЌџ","patacon":"рџЌџ",
  "bebida":"рџҐ¤","gaseosa":"рџҐ¤","jugo":"рџҐ¤","agua":"рџҐ¤","limonada":"рџҐ¤","cerveza":"рџЌє",
  "postre":"рџЌ°","torta":"рџЌ°","helado":"рџЌ¦",
  "arepa":"рџ«“",
  "bandeja":"рџЌ±","corriente":"рџЌ±",
  "salsa":"рџ«™","dip":"рџ«™",
  "ensalada":"рџҐ—","cesar":"рџҐ—",
  "hot dog":"рџЊ­","perro":"рџЊ­",
  "pizza":"рџЌ•",
  "taco":"рџЊ®",
  "wrap":"рџЊЇ",
  "sopa":"рџЌњ","caldo":"рџЌњ",
  "arroz":"рџЌљ",
  "lomo":"рџҐ©","churrasco":"рџҐ©","angus":"рџҐ©","carne":"рџҐ©","filete":"рџҐ©","costilla":"рџҐ©","picana":"рџҐ©"
};

function getEmoji(nombre, categoria) {
  var n = (nombre||"").toLowerCase();
  var c = (categoria||"").toLowerCase();
  for(var k in CATS){
    if(n.indexOf(k)!==-1||c.indexOf(k)!==-1) return CATS[k];
  }
  return "рџЌЅпёЏ";
}

// в”Ђв”Ђ INIT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
if(!REST_ID){
  document.getElementById("pedidosGrid").innerHTML = '<div class="empty-cocina"><div class="empty-cocina-ico">вљ пёЏ</div><div class="empty-cocina-txt">Falta ?rest=ID en la URL</div><div class="empty-cocina-sub">Ejemplo: /cocina?rest=2cc8adc0-...</div></div>';
} else {
  cargarMenu();
  cargarPedidos();
  pollTimer = setInterval(cargarPedidos, 4000);
  iniciarVozContinua();
}

// в”Ђв”Ђ CARGAR MENГљ (para obtener ingredientes) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function cargarMenu(){
  try {
    var r = await fetch("/api/menu?restaurante_id=" + REST_ID);
    var items = await r.json();
    items.forEach(function(p){ menuItems[p.nombre.toLowerCase()] = p; });
  } catch(e){}
}

// в”Ђв”Ђ CARGAR PEDIDOS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function cargarPedidos(){
  try {
    var r = await fetch(SU + "/rest/v1/pedidos?restaurante_id=eq." + REST_ID +
      "&estado=in.(confirmado,en_preparacion,listo)&order=created_at.asc&select=*", {
      headers: { "apikey": SK, "Authorization": "Bearer " + SK }
    });
    var pedidos = await r.json();
    if(!Array.isArray(pedidos)) return;

    // Detectar nuevos para anunciarlos
    var idsActuales = Object.keys(pedidosActuales);
    pedidos.forEach(function(p){
      if(!pedidosActuales[p.id]){
        pedidosActuales[p.id] = p;
        if(idsActuales.length > 0) anunciarPedido(p);
      } else {
        pedidosActuales[p.id] = p;
      }
    });
    // Limpiar los que ya no estГЎn
    Object.keys(pedidosActuales).forEach(function(id){
      if(!pedidos.find(function(p){ return p.id===id; })){
        delete pedidosActuales[id];
      }
    });

    renderPedidos(pedidos);
    actualizarStats(pedidos);
  } catch(e){ console.error("[cocina] Error:", e.message); }
}

// в”Ђв”Ђ RENDER PEDIDOS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderPedidos(pedidos){
  var grid = document.getElementById("pedidosGrid");
  if(!pedidos.length){
    grid.innerHTML = '<div class="empty-cocina"><div class="empty-cocina-ico">вњ…</div><div class="empty-cocina-txt">Sin pedidos en cola</div><div class="empty-cocina-sub">Todo al dГ­a вЂ” buen trabajo equipo</div></div>';
    return;
  }

  // Ordenar: urgentes primero, luego por tiempo
  pedidos.sort(function(a,b){
    var minA = Math.floor((Date.now()-new Date(a.created_at))/60000);
    var minB = Math.floor((Date.now()-new Date(b.created_at))/60000);
    if(a.estado==="confirmado" && b.estado!=="confirmado") return -1;
    if(b.estado==="confirmado" && a.estado!=="confirmado") return 1;
    return minB - minA;
  });

  var h = "";
  pedidos.forEach(function(p){
    h += renderCard(p);
  });
  grid.innerHTML = h;
}

function renderCard(p){
  var mins = Math.floor((Date.now() - new Date(p.created_at)) / 60000);
  var timerClass = mins < 8 ? "timer-ok" : mins < 15 ? "timer-warn" : "timer-urgent";
  var cardClass = mins >= 15 ? " urgente" : p.estado==="en_preparacion" ? " preparando" : p.estado==="listo" ? " listo" : "";

  // Tipo de pedido
  var dir = (p.direccion||"").toUpperCase();
  var tipo = p.tipo_pedido==="recoger" ? "recoger" : dir.indexOf("MESA")!==-1 ? "mesa" : "domi";
  var tipoBadge = tipo==="mesa"
    ? '<span class="ped-tipo-badge badge-mesa">рџЄ‘ Mesa</span>'
    : tipo==="recoger"
    ? '<span class="ped-tipo-badge badge-recoger">рџЏѓ Recoger</span>'
    : '<span class="ped-tipo-badge badge-domi">рџ›µ Domicilio</span>';

  // Items con descripciГіn completa
  var items = [];
  try { items = Array.isArray(p.items) ? p.items : JSON.parse(p.items||"[]"); } catch(e){}
  var itemsHtml = "";
  items.forEach(function(item){
    var nombre = typeof item === "string" ? item : (item.nombre||"");
    var qty = typeof item === "object" && item.qty ? item.qty : 1;
    // Parsear cantidad si viene en el string: "2x Hamburguesa"
    var qtyMatch = nombre.match(/^(\d+)[xX]\s*/);
    if(qtyMatch){ qty=parseInt(qtyMatch[1]); nombre=nombre.replace(/^\d+[xX]\s*/,""); }
    var esCanje = nombre.indexOf("CANJE:")!==-1;
    var emoji = getEmoji(nombre, "");
    // Buscar descripciГіn en el menГє
    var menuItem = menuItems[nombre.toLowerCase()];
    var desc = menuItem && menuItem.descripcion ? menuItem.descripcion : "";
    var ingredientes = menuItem && menuItem.ingredientes ? menuItem.ingredientes : "";
    var infoExtra = desc || ingredientes;
    var borderColor = esCanje ? "var(--p)" : "var(--o)";
    itemsHtml += '<div class="ped-item" style="border-left-color:'+borderColor+'">';
    itemsHtml += '<div class="ped-item-name">';
    if(qty>1) itemsHtml += '<span class="ped-item-qty">'+qty+'Г—</span>';
    itemsHtml += emoji + ' ' + esc(nombre);
    itemsHtml += '</div>';
    if(infoExtra){
      itemsHtml += '<div class="ped-item-desc">'+esc(infoExtra.substring(0,120))+'</div>';
    }
    itemsHtml += '</div>';
  });

  // Notas especiales вЂ” mostrar completas y destacadas
  var notas = (p.notas_especiales||"").trim();
  var notasHtml = "";
  if(notas){
    notasHtml = '<div class="ped-notas"><div class="ped-notas-titulo">вљ пёЏ NOTAS ESPECIALES</div><div class="ped-notas-txt">'+esc(notas)+'</div></div>';
  }

  // Info extra
  var infoTags = "";
  if(tipo==="mesa") infoTags += '<span class="ped-info-tag">'+esc(p.direccion||"")+'</span>';
  if(tipo==="domi" && p.direccion) infoTags += '<span class="ped-info-tag">рџ“Ќ '+esc(p.direccion.substring(0,30))+'</span>';
  if(p.metodo_pago) infoTags += '<span class="ped-info-tag">'+pagoLabel(p.metodo_pago)+'</span>';
  if(p.cliente_tel) infoTags += '<span class="ped-info-tag">рџ“± '+esc(p.cliente_tel)+'</span>';

  // Botones segГєn estado
  var botonesHtml = "";
  if(p.estado==="confirmado"){
    botonesHtml = '<button class="btn-prep" onclick="cambiarEstado(\''+p.id+'\',\'en_preparacion\',\''+esc(p.cliente_tel)+'\',\''+p.numero_pedido+'\',\''+REST_ID+'\')">рџ‘ЁвЂЌрџЌі PREPARANDO</button>';
    botonesHtml += '<button class="btn-listo" onclick="cambiarEstado(\''+p.id+'\',\'listo\',\''+esc(p.cliente_tel)+'\',\''+p.numero_pedido+'\',\''+REST_ID+'\')">вњ… LISTO</button>';
  } else if(p.estado==="en_preparacion"){
    botonesHtml = '<button class="btn-listo on" onclick="cambiarEstado(\''+p.id+'\',\'listo\',\''+esc(p.cliente_tel)+'\',\''+p.numero_pedido+'\',\''+REST_ID+'\')">вњ… LISTO вЂ” TOCAR PARA SERVIR</button>';
  } else if(p.estado==="listo"){
    botonesHtml = '<button class="btn-listo on" style="cursor:default" disabled>вњ… LISTO вЂ” Esperando mesero/domiciliario</button>';
  }
  botonesHtml += '<button class="btn-cerrar" onclick="cerrarOrden(\''+p.id+'\',\''+p.numero_pedido+'\')" title="Cerrar orden">вњ•</button>';

  return '<div class="ped-card'+cardClass+'" id="card-'+p.id+'">'
    + '<div class="ped-head">'
    + '<div class="ped-num">#'+p.numero_pedido+'</div>'
    + '<div class="ped-tipo">'+tipoBadge+'</div>'
    + '<div class="ped-timer '+timerClass+'">'+mins+'min</div>'
    + '</div>'
    + '<div class="ped-items">'+itemsHtml+'</div>'
    + notasHtml
    + (infoTags ? '<div class="ped-info">'+infoTags+'</div>' : '')
    + '<div class="ped-actions">'+botonesHtml+'</div>'
    + '</div>';
}

// в”Ђв”Ђ CAMBIAR ESTADO в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function cambiarEstado(id, estado, tel, num, restId){
  var card = document.getElementById("card-"+id);
  if(card){
    // Feedback visual inmediato
    card.style.opacity = "0.6";
    card.style.pointerEvents = "none";
  }
  try {
    var r = await fetch("/api/pedido-estado", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ id:id, estado:estado, telefono_cliente:tel, numero_pedido:num, restaurante_id:restId })
    });
    var d = await r.json();
    if(d.ok||d.ok===undefined){
      if(estado==="listo"){
        luzDecir("ВЎListo el pedido nГєmero "+num+"! Notificando al cliente.");
        listosHoy++;
        document.getElementById("statListos").textContent=listosHoy;
        toast("вњ… Pedido #"+num+" listo вЂ” cliente notificado");
      } else if(estado==="en_preparacion"){
        toast("рџ‘ЁвЂЌрџЌі Pedido #"+num+" en preparaciГіn");
      }
      // Recargar inmediato
      setTimeout(cargarPedidos, 400);
    }
  } catch(e){ if(card){card.style.opacity="1";card.style.pointerEvents="all";} }
}

// в”Ђв”Ђ CERRAR ORDEN (listo_entrega) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function cerrarOrden(id, num){
  var card = document.getElementById("card-"+id);
  if(card){ card.style.transform="scale(0.95)";card.style.opacity="0.4";card.style.transition="all .3s"; }
  try {
    await fetch("/api/pedido-estado", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id:id, estado:"listo_entrega", restaurante_id:REST_ID})
    });
    toast("рџ—‚пёЏ Orden #"+num+" cerrada");
    setTimeout(cargarPedidos, 400);
  } catch(e){ if(card){card.style.transform="";card.style.opacity="1";} }
}

// в”Ђв”Ђ STATS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function actualizarStats(pedidos){
  var pend = pedidos.filter(function(p){return p.estado==="confirmado";}).length;
  var prep = pedidos.filter(function(p){return p.estado==="en_preparacion";}).length;
  document.getElementById("statPendientes").textContent = pend;
  document.getElementById("statPreparando").textContent = prep;
  // Anuncio si hay acumulaciГіn
  if(pend >= 5){
    luzBarUpdate("вљ пёЏ " + pend + " pedidos esperando вЂ” priorizar mГЎs antiguos");
  } else if(pend === 0 && prep === 0){
    luzBarUpdate("вњ… Todo al dГ­a вЂ” sin pedidos pendientes");
  } else {
    luzBarUpdate(pend+" en cola В· "+prep+" preparando В· "+listosHoy+" listos hoy");
  }
}

// в”Ђв”Ђ LUZ в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
var luzAudioCache = {};

function luzDecir(texto){
  luzBarUpdate(texto);
  // ElevenLabs
  luzDecirElevenLabs(texto).catch(function(){
    luzDecirWebSpeech(texto);
  });
}

async function luzDecirElevenLabs(texto){
  if(luzAudioPlaying) return;
  var cacheKey = texto.substring(0,60);
  var audioUrl;
  if(luzAudioCache[cacheKey]){
    audioUrl = luzAudioCache[cacheKey];
  } else {
    var resp = await fetch("/api/luz-voz", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({texto:texto}),
      signal: AbortSignal.timeout(8000)
    });
    if(!resp.ok) throw new Error("HTTP "+resp.status);
    var blob = await resp.blob();
    audioUrl = URL.createObjectURL(blob);
    luzAudioCache[cacheKey] = audioUrl;
    var keys=Object.keys(luzAudioCache);
    if(keys.length>30) delete luzAudioCache[keys[0]];
  }
  return new Promise(function(resolve,reject){
    var audio = new Audio(audioUrl);
    luzAudioPlaying = true;
    var wave = document.getElementById("luzWave");
    if(wave) wave.classList.add("on");
    audio.onended=function(){luzAudioPlaying=false;if(wave)wave.classList.remove("on");resolve();};
    audio.onerror=function(){luzAudioPlaying=false;if(wave)wave.classList.remove("on");reject(new Error("audio error"));};
    audio.play().catch(function(e){luzAudioPlaying=false;reject(e);});
  });
}

function luzDecirWebSpeech(texto){
  if(!window.speechSynthesis) return;
  var limpio = texto.replace(/[в­ђрџЋЃрџЌ”рџ›µрџ’ірџ“±вљ пёЏвњ…вќЊрџ”Ґрџ’°рџ‘‹рџЊџрџ“ќрџ’њрџ¤–вЂў#]/g,"").replace(/\s+/g," ").trim();
  if(!limpio) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(limpio);
  u.lang="es-CO"; u.rate=1.1; u.pitch=1.1; u.volume=1;
  var voices = window.speechSynthesis.getVoices();
  var voz = voices.find(function(v){return v.lang==="es-CO"||v.lang==="es-419";})
    ||voices.find(function(v){return v.lang.startsWith("es");});
  if(voz) u.voice=voz;
  var wave = document.getElementById("luzWave");
  if(wave){wave.classList.add("on");u.onend=function(){wave.classList.remove("on");};}
  window.speechSynthesis.speak(u);
}

function luzBarUpdate(txt){
  var el = document.getElementById("luzBarTxt");
  if(el){ el.style.opacity="0"; setTimeout(function(){el.textContent=txt;el.style.opacity="1";},200); }
}

function anunciarPedido(p){
  var items = [];
  try{ items=Array.isArray(p.items)?p.items:JSON.parse(p.items||"[]"); }catch(e){}
  var resumen = items.slice(0,3).map(function(i){
    return typeof i==="string"?i.replace(/^\d+[xX]\s*/,""):(i.nombre||"");
  }).filter(Boolean).join(", ");
  var tipo = p.tipo_pedido==="recoger"?"para recoger":(p.direccion||"").toUpperCase().indexOf("MESA")!==-1?"para mesa":"a domicilio";
  luzDecir("Pedido nГєmero "+p.numero_pedido+" вЂ” "+resumen+" вЂ” "+tipo);
  toast("рџ”” Nuevo pedido #"+p.numero_pedido);
}

// в”Ђв”Ђ VOZ CONTINUA вЂ” COMANDOS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function iniciarVozContinua(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)) return;
  var SpeechRec = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SpeechRec();
  recognition.lang = "es-CO";
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.onresult = function(e){
    var txt = e.results[e.results.length-1][0].transcript.toLowerCase().trim();
    procesarComandoVoz(txt);
  };
  recognition.onerror = function(e){
    if(e.error==="not-allowed") vozActiva=false;
  };
  recognition.onend = function(){
    if(vozActiva) setTimeout(function(){try{recognition.start();}catch(e){}},1000);
  };
}

function toggleVoz(){
  var btn = document.getElementById("btnMic");
  if(vozActiva){
    vozActiva=false;
    try{recognition.stop();}catch(e){}
    btn.classList.remove("listening");
    btn.textContent="рџЋ¤";
    luzBarUpdate("MicrГіfono desactivado");
    toast("рџЋ¤ MicrГіfono desactivado");
  } else {
    vozActiva=true;
    btn.classList.add("listening");
    btn.textContent="рџ”ґ";
    try{recognition.start();}catch(e){}
    luzDecir("MicrГіfono activado. Di comandos como: listo el pedido ciento treinta y cuatro.");
    toast("рџЋ¤ Escuchando comandos...");
  }
}

function procesarComandoVoz(txt){
  var btn = document.getElementById("btnMic");
  if(btn) btn.classList.add("processing");
  voiceOverlayShow('"' + txt + '"');

  // Extraer nГєmero de pedido
  var numMatch = txt.match(/(\d+|cien\w*|doscient\w*)/);
  var numPedido = null;
  if(numMatch){
    var n = parseInt(numMatch[1]);
    if(!isNaN(n)) numPedido = n;
  }

  var pedidosList = Object.values(pedidosActuales);

  // COMANDO: LISTO el pedido X
  if((txt.indexOf("listo")!==-1||txt.indexOf("lista")!==-1) && numPedido){
    var p = pedidosList.find(function(x){return x.numero_pedido===numPedido;});
    if(p){
      cambiarEstado(p.id,"listo",p.cliente_tel,p.numero_pedido,REST_ID);
      luzDecir("Pedido "+numPedido+" marcado como listo. Cliente notificado.");
    } else {
      luzDecir("No encontrГ© el pedido "+numPedido+" en la cola.");
    }
  }
  // COMANDO: PREPARANDO el pedido X
  else if((txt.indexOf("preparando")!==-1||txt.indexOf("preparo")!==-1||txt.indexOf("empiezo")!==-1) && numPedido){
    var p = pedidosList.find(function(x){return x.numero_pedido===numPedido;});
    if(p){
      cambiarEstado(p.id,"en_preparacion",p.cliente_tel,p.numero_pedido,REST_ID);
      luzDecir("Pedido "+numPedido+" en preparaciГіn.");
    } else {
      luzDecir("No encontrГ© el pedido "+numPedido+".");
    }
  }
  // COMANDO: CERRAR el pedido X
  else if((txt.indexOf("cerrar")!==-1||txt.indexOf("cerrado")!==-1||txt.indexOf("cierra")!==-1) && numPedido){
    var p = pedidosList.find(function(x){return x.numero_pedido===numPedido;});
    if(p){ cerrarOrden(p.id,p.numero_pedido); luzDecir("Orden "+numPedido+" cerrada."); }
  }
  // COMANDO: ВїCuГЎntos pedidos hay?
  else if(txt.indexOf("cuantos")!==-1||txt.indexOf("cuГЎntos")!==-1||txt.indexOf("hay pedido")!==-1){
    var pend = pedidosList.filter(function(x){return x.estado==="confirmado";}).length;
    var prep = pedidosList.filter(function(x){return x.estado==="en_preparacion";}).length;
    luzDecir("Hay "+pend+" pedidos esperando y "+prep+" en preparaciГіn.");
  }
  // COMANDO: ВїCuГЎl es el mГЎs urgente?
  else if(txt.indexOf("urgente")!==-1||txt.indexOf("primero")!==-1||txt.indexOf("mГЎs viejo")!==-1){
    var sorted = pedidosList.filter(function(x){return x.estado==="confirmado";})
      .sort(function(a,b){return new Date(a.created_at)-new Date(b.created_at);});
    if(sorted.length){
      var min = Math.floor((Date.now()-new Date(sorted[0].created_at))/60000);
      luzDecir("El mГЎs urgente es el pedido "+sorted[0].numero_pedido+", lleva "+min+" minutos esperando.");
    } else { luzDecir("No hay pedidos pendientes."); }
  }
  // COMANDO: Listo todo / todos listos
  else if((txt.indexOf("todos listos")!==-1||txt.indexOf("listo todo")!==-1)){
    var prep = pedidosList.filter(function(x){return x.estado==="en_preparacion";});
    if(prep.length){
      prep.forEach(function(p){ cambiarEstado(p.id,"listo",p.cliente_tel,p.numero_pedido,REST_ID); });
      luzDecir("Marcando todos como listos. "+prep.length+" pedidos notificados.");
    } else { luzDecir("No hay pedidos en preparaciГіn."); }
  }
  else {
    luzDecir("Comando no reconocido. Puedes decir: listo el pedido, preparando el pedido, o cuГЎntos pedidos hay.");
  }

  setTimeout(function(){
    if(btn) btn.classList.remove("processing");
  }, 2000);
}

// в”Ђв”Ђ HELPERS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function pagoLabel(m){ return {efectivo:"рџ’µ Efectivo",nequi:"рџ“± Nequi",bancolombia:"рџЏ¦ Bancolombia",datafono:"рџ’і DatГЎfono"}[m]||m; }

function toast(msg){
  var t = document.getElementById("toast");
  if(!t) return;
  t.textContent = msg; t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},3000);
}

var voiceTimer = null;
function voiceOverlayShow(txt){
  var ov = document.getElementById("voiceOverlay");
  if(!ov) return;
  ov.textContent = txt; ov.classList.add("show");
  if(voiceTimer) clearTimeout(voiceTimer);
  voiceTimer = setTimeout(function(){ov.classList.remove("show");},3000);
}

// Actualizar timers cada 30s
setInterval(function(){
  var pedidos = Object.values(pedidosActuales);
  if(pedidos.length) renderPedidos(pedidos);
}, 30000);
</script>
