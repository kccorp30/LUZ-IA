<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LUZ IA — Domiciliario</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050508;--bg2:#0a0a10;--card:#111118;--border:rgba(255,255,255,0.08);
  --p:#7c3aed;--p2:#a855f7;--g:#10b981;--o:#f97316;--r:#ef4444;--y:#fbbf24;--b:#3b82f6;
  --text:#f0eeff;--text2:rgba(240,238,255,0.6);--text3:rgba(240,238,255,0.32)
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}

/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 30% 60%,rgba(124,58,237,0.18),transparent 60%)}
.login-card{width:100%;max-width:340px}
.login-luz{text-align:center;margin-bottom:32px}
.login-av{width:80px;height:80px;border-radius:50%;overflow:hidden;margin:0 auto 12px;border:3px solid rgba(124,58,237,0.5);box-shadow:0 0 30px rgba(124,58,237,0.3)}
.login-av img{width:100%;height:100%;object-fit:cover;object-position:center top}
.login-nombre{font-size:22px;font-weight:900;letter-spacing:-.01em}
.login-nombre span{background:linear-gradient(135deg,#a855f7,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:11px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.1em}
.l-input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;margin-bottom:12px;transition:all .2s}
.l-input:focus{border-color:rgba(124,58,237,0.5);background:rgba(124,58,237,0.06)}
.l-input::placeholder{color:var(--text3)}
.l-btn{width:100%;padding:15px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:14px;color:white;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.02em}
.l-err{font-size:12px;color:#f87171;text-align:center;margin-top:10px;min-height:16px}

/* ── APP ── */
#app{display:none;padding-bottom:20px}

/* ── TOPBAR ── */
.topbar{background:rgba(5,5,8,0.97);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-av{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid rgba(124,58,237,0.4);flex-shrink:0}
.tb-av img{width:100%;height:100%;object-fit:cover;object-position:center top}
.tb-info{display:flex;flex-direction:column}
.tb-name{font-size:14px;font-weight:800;line-height:1.2}
.tb-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--g);box-shadow:0 0 5px var(--g);animation:sp 2s ease infinite}
@keyframes sp{0%,100%{opacity:1}50%{opacity:.3}}
.tb-earnings{font-size:16px;font-weight:900;color:var(--g);font-family:'Courier New',monospace}

/* ── LUZ BAR ── */
.luz-bar{background:linear-gradient(135deg,rgba(168,85,247,0.07),rgba(79,70,229,0.03));border-bottom:1px solid rgba(168,85,247,0.12);padding:10px 14px;display:flex;align-items:center;gap:10px}
.luz-bar-av{width:28px;height:28px;border-radius:50%;overflow:hidden;border:1.5px solid rgba(124,58,237,0.4);flex-shrink:0}
.luz-bar-av img{width:100%;height:100%;object-fit:cover;object-position:center top}
.luz-bar-txt{font-size:12px;color:#c4b5fd;font-style:italic;flex:1;transition:all .25s}
.luz-wave{display:flex;gap:2px;align-items:center;height:14px;opacity:0;transition:opacity .2s}
.luz-wave.on{opacity:1}
.lwb{width:2px;border-radius:1px;background:#a855f7;animation:lw .8s ease infinite}
.lwb:nth-child(1){height:4px}.lwb:nth-child(2){height:9px;animation-delay:.1s}.lwb:nth-child(3){height:14px;animation-delay:.2s}.lwb:nth-child(4){height:9px;animation-delay:.3s}.lwb:nth-child(5){height:4px;animation-delay:.4s}
@keyframes lw{0%,100%{transform:scaleY(.5);opacity:.5}50%{transform:scaleY(1);opacity:1}}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.04)}
.stat-cell{background:var(--bg);padding:14px 8px;text-align:center}
.stat-v{font-size:24px;font-weight:900;font-family:'Courier New',monospace;line-height:1}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}

/* ── PEDIDO ACTIVO ── */
.ped-section{padding:12px}
.ped-card{background:var(--card);border:1.5px solid rgba(16,185,129,0.25);border-radius:20px;overflow:hidden;margin-bottom:12px}
.ped-head{padding:14px 16px;background:rgba(16,185,129,0.06);border-bottom:1px solid rgba(16,185,129,0.12);display:flex;align-items:center;justify-content:space-between}
.ped-num{font-size:22px;font-weight:900;color:#6ee7b7;font-family:'Courier New',monospace}
.ped-est{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.est-listo{background:rgba(16,185,129,0.15);color:#6ee7b7;border:1px solid rgba(16,185,129,0.3)}
.est-camino{background:rgba(124,58,237,0.15);color:#c4b5fd;border:1px solid rgba(124,58,237,0.3)}
.ped-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.ped-row{display:flex;align-items:flex-start;gap:10px}
.ped-ico{font-size:18px;flex-shrink:0;line-height:1.3}
.ped-data{flex:1;min-width:0}
.ped-data-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.ped-data-val{font-size:14px;font-weight:700;color:var(--text);line-height:1.4}
.ped-items-list{font-size:13px;color:var(--text2);line-height:1.6}
.ped-notas{padding:10px 12px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.18);border-radius:10px}
.ped-notas-lbl{font-size:10px;font-weight:800;color:#fca5a5;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.ped-notas-txt{font-size:13px;color:#fca5a5;font-weight:700;line-height:1.4}
.ped-total-row{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)}
.ped-total{font-size:20px;font-weight:900;color:#6ee7b7;font-family:'Courier New',monospace}
.ped-pago{font-size:12px;color:var(--text3)}

/* ── MAPA ── */
.mapa-wrap{margin:0 12px 12px;border-radius:16px;overflow:hidden;border:1px solid var(--border)}
#domiMapa{height:200px}

/* ── ACCIONES ── */
.acciones{display:flex;flex-direction:column;gap:8px;padding:0 12px 12px}
.btn-navegar{padding:14px;background:linear-gradient(135deg,#2563eb,#4f46e5);border:none;border-radius:14px;color:white;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-llamar{padding:13px;background:rgba(16,185,129,0.12);border:1.5px solid rgba(16,185,129,0.25);border-radius:14px;color:#6ee7b7;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.btn-entregar{padding:18px;background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:16px;color:white;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;width:100%;letter-spacing:.02em;box-shadow:0 6px 20px rgba(16,185,129,0.3)}
.btn-entregar:active{transform:scale(.97)}
.btn-foto{padding:13px;background:rgba(245,158,11,0.1);border:1.5px solid rgba(245,158,11,0.22);border-radius:14px;color:#fcd34d;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}

/* ── SIN PEDIDO ── */
.sin-ped{padding:40px 16px;text-align:center}
.sin-ped-av{width:72px;height:72px;border-radius:50%;overflow:hidden;margin:0 auto 16px;border:2px solid rgba(124,58,237,0.3)}
.sin-ped-av img{width:100%;height:100%;object-fit:cover;object-position:center top}
.sin-ped-txt{font-size:17px;font-weight:700;color:var(--text2);margin-bottom:6px}
.sin-ped-sub{font-size:13px;color:var(--text3);line-height:1.5}

/* ── HISTORIAL ── */
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:12px 14px 6px}
.hist-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04)}
.hist-num{font-size:14px;font-weight:900;font-family:'Courier New',monospace;color:var(--p2);width:40px}
.hist-info{flex:1;min-width:0}
.hist-dir{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-sub{font-size:11px;color:var(--text3);margin-top:2px}
.hist-total{font-size:14px;font-weight:900;color:var(--g);font-family:'Courier New',monospace}

/* ── FOTO MODAL ── */
#fotoModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px}
#fotoModal.show{display:flex}
#fotoPreview{width:100%;max-width:380px;border-radius:14px;border:2px solid var(--g);display:none;max-height:45vh;object-fit:cover}
.foto-btns{display:flex;gap:10px;width:100%;max-width:380px}
.foto-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.foto-take{background:linear-gradient(135deg,#f97316,#fbbf24);color:white}
.foto-send{background:linear-gradient(135deg,#10b981,#059669);color:white;display:none}
.foto-cancel{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:var(--text2)}
#fotoInput{display:none}
.foto-msg{font-size:13px;color:var(--text2);text-align:center;line-height:1.5}

/* ── TOAST ── */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,0.95);border:1px solid rgba(124,58,237,0.3);color:#c4b5fd;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(20px)}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-luz">
      <div class="login-av">
        <img src="https://vbxuwzcfzfjwhllkppkg.supabase.co/storage/v1/object/public/media/luz-avatar.jpg" onerror="this.parentNode.style.background='linear-gradient(135deg,#7c3aed,#4f46e5)';this.style.display='none'">
      </div>
      <div class="login-nombre">LUZ <span>IA</span></div>
      <div class="login-sub">Panel Domiciliario</div>
    </div>
    <input class="l-input" id="loginTel" type="tel" placeholder="Tu número de celular" inputmode="numeric">
    <input class="l-input" id="loginRestId" type="text" placeholder="ID del restaurante" style="font-size:12px">
    <button class="l-btn" onclick="iniciarSesion()">Entrar</button>
    <div class="l-err" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-av">
        <img src="https://vbxuwzcfzfjwhllkppkg.supabase.co/storage/v1/object/public/media/luz-avatar.jpg" onerror="this.parentNode.style.background='linear-gradient(135deg,#7c3aed,#4f46e5)';this.style.display='none'">
      </div>
      <div class="tb-info">
        <div class="tb-name" id="domiNombre">Cargando...</div>
        <div class="tb-status"><div class="sdot"></div><span id="domiStatusTxt">En línea</span></div>
      </div>
    </div>
    <div class="tb-earnings" id="tbEarnings">$0</div>
  </div>

  <!-- LUZ BAR -->
  <div class="luz-bar">
    <div class="luz-bar-av">
      <img src="https://vbxuwzcfzfjwhllkppkg.supabase.co/storage/v1/object/public/media/luz-avatar.jpg" onerror="this.parentNode.style.background='linear-gradient(135deg,#7c3aed,#4f46e5)';this.style.display='none'">
    </div>
    <div class="luz-bar-txt" id="luzBarTxt">Hola! Estoy monitoreando tus pedidos.</div>
    <div class="luz-wave" id="luzWave">
      <div class="lwb"></div><div class="lwb"></div><div class="lwb"></div><div class="lwb"></div><div class="lwb"></div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-cell"><div class="stat-v" id="statEntregas" style="color:var(--g)">0</div><div class="stat-l">Entregas hoy</div></div>
    <div class="stat-cell"><div class="stat-v" id="statGanancias" style="color:var(--y)">$0</div><div class="stat-l">Ganancias</div></div>
    <div class="stat-cell"><div class="stat-v" id="statProm" style="color:var(--p2)">0min</div><div class="stat-l">Promedio</div></div>
  </div>

  <!-- PEDIDO ACTIVO -->
  <div class="ped-section" id="pedSection">
    <div class="sin-ped">
      <div class="sin-ped-av">
        <img src="https://vbxuwzcfzfjwhllkppkg.supabase.co/storage/v1/object/public/media/luz-avatar.jpg" onerror="this.parentNode.style.background='linear-gradient(135deg,#7c3aed,#4f46e5)';this.style.display='none'">
      </div>
      <div class="sin-ped-txt">Sin pedido activo</div>
      <div class="sin-ped-sub">Luz te avisará cuando llegue<br>un pedido para ti</div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="section-title">Entregas de hoy</div>
  <div id="histList"></div>
</div>

<!-- FOTO MODAL -->
<div id="fotoModal">
  <div class="foto-msg">📸 Toma una foto como evidencia<br>de la entrega</div>
  <img id="fotoPreview">
  <input type="file" id="fotoInput" accept="image/*" capture="environment">
  <div class="foto-btns">
    <button class="foto-btn foto-take" onclick="document.getElementById('fotoInput').click()">📷 Tomar foto</button>
    <button class="foto-btn foto-send" id="fotoSendBtn" onclick="enviarFoto()">✅ Confirmar</button>
    <button class="foto-btn foto-cancel" onclick="cerrarFotoModal()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SU = "https://vbxuwzcfzfjwhllkppkg.supabase.co";
var SK = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieHV3emNmemZqd2hsbGtwcGtnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTcxNzk2MDMsImV4cCI6MjAzMjc1NTYwM30.oOTC8F7-1MNaJfhgxJKI5TajJt4S1fC9VGMJmROqRrk";

var domi = null, restId = null, pedidoActivo = null;
var pollTimer = null, mapaInst = null, mapaMarker = null;
var historial = [], ganancias = 0, tiemposTotales = [], fotoBase64 = null;
var luzAudioPlaying = false, luzAudioCache = {};
var urlParams = new URLSearchParams(window.location.search);

// Pre-fill from URL
if(urlParams.get("rest")) document.getElementById("loginRestId").value = urlParams.get("rest");
if(urlParams.get("tel")) document.getElementById("loginTel").value = urlParams.get("tel");

// ── LOGIN ────────────────────────────────────────────────────────
async function iniciarSesion(){
  var tel = document.getElementById("loginTel").value.trim().replace(/[^0-9]/g,"");
  var rid = document.getElementById("loginRestId").value.trim();
  var err = document.getElementById("loginErr");
  if(!tel||tel.length<10){err.textContent="Ingresa tu número";return;}
  if(!rid){err.textContent="Ingresa el ID del restaurante";return;}
  err.textContent="Verificando...";
  try {
    // Buscar con múltiples formatos de teléfono
    var tel10 = tel.replace(/^57/,""); // sin código de país
    var tel12 = "57"+tel10;             // con código de país
    var url = SU+"/rest/v1/domiciliarios?restaurante_id=eq."+rid+
      "&or=(telefono.eq."+encodeURIComponent(tel10)+",telefono.eq."+encodeURIComponent(tel12)+",telefono.eq."+encodeURIComponent(tel)+")"
      +"&select=*";
    var r = await fetch(url,{
      headers:{"apikey":SK,"Authorization":"Bearer "+SK}
    });
    var data = await r.json();
    if(!data||!data.length){
      err.textContent="Número no registrado ("+tel10+"). Habla con el restaurante.";
      return;
    }
    domi = data[0]; restId = rid;
    try{localStorage.setItem("domi_tel",tel);localStorage.setItem("domi_rest",rid);}catch(e){}
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("domiNombre").textContent=domi.nombre||tel;
    iniciarApp();
  } catch(e){err.textContent="Error de conexión: "+e.message;}
}

// Auto-login
try {
  var savedTel = localStorage.getItem("domi_tel");
  var savedRest = localStorage.getItem("domi_rest");
  if(savedTel&&savedRest){
    document.getElementById("loginTel").value=savedTel;
    document.getElementById("loginRestId").value=savedRest;
  }
}catch(e){}

// ── INIT APP ─────────────────────────────────────────────────────
function iniciarApp(){
  cargarStats();
  cargarPedidoActivo();
  cargarHistorial();
  pollTimer = setInterval(function(){
    cargarPedidoActivo();
    cargarStats();
  }, 5000);
  iniciarGPS();
  // Luz da la bienvenida
  setTimeout(function(){
    luzDecir("Hola "+domi.nombre.split(" ")[0]+"! Todo listo. Te aviso cuando llegue un pedido para ti.");
  }, 1500);
}

// ── GPS ──────────────────────────────────────────────────────────
var gpsTimer = null;
function iniciarGPS(){
  if(!navigator.geolocation)return;
  gpsTimer = setInterval(function(){
    navigator.geolocation.getCurrentPosition(function(pos){
      if(!pedidoActivo||!domi)return;
      fetch("/api/domi-ubicacion",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({domiciliario_id:domi.id,lat:pos.coords.latitude,lng:pos.coords.longitude,restaurante_id:restId})
      }).catch(function(){});
      actualizarMapa(pos.coords.latitude,pos.coords.longitude);
    },null,{enableHighAccuracy:true,timeout:8000});
  },15000);
}

// ── PEDIDO ACTIVO ─────────────────────────────────────────────────
var pedidoAnteriorId = null;
async function cargarPedidoActivo(){
  try {
    var tel10 = domi.telefono ? domi.telefono.replace(/^57/,"") : "";
    var tel12 = "57"+tel10;
    // Buscar por domiciliario_id O por teléfono del domi en notas
    var r = await fetch(SU+"/rest/v1/pedidos?restaurante_id=eq."+restId+
      "&or=(domiciliario_id.eq."+domi.id+",domiciliario_id.eq."+encodeURIComponent(tel10)+",domiciliario_id.eq."+encodeURIComponent(tel12)+")"
      +"&estado=in.(listo,en_camino)&order=created_at.desc&limit=1&select=*",{
      headers:{"apikey":SK,"Authorization":"Bearer "+SK}
    });
    var data = await r.json();
    var ped = data&&data.length?data[0]:null;

    if(ped&&(!pedidoAnteriorId||ped.id!==pedidoAnteriorId)){
      pedidoAnteriorId=ped.id;
      pedidoActivo=ped;
      renderPedidoActivo(ped);
      luzDecir("Nuevo pedido número "+ped.numero_pedido+"! "+formatDir(ped.direccion));
    } else if(!ped&&pedidoAnteriorId){
      pedidoAnteriorId=null;pedidoActivo=null;
      renderSinPedido();
    } else if(ped){
      pedidoActivo=ped;
      renderPedidoActivo(ped);
    }
  }catch(e){}
}

function renderPedidoActivo(p){
  var items=[];try{items=Array.isArray(p.items)?p.items:JSON.parse(p.items||"[]");}catch(e){}
  var itemsStr=items.map(function(i){return typeof i==="string"?i:(i.qty?i.qty+"× ":"")+i.nombre;}).join(" · ")||"Sin items";
  var notas=(p.notas_especiales||"").trim();
  var estClass=p.estado==="en_camino"?"est-camino":"est-listo";
  var estLabel=p.estado==="en_camino"?"🛵 En camino":"✅ Listo para recoger";
  var pago={efectivo:"💵 Efectivo",nequi:"📱 Nequi",bancolombia:"🏦 Bancolombia",datafono:"💳 Datáfono"}[p.metodo_pago]||p.metodo_pago||"";

  document.getElementById("pedSection").innerHTML=
    '<div class="ped-card">'
    +'<div class="ped-head"><div class="ped-num">#'+p.numero_pedido+'</div><div class="ped-est '+estClass+'">'+estLabel+'</div></div>'
    +'<div class="ped-body">'
    +'<div class="ped-row"><div class="ped-ico">📍</div><div class="ped-data"><div class="ped-data-lbl">Dirección</div><div class="ped-data-val">'+esc(formatDir(p.direccion))+'</div></div></div>'
    +'<div class="ped-row"><div class="ped-ico">📦</div><div class="ped-data"><div class="ped-data-lbl">Pedido</div><div class="ped-items-list">'+esc(itemsStr)+'</div></div></div>'
    +(notas?'<div class="ped-notas"><div class="ped-notas-lbl">⚠️ Notas</div><div class="ped-notas-txt">'+esc(notas)+'</div></div>':'')
    +'<div class="ped-row"><div class="ped-ico">👤</div><div class="ped-data"><div class="ped-data-lbl">Cliente</div><div class="ped-data-val">'+esc(p.cliente_tel||"")+'</div></div></div>'
    +'<div class="ped-total-row"><div class="ped-total">$'+Number(p.total||0).toLocaleString("es-CO")+'</div><div class="ped-pago">'+esc(pago)+'</div></div>'
    +'</div></div>'
    +'<div id="mapaWrap" class="mapa-wrap"><div id="domiMapa"></div></div>'
    +'<div class="acciones">'
    +(p.estado==="listo"?'<button class="btn-navegar" onclick="navegar()">🗺️ Navegar a la dirección</button>':'')
    +(p.estado==="listo"?'<button class="btn-llamar" onclick="llamarCliente()">📞 Llamar al cliente</button>':'')
    +'<button class="btn-foto" onclick="abrirFotoModal()">📷 Foto de entrega</button>'
    +'<button class="btn-entregar" onclick="marcarEntregado()">✅ MARCAR COMO ENTREGADO</button>'
    +'</div>';

  // Mapa
  setTimeout(function(){iniciarMapa(p);},300);
}

function renderSinPedido(){
  document.getElementById("pedSection").innerHTML=
    '<div class="sin-ped">'
    +'<div class="sin-ped-av"><img src="https://vbxuwzcfzfjwhllkppkg.supabase.co/storage/v1/object/public/media/luz-avatar.jpg" onerror="this.parentNode.style.background=\'linear-gradient(135deg,#7c3aed,#4f46e5)\';this.style.display=\'none\'"></div>'
    +'<div class="sin-ped-txt">Sin pedido activo</div>'
    +'<div class="sin-ped-sub">Luz te avisará cuando llegue<br>un pedido para ti 🛵</div>'
    +'</div>';
}

// ── MAPA ─────────────────────────────────────────────────────────
function iniciarMapa(p){
  var el=document.getElementById("domiMapa");
  if(!el)return;
  if(mapaInst){mapaInst.remove();mapaInst=null;}
  mapaInst=L.map("domiMapa",{zoomControl:false,attributionControl:false}).setView([3.4,-76.5],13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(mapaInst);
  if(p.lat_destino&&p.lng_destino){
    L.marker([p.lat_destino,p.lng_destino]).addTo(mapaInst).bindPopup("Destino").openPopup();
    mapaInst.setView([p.lat_destino,p.lng_destino],15);
  }
}
function actualizarMapa(lat,lng){
  if(!mapaInst)return;
  var icon=L.divIcon({html:"🛵",className:"",iconSize:[30,30]});
  if(mapaMarker)mapaMarker.setLatLng([lat,lng]);
  else mapaMarker=L.marker([lat,lng],{icon:icon}).addTo(mapaInst);
}

// ── ACCIONES ─────────────────────────────────────────────────────
function navegar(){
  if(!pedidoActivo)return;
  var dir=pedidoActivo.direccion||"";
  if(pedidoActivo.lat_destino&&pedidoActivo.lng_destino){
    window.open("https://www.google.com/maps/dir/?api=1&destination="+pedidoActivo.lat_destino+","+pedidoActivo.lng_destino,"_blank");
  } else if(dir){
    window.open("https://www.google.com/maps/search/"+encodeURIComponent(dir),"_blank");
  }
}
function llamarCliente(){
  if(!pedidoActivo||!pedidoActivo.cliente_tel)return;
  window.location.href="tel:+57"+pedidoActivo.cliente_tel.replace(/[^0-9]/g,"");
}

async function marcarEntregado(){
  if(!pedidoActivo){toast("No hay pedido activo");return;}
  try {
    await fetch("/api/pedido-estado",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id:pedidoActivo.id,estado:"entregado",telefono_cliente:pedidoActivo.cliente_tel,numero_pedido:pedidoActivo.numero_pedido,restaurante_id:restId})
    });
    var mins=Math.floor((Date.now()-new Date(pedidoActivo.created_at))/60000);
    tiemposTotales.push(mins);
    historial.unshift({num:pedidoActivo.numero_pedido,dir:formatDir(pedidoActivo.direccion),total:pedidoActivo.total,ts:new Date().toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"})});
    ganancias+=Number(pedidoActivo.total||0)*0.08;
    document.getElementById("statGanancias").textContent="$"+Math.round(ganancias).toLocaleString("es-CO");
    pedidoActivo=null;pedidoAnteriorId=null;
    renderSinPedido();
    actualizarStats();
    renderHistorial();
    luzDecir("¡Excelente! Pedido número "+pedidoActivo?.numero_pedido+" entregado. "+historial.length+" entregas hoy. ¡Vas muy bien!");
    toast("✅ Entrega confirmada");
  }catch(e){toast("Error al confirmar");}
}

// ── FOTO ENTREGA ──────────────────────────────────────────────────
function abrirFotoModal(){document.getElementById("fotoModal").classList.add("show");}
function cerrarFotoModal(){document.getElementById("fotoModal").classList.remove("show");fotoBase64=null;document.getElementById("fotoPreview").style.display="none";document.getElementById("fotoSendBtn").style.display="none";}
document.getElementById("fotoInput").addEventListener("change",function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    fotoBase64=ev.target.result;
    var prev=document.getElementById("fotoPreview");
    prev.src=fotoBase64;prev.style.display="block";
    document.getElementById("fotoSendBtn").style.display="flex";
  };
  reader.readAsDataURL(file);
});
async function enviarFoto(){
  if(!fotoBase64||!pedidoActivo)return;
  try {
    await fetch("/enviar-imagen-cliente",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({telefono:pedidoActivo.cliente_tel,restaurante_id:restId,imagen:fotoBase64,mime:"image/jpeg"})
    });
    cerrarFotoModal();toast("📷 Foto enviada al cliente");
    luzDecir("Foto de entrega enviada al cliente.");
  }catch(e){toast("Error enviando foto");}
}

// ── STATS ─────────────────────────────────────────────────────────
async function cargarStats(){
  try {
    var r=await fetch("/api/domi-stats?domiciliario_id="+domi.id+"&restaurante_id="+restId);
    var d=await r.json();
    if(d.ok){
      document.getElementById("statEntregas").textContent=d.entregas_hoy||0;
      var prom=d.tiempo_promedio?Math.round(d.tiempo_promedio)+"min":"—";
      document.getElementById("statProm").textContent=prom;
    }
  }catch(e){}
}
function actualizarStats(){
  document.getElementById("statEntregas").textContent=historial.length;
  if(tiemposTotales.length){
    var avg=Math.round(tiemposTotales.reduce(function(a,b){return a+b;},0)/tiemposTotales.length);
    document.getElementById("statProm").textContent=avg+"min";
  }
}

// ── HISTORIAL ─────────────────────────────────────────────────────
async function cargarHistorial(){
  try {
    var hace8h=new Date(Date.now()-8*60*60*1000).toISOString();
    var r=await fetch(SU+"/rest/v1/pedidos?restaurante_id=eq."+restId+
      "&domiciliario_id=eq."+domi.id+"&estado=eq.entregado&created_at=gte."+hace8h+
      "&order=created_at.desc&limit=15&select=numero_pedido,total,direccion,created_at",{
      headers:{"apikey":SK,"Authorization":"Bearer "+SK}
    });
    var data=await r.json();
    historial=data||[];
    renderHistorial();
  }catch(e){}
}
function renderHistorial(){
  var el=document.getElementById("histList");
  if(!historial.length){el.innerHTML='<div style="padding:16px;text-align:center;font-size:13px;color:var(--text3)">Sin entregas aún hoy</div>';return;}
  el.innerHTML=historial.map(function(p){
    var ts=p.ts||new Date(p.created_at).toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
    return '<div class="hist-item">'
      +'<div class="hist-num">#'+(p.numero_pedido||"?")+'</div>'
      +'<div class="hist-info"><div class="hist-dir">'+esc(formatDir(p.direccion))+'</div><div class="hist-sub">'+ts+'</div></div>'
      +'<div class="hist-total">$'+Number(p.total||0).toLocaleString("es-CO")+'</div>'
      +'</div>';
  }).join("");
}

// ── LUZ VOICE ────────────────────────────────────────────────────
async function luzDecir(texto){
  luzBarUpdate(texto);
  try {
    if(luzAudioPlaying)return;
    var cacheKey=texto.substring(0,60);
    var audioUrl;
    if(luzAudioCache[cacheKey]){audioUrl=luzAudioCache[cacheKey];}
    else {
      var resp=await fetch("/api/luz-voz",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({texto:texto}),signal:AbortSignal.timeout(8000)});
      if(!resp.ok)throw new Error("HTTP "+resp.status);
      var blob=await resp.blob();
      audioUrl=URL.createObjectURL(blob);
      luzAudioCache[cacheKey]=audioUrl;
      var keys=Object.keys(luzAudioCache);
      if(keys.length>20)delete luzAudioCache[keys[0]];
    }
    var audio=new Audio(audioUrl);
    luzAudioPlaying=true;
    var wave=document.getElementById("luzWave");
    if(wave)wave.classList.add("on");
    audio.onended=function(){luzAudioPlaying=false;if(wave)wave.classList.remove("on");};
    audio.onerror=function(){luzAudioPlaying=false;if(wave)wave.classList.remove("on");};
    audio.play().catch(function(){luzAudioPlaying=false;});
  }catch(e){luzDecirWebSpeech(texto);}
}
function luzDecirWebSpeech(texto){
  if(!window.speechSynthesis)return;
  var limpio=texto.replace(/[⭐🎁🍔🛵💳📱⚠️✅❌🔥💰👋🌟📝💜🤖•]/g,"").replace(/\s+/g," ").trim();
  if(!limpio)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(limpio.substring(0,150));
  u.lang="es-CO";u.rate=1.05;u.pitch=1.1;u.volume=1;
  var voices=window.speechSynthesis.getVoices();
  var voz=voices.find(function(v){return v.lang.startsWith("es");});
  if(voz)u.voice=voz;
  var wave=document.getElementById("luzWave");
  if(wave){wave.classList.add("on");u.onend=function(){wave.classList.remove("on");};}
  window.speechSynthesis.speak(u);
}
function luzBarUpdate(txt){
  var el=document.getElementById("luzBarTxt");
  if(el){el.style.opacity="0";setTimeout(function(){el.textContent=txt;el.style.opacity="1";},200);}
}

// ── HELPERS ──────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function formatDir(d){if(!d)return"Sin dirección";return d.length>60?d.substring(0,60)+"...":d;}
function toast(msg){
  var t=document.getElementById("toast");if(!t)return;
  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},3000);
}

// Mensajes rotativos de Luz cuando no hay pedido
var luzMsgs=["Monitoreando pedidos en tiempo real 🛵","Todo tranquilo por ahora. Listo para la próxima entrega.","Aquí estoy, no te preocupes. Te aviso cuando llegue algo."];
var luzMsgIdx=0;
setInterval(function(){
  if(!pedidoActivo){
    luzBarUpdate(luzMsgs[luzMsgIdx%luzMsgs.length]);
    luzMsgIdx++;
  }
},12000);
</script>
