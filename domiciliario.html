<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LUZ IA · Domiciliario</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08070f;
  --p:#9b6dff;--p2:#c4a1ff;--pd:#4a1fa8;
  --g:#00e5a0;--gd:#008c5a;
  --o:#ff8533;--r:#ff4070;--y:#ffd060;
  --text:#fff;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.25);
  --glass:rgba(255,255,255,0.06);--gb:rgba(255,255,255,0.10);
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow-x:hidden}

/* Mesh background */
.mesh{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 60% at 20% -10%,rgba(74,31,168,0.5),transparent 55%),
             radial-gradient(ellipse 50% 50% at 85% 90%,rgba(255,133,51,0.2),transparent 50%),
             #08070f;}
.grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
body>*:not(.mesh):not(.grain){position:relative;z-index:2}

/* ── LOGIN ── */
#loginPage{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:32px 24px;
}
.login-card{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:0}

/* Robot avatar */
.av-ring{
  width:100px;height:100px;border-radius:30px;overflow:hidden;
  border:2px solid rgba(155,109,255,0.4);
  box-shadow:0 0 0 8px rgba(155,109,255,0.08),0 0 40px rgba(155,109,255,0.3),0 16px 48px rgba(0,0,0,0.5);
  background:linear-gradient(135deg,var(--pd),var(--p));
  margin-bottom:20px;flex-shrink:0;
}
.av-ring img{width:100%;height:100%;object-fit:cover;object-position:center top}
.login-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.02em;text-align:center;margin-bottom:4px}
.login-title span{background:linear-gradient(135deg,var(--p2),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:12px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;text-align:center;margin-bottom:32px}

.inp-wrap{width:100%;position:relative;margin-bottom:12px}
.inp-wrap label{display:block;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.inp{
  width:100%;padding:15px 18px;border-radius:18px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);
  color:var(--text);font-size:16px;font-family:'Outfit',sans-serif;font-weight:600;
  outline:none;transition:all .2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);
}
.inp:focus{border-color:rgba(155,109,255,0.45);background:rgba(155,109,255,0.07);box-shadow:0 0 0 3px rgba(155,109,255,0.12),inset 0 1px 0 rgba(255,255,255,0.06)}
.inp::placeholder{color:rgba(255,255,255,0.2)}

.btn-enter{
  width:100%;padding:17px;border-radius:18px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:#fff;
  background:linear-gradient(135deg,var(--p),var(--pd));
  box-shadow:0 8px 32px rgba(155,109,255,0.4),0 2px 8px rgba(0,0,0,0.4);
  transition:transform .14s,filter .14s;
  position:relative;overflow:hidden;margin-top:4px;
}
.btn-enter::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.15),transparent);pointer-events:none}
.btn-enter:active{transform:scale(.94);filter:brightness(.85)}
.login-err{font-size:12px;color:rgba(255,100,130,0.9);text-align:center;margin-top:8px;min-height:16px}

/* ── APP ── */
#app{display:none;padding-bottom:32px}

/* Sticky header */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(8,7,15,0.75);
  border-bottom:1px solid var(--gb);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}
.hdr-main{display:flex;align-items:center;gap:12px;padding:10px 16px}
.hdr-av{width:40px;height:40px;border-radius:14px;overflow:hidden;flex-shrink:0;
  border:1.5px solid rgba(155,109,255,0.35);
  box-shadow:0 0 16px rgba(155,109,255,0.25);}
.hdr-av img{width:100%;height:100%;object-fit:cover;object-position:center top}
.hdr-info{flex:1;min-width:0}
.hdr-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;line-height:1.2}
.hdr-status{display:flex;align-items:center;gap:5px;margin-top:2px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--g);box-shadow:0 0 6px var(--g);animation:sdotP 2s ease infinite}
@keyframes sdotP{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-st-txt{font-size:10px;color:var(--text3);letter-spacing:.04em}
.hdr-earn{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--g)}

/* Luz bar */
.luzbar{display:flex;align-items:center;gap:10px;padding:7px 16px;border-top:1px solid rgba(155,109,255,0.1);background:rgba(155,109,255,0.04)}
.luzbar-av{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;font-size:11px;box-shadow:0 0 8px rgba(155,109,255,0.4)}
.luz-txt{font-size:11px;color:rgba(196,161,255,0.7);font-style:italic;flex:1;transition:all .3s}
.wave{display:flex;gap:2.5px;align-items:center;height:14px;opacity:0;transition:opacity .2s}
.wave.on{opacity:1}
.wv{width:2.5px;border-radius:2px;background:var(--p2)}
.wv:nth-child(1){height:3px;animation:wva .8s ease 0s infinite}
.wv:nth-child(2){height:9px;animation:wva .8s ease .1s infinite}
.wv:nth-child(3){height:14px;animation:wva .8s ease .2s infinite}
.wv:nth-child(4){height:9px;animation:wva .8s ease .3s infinite}
.wv:nth-child(5){height:3px;animation:wva .8s ease .4s infinite}
@keyframes wva{0%,100%{transform:scaleY(.35);opacity:.4}50%{transform:scaleY(1);opacity:1}}

/* Stats strip */
.stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--gb);border-bottom:1px solid var(--gb)}
.stat-c{display:flex;flex-direction:column;align-items:center;padding:12px 8px;text-align:center}
.stat-c+.stat-c{border-left:1px solid var(--gb)}
.stat-v{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-top:3px;font-weight:700}

/* Content area */
.content{padding:14px}

/* Sin pedido card */
.sin-ped{
  display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 24px;
  text-align:center;
  border-radius:24px;background:var(--glass);border:1px solid var(--gb);
  backdrop-filter:blur(20px);
}
.sin-ped-av{width:72px;height:72px;border-radius:22px;overflow:hidden;
  border:2px solid rgba(155,109,255,0.3);box-shadow:0 0 24px rgba(155,109,255,0.2);}
.sin-ped-av img{width:100%;height:100%;object-fit:cover;object-position:center top}
.sin-ped-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text2)}
.sin-ped-sub{font-size:14px;color:var(--text3);line-height:1.6}

/* Pedido card */
@keyframes pdIn{from{transform:translateY(20px) scale(.97);opacity:0}to{transform:none;opacity:1}}
.ped-card{
  border-radius:24px;overflow:hidden;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08);
  animation:pdIn .4s cubic-bezier(.22,.68,0,1.2) both;
  margin-bottom:12px;
}
.ped-gbar{height:4px}
.ped-gbar.listo{background:linear-gradient(90deg,var(--g),rgba(0,229,160,0))}
.ped-gbar.camino{background:linear-gradient(90deg,var(--p),rgba(155,109,255,0))}

/* Head */
.ped-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.07)}
.ped-head-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,#fff,rgba(255,255,255,0.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ped-est{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;border:1px solid}
.est-listo{background:rgba(0,229,160,0.12);color:var(--g);border-color:rgba(0,229,160,0.3)}
.est-camino{background:rgba(155,109,255,0.12);color:var(--p2);border-color:rgba(155,109,255,0.3)}

/* Body */
.ped-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.ped-row{display:flex;align-items:flex-start;gap:12px}
.ped-row-ico{font-size:20px;flex-shrink:0;line-height:1.3;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.ped-row-info{flex:1;min-width:0}
.ped-row-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.ped-row-val{font-size:15px;font-weight:700;line-height:1.4}
.ped-items-str{font-size:14px;color:var(--text2);line-height:1.5}
.ped-notas{padding:12px 14px;border-radius:16px;background:rgba(255,64,112,0.07);border:1px solid rgba(255,64,112,0.2);border-left:4px solid var(--r)}
.ped-notas-lbl{font-size:10px;font-weight:800;color:#ff8fa3;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.ped-notas-txt{font-size:14px;font-weight:700;color:#ffb3c4;line-height:1.4;white-space:pre-wrap;word-break:break-word}
.ped-total-row{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07)}
.ped-total{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--g)}
.ped-pago{font-size:13px;color:var(--text3);font-weight:600}

/* Mapa */
.mapa-wrap{border-radius:20px;overflow:hidden;border:1px solid var(--gb);margin-bottom:12px;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
#domiMapa{height:180px}
.leaflet-container{background:#0d0c1a!important}

/* Acciones */
.acciones{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.btn-prim{
  width:100%;padding:18px;border-radius:20px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:#fff;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .14s,filter .14s;
  position:relative;overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,0.4);
}
.btn-prim::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.15),transparent);pointer-events:none;border-radius:inherit}
.btn-prim:active{transform:scale(.93);filter:brightness(.82)}
.btn-salir{background:linear-gradient(135deg,var(--p),var(--pd));box-shadow:0 8px 32px rgba(155,109,255,0.45),0 2px 8px rgba(0,0,0,0.4)}
.btn-entregar{background:linear-gradient(135deg,var(--g),var(--gd));box-shadow:0 8px 32px rgba(0,229,160,0.35),0 2px 8px rgba(0,0,0,0.4)}
.btn-camino-info{width:100%;padding:14px;border-radius:18px;text-align:center;font-size:14px;font-weight:700;
  border:1px solid rgba(155,109,255,0.25);background:rgba(155,109,255,0.08);color:var(--p2)}

.btns-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-sec{
  padding:15px;border-radius:18px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:#fff;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .14s,filter .14s;
  background:var(--glass);border:1px solid var(--gb);
  backdrop-filter:blur(12px);
}
.btn-sec:active{transform:scale(.93)}
.btn-nav{background:rgba(61,155,255,0.15);border-color:rgba(61,155,255,0.25);color:#90caff}
.btn-call{background:rgba(0,229,160,0.12);border-color:rgba(0,229,160,0.22);color:var(--g)}
.btn-foto{background:rgba(255,208,96,0.1);border-color:rgba(255,208,96,0.2);color:var(--y)}

/* Historial */
.sect-title{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin:16px 0 10px;padding:0 2px}
.hist-item{
  display:flex;align-items:center;gap:12px;padding:13px 14px;
  border-radius:16px;background:var(--glass);border:1px solid var(--gb);
  margin-bottom:8px;
  backdrop-filter:blur(12px);
}
.hist-num{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--p2);width:42px;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-dir{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-ts{font-size:11px;color:var(--text3);margin-top:2px}
.hist-total{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--g);flex-shrink:0}

/* TOAST */
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:500;
  padding:12px 22px;border-radius:20px;font-size:14px;font-weight:700;
  background:rgba(20,18,32,0.97);border:1px solid rgba(255,255,255,0.12);
  color:var(--text);box-shadow:0 12px 40px rgba(0,0,0,0.6);
  backdrop-filter:blur(24px);opacity:0;transition:all .3s;pointer-events:none;
  white-space:nowrap;max-width:90vw;text-align:center;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(60px)}

/* FOTO MODAL */
#fotoModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px}
#fotoModal.show{display:flex}
#fotoPreview{display:none;width:100%;max-width:380px;max-height:44vh;object-fit:cover;border-radius:20px;border:2px solid var(--g);box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.foto-txt{font-size:14px;color:var(--text2);text-align:center;line-height:1.5}
.foto-btns{display:flex;gap:10px;width:100%;max-width:380px}
.foto-btn{flex:1;padding:15px;border-radius:18px;border:none;font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;cursor:pointer;color:#fff}
.foto-take{background:linear-gradient(135deg,var(--o),#c45a00);box-shadow:0 6px 20px rgba(255,133,51,0.35)}
.foto-send{background:linear-gradient(135deg,var(--g),var(--gd));box-shadow:0 6px 20px rgba(0,229,160,0.3)}
.foto-cancel{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--text2)}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="grain"></div>

<!-- ═══ LOGIN ═══ -->
<div id="loginPage">
  <div class="login-card">
    <div class="av-ring">
      <img src="https://vbxuwzcfzfjwhllkppkg.supabase.co/storage/v1/object/public/media/luz-avatar.jpg" onerror="this.style.display='none'">
    </div>
    <h1 class="login-title">LUZ <span>IA</span></h1>
    <p class="login-sub">Panel Domiciliario</p>

    <div class="inp-wrap">
      <label>Tu nombre</label>
      <input class="inp" id="loginNombre" type="text" placeholder="Escribe tu nombre..." autocapitalize="words">
    </div>
    <input type="hidden" id="loginRestId" value="2cc8adc0-068b-4cc5-b880-5239346539ef">
    <button class="btn-enter" onclick="iniciarSesion()">Entrar →</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <div class="hdr">
    <div class="hdr-main">
      <div class="hdr-av">
        <img src="https://vbxuwzcfzfjwhllkppkg.supabase.co/storage/v1/object/public/media/luz-avatar.jpg" onerror="this.style.display='none'">
      </div>
      <div class="hdr-info">
        <div class="hdr-name" id="domiNombre">Cargando...</div>
        <div class="hdr-status">
          <div class="sdot"></div>
          <span class="hdr-st-txt">En línea · La Curva</span>
        </div>
      </div>
      <div class="hdr-earn" id="hdrEarn">$0</div>
    </div>
    <div class="luzbar">
      <div class="luzbar-av">🤖</div>
      <div class="luz-txt" id="luzBarTxt">Hola! Monitoreando tus pedidos.</div>
      <div class="wave" id="luzWave">
        <div class="wv"></div><div class="wv"></div><div class="wv"></div><div class="wv"></div><div class="wv"></div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-c"><span class="stat-v" id="stEntregas" style="color:var(--g)">0</span><span class="stat-l">Entregas</span></div>
    <div class="stat-c"><span class="stat-v" id="stGanancias" style="color:var(--y)">$0</span><span class="stat-l">Ganancias</span></div>
    <div class="stat-c"><span class="stat-v" id="stProm" style="color:var(--p2)">—</span><span class="stat-l">Prom min</span></div>
  </div>

  <div class="content">
    <div id="pedSection">
      <div class="sin-ped">
        <div class="sin-ped-av"><img src="https://vbxuwzcfzfjwhllkppkg.supabase.co/storage/v1/object/public/media/luz-avatar.jpg" onerror="this.style.display='none'"></div>
        <p class="sin-ped-title">Sin pedido activo</p>
        <p class="sin-ped-sub">Luz te avisará cuando<br>llegue tu próximo pedido 🛵</p>
      </div>
    </div>
    <p class="sect-title">Entregas de hoy</p>
    <div id="histList"><p style="font-size:13px;color:var(--text3);text-align:center;padding:16px">Sin entregas aún</p></div>
  </div>
</div>

<!-- FOTO MODAL -->
<div id="fotoModal">
  <p class="foto-txt">📸 Toma una foto como evidencia de la entrega</p>
  <img id="fotoPreview">
  <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none">
  <div class="foto-btns">
    <button class="foto-btn foto-take" onclick="document.getElementById('fotoInput').click()">📷 Tomar</button>
    <button class="foto-btn foto-send" id="fotoSendBtn" style="display:none" onclick="enviarFoto()">✅ Enviar</button>
    <button class="foto-btn foto-cancel" onclick="cerrarFoto()">✕ Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var REST_ID="2cc8adc0-068b-4cc5-b880-5239346539ef";
var domi=null,restId=REST_ID,pedActivo=null;
var pollTimer=null,mapaInst=null,mapaMarker=null,posActual=null;
var historial=[],ganancias=0,tiempos=[],fotoBase64=null;
var luzBusy=false,luzCache={};

// Auto-login
try{var sn=localStorage.getItem("domi_nombre");if(sn)document.getElementById("loginNombre").value=sn;}catch(e){}

async function iniciarSesion(){
  var nombre=document.getElementById("loginNombre").value.trim();
  var rid=document.getElementById("loginRestId").value.trim();
  var err=document.getElementById("loginErr");
  if(nombre.length<2){err.textContent="Ingresa tu nombre";return;}
  err.textContent="Verificando...";err.style.color="rgba(196,161,255,0.7)";
  try{
    var r=await fetch("/api/domi-login?restaurante_id="+encodeURIComponent(rid)+"&nombre="+encodeURIComponent(nombre));
    var data=await r.json();
    if(!data||!data.length){err.textContent="'"+nombre+"' no encontrado. Habla con el restaurante.";err.style.color="rgba(255,100,130,0.9)";return;}
    domi=data[0];restId=rid;
    try{localStorage.setItem("domi_nombre",nombre);localStorage.setItem("domi_rest",rid);}catch(e){}
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("domiNombre").textContent=domi.nombre||nombre;
    iniciarApp();
  }catch(e){err.textContent="Error: "+e.message;err.style.color="rgba(255,100,130,0.9)";}
}

function iniciarApp(){
  cargarPedidoActivo();cargarHistorial();cargarStats();
  pollTimer=setInterval(function(){cargarPedidoActivo();cargarStats();},5000);
  iniciarGPS();
  setTimeout(function(){luzDecir("Hola "+domi.nombre.split(" ")[0]+"! Listo para tu próxima entrega.");},1500);
}

function iniciarGPS(){
  if(!navigator.geolocation)return;
  setInterval(function(){
    if(!pedActivo||!domi)return;
    navigator.geolocation.getCurrentPosition(function(pos){
      posActual=[pos.coords.latitude,pos.coords.longitude];
      fetch("/api/domi-ubicacion",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({domiciliario_id:domi.id,lat:pos.coords.latitude,lng:pos.coords.longitude,restaurante_id:restId})}).catch(function(){});
      if(mapaInst&&mapaMarker)mapaMarker.setLatLng(posActual);
    },null,{enableHighAccuracy:true,timeout:8000});
  },15000);
}

var pedAnteriorId=null;
async function cargarPedidoActivo(){
  try{
    var r=await fetch("/api/domi-pedido-activo?restaurante_id="+restId+"&domiciliario_id="+encodeURIComponent(domi.id));
    var ped=await r.json();
    if(ped&&(!pedAnteriorId||ped.id!==pedAnteriorId)){
      pedAnteriorId=ped.id;pedActivo=ped;renderPedido(ped);
      luzDecir("Nuevo pedido número "+ped.numero_pedido+"! "+formatDir(ped.direccion));
    }else if(!ped&&pedAnteriorId){pedAnteriorId=null;pedActivo=null;renderSinPedido();}
    else if(ped){pedActivo=ped;renderPedido(ped);}
  }catch(e){}
}

function renderSinPedido(){
  document.getElementById("pedSection").innerHTML=`
    <div class="sin-ped">
      <div class="sin-ped-av"><img src="https://vbxuwzcfzfjwhllkppkg.supabase.co/storage/v1/object/public/media/luz-avatar.jpg" onerror="this.style.display='none'"></div>
      <p class="sin-ped-title">Sin pedido activo</p>
      <p class="sin-ped-sub">Luz te avisará cuando llegue<br>tu próximo pedido 🛵</p>
    </div>`;
}

function renderPedido(p){
  var items=[];try{items=Array.isArray(p.items)?p.items:JSON.parse(p.items||"[]");}catch(e){}
  var itemsStr=items.map(function(i){var n=typeof i==="string"?i.replace(/^\d+[xX×]\s*/,"").replace(/\s*\$[\d.,]+\s*$/,""):(i.nombre||"");return n.trim();}).filter(Boolean).join(" · ")||"Sin items";
  var notas=(p.notas_especiales||"").trim();
  var pago={efectivo:"💵 Efectivo",nequi:"📱 Nequi",bancolombia:"🏦 Bancolombia",datafono:"💳 Datáfono"}[p.metodo_pago]||p.metodo_pago||"";
  var estLabel=p.estado==="en_camino"?"🛵 En camino":"✅ Listo";
  var estCls=p.estado==="en_camino"?"est-camino":"est-listo";
  var gbarCls=p.estado==="en_camino"?"camino":"listo";

  document.getElementById("pedSection").innerHTML=`
    <div class="ped-card">
      <div class="ped-gbar ${gbarCls}"></div>
      <div class="ped-head">
        <div class="ped-head-num">#${p.numero_pedido}</div>
        <div class="ped-est ${estCls}">${estLabel}</div>
      </div>
      <div class="ped-body">
        <div class="ped-row">
          <div class="ped-row-ico">📍</div>
          <div class="ped-row-info">
            <div class="ped-row-lbl">Dirección</div>
            <div class="ped-row-val">${esc(formatDir(p.direccion))}</div>
          </div>
        </div>
        <div class="ped-row">
          <div class="ped-row-ico">📦</div>
          <div class="ped-row-info">
            <div class="ped-row-lbl">Pedido</div>
            <div class="ped-items-str">${esc(itemsStr)}</div>
          </div>
        </div>
        ${notas?`<div class="ped-notas"><div class="ped-notas-lbl">⚠️ Notas</div><div class="ped-notas-txt">${esc(notas)}</div></div>`:""}
        <div class="ped-row">
          <div class="ped-row-ico">👤</div>
          <div class="ped-row-info">
            <div class="ped-row-lbl">Cliente</div>
            <div class="ped-row-val">${esc(p.cliente_tel||"")}</div>
          </div>
        </div>
        <div class="ped-total-row">
          <div class="ped-total">$${Number(p.total||0).toLocaleString("es-CO")}</div>
          <div class="ped-pago">${esc(pago)}</div>
        </div>
      </div>
    </div>
    <div class="mapa-wrap"><div id="domiMapa"></div></div>
    <div class="acciones">
      ${p.estado==="listo"
        ?`<button class="btn-prim btn-salir" onclick="marcarEnCamino()">🛵 SALIR A DOMICILIO</button>`
        :`<div class="btn-camino-info">🛵 En camino al cliente...</div>`}
      <div class="btns-row">
        <button class="btn-sec btn-nav" onclick="navegar()">🗺️ Navegar</button>
        <button class="btn-sec btn-call" onclick="llamarCliente()">📞 Llamar</button>
      </div>
      <button class="btn-sec btn-foto" style="width:100%;padding:14px" onclick="abrirFoto()">📷 Foto de entrega</button>
      <button class="btn-prim btn-entregar" onclick="marcarEntregado()">✅ CONFIRMAR ENTREGA</button>
    </div>`;

  setTimeout(function(){iniciarMapa(p);},300);
}

function iniciarMapa(p){
  var el=document.getElementById("domiMapa");if(!el)return;
  if(mapaInst){mapaInst.remove();mapaInst=null;mapaMarker=null;}
  mapaInst=L.map("domiMapa",{zoomControl:false,attributionControl:false}).setView([3.4516,-76.5320],13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(mapaInst);
  if(p.lat_destino&&p.lng_destino){
    var di=L.divIcon({html:'<div style="width:28px;height:28px;background:#ff4070;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 10px rgba(255,64,112,0.5)"></div>',className:"",iconSize:[28,28],iconAnchor:[14,28]});
    L.marker([p.lat_destino,p.lng_destino],{icon:di}).addTo(mapaInst).bindPopup('<b>📍 '+formatDir(p.direccion)+'</b>').openPopup();
    mapaInst.setView([p.lat_destino,p.lng_destino],15);
  }
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      posActual=[pos.coords.latitude,pos.coords.longitude];
      var mi=L.divIcon({html:'<div style="width:36px;height:36px;background:#9b6dff;border-radius:50%;border:3px solid white;box-shadow:0 2px 12px rgba(155,109,255,0.6);display:flex;align-items:center;justify-content:center;font-size:17px">🛵</div>',className:"",iconSize:[36,36],iconAnchor:[18,18]});
      mapaMarker=L.marker(posActual,{icon:mi}).addTo(mapaInst);
      if(p.lat_destino&&p.lng_destino){
        L.polyline([posActual,[p.lat_destino,p.lng_destino]],{color:"#9b6dff",weight:3.5,opacity:.75,dashArray:"10 8"}).addTo(mapaInst);
        var bounds=L.latLngBounds([posActual,[p.lat_destino,p.lng_destino]]);
        mapaInst.fitBounds(bounds,{padding:[28,28]});
        var dist=(mapaInst.distance(posActual,[p.lat_destino,p.lng_destino])/1000).toFixed(1);
        luzBarUpdate("Destino a "+dist+"km · ~"+Math.ceil(dist/0.3)+" min en moto");
      }else{mapaInst.setView(posActual,15);}
    },null,{enableHighAccuracy:true,timeout:8000});
  }
}

async function marcarEnCamino(){
  if(!pedActivo)return;
  try{
    await fetch("/api/pedido-estado",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id:pedActivo.id,estado:"en_camino",telefono_cliente:pedActivo.cliente_tel,numero_pedido:pedActivo.numero_pedido,restaurante_id:restId})});
    pedActivo.estado="en_camino";renderPedido(pedActivo);
    luzDecir("¡En camino! Pedido "+pedActivo.numero_pedido+". Cliente notificado.");
    toast("🛵 ¡En camino! Cliente notificado");
  }catch(e){toast("Error al actualizar");}
}

function navegar(){
  if(!pedActivo)return;
  if(pedActivo.lat_destino&&pedActivo.lng_destino)window.open("https://www.google.com/maps/dir/?api=1&destination="+pedActivo.lat_destino+","+pedActivo.lng_destino,"_blank");
  else if(pedActivo.direccion)window.open("https://www.google.com/maps/search/"+encodeURIComponent(pedActivo.direccion),"_blank");
}
function llamarCliente(){if(!pedActivo||!pedActivo.cliente_tel)return;window.location.href="tel:+57"+pedActivo.cliente_tel.replace(/[^0-9]/g,"");}

async function marcarEntregado(){
  if(!pedActivo){toast("No hay pedido activo");return;}
  try{
    await fetch("/api/pedido-estado",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id:pedActivo.id,estado:"entregado",telefono_cliente:pedActivo.cliente_tel,numero_pedido:pedActivo.numero_pedido,restaurante_id:restId})});
    var mins=Math.floor((Date.now()-new Date(pedActivo.created_at))/60000);tiempos.push(mins);
    historial.unshift({num:pedActivo.numero_pedido,dir:formatDir(pedActivo.direccion),total:pedActivo.total,ts:new Date().toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"})});
    ganancias+=Number(pedActivo.total||0)*0.08;
    var n=pedActivo.numero_pedido;pedActivo=null;pedAnteriorId=null;
    renderSinPedido();actualizarStats();renderHistorial();
    toast("✅ Entrega #"+n+" confirmada");
    luzDecir("¡Excelente! Entrega "+n+" completada.");
  }catch(e){toast("Error al confirmar");}
}

async function cargarStats(){
  try{var r=await fetch("/api/domi-stats?domiciliario_id="+domi.id+"&restaurante_id="+restId);var d=await r.json();if(d.ok){document.getElementById("stEntregas").textContent=d.entregas_hoy||0;document.getElementById("stProm").textContent=d.tiempo_promedio?Math.round(d.tiempo_promedio)+"m":"—";}}catch(e){}
}
function actualizarStats(){
  document.getElementById("stEntregas").textContent=historial.length;
  document.getElementById("stGanancias").textContent="$"+Math.round(ganancias).toLocaleString("es-CO");
  document.getElementById("hdrEarn").textContent="$"+Math.round(ganancias).toLocaleString("es-CO");
  if(tiempos.length){var avg=Math.round(tiempos.reduce(function(a,b){return a+b;},0)/tiempos.length);document.getElementById("stProm").textContent=avg+"m";}
}
async function cargarHistorial(){
  try{var r=await fetch("/api/domi-historial?restaurante_id="+restId+"&domiciliario_id="+encodeURIComponent(domi.id));var data=await r.json();historial=data||[];renderHistorial();}catch(e){}
}
function renderHistorial(){
  var el=document.getElementById("histList");
  if(!historial.length){el.innerHTML='<p style="font-size:13px;color:var(--text3);text-align:center;padding:16px">Sin entregas aún hoy</p>';return;}
  el.innerHTML=historial.slice(0,12).map(function(p){
    var ts=p.ts||new Date(p.created_at).toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
    return '<div class="hist-item"><div class="hist-num">#'+(p.numero_pedido||"?")+'</div><div class="hist-info"><div class="hist-dir">'+esc(formatDir(p.direccion))+'</div><div class="hist-ts">'+ts+'</div></div><div class="hist-total">$'+Number(p.total||0).toLocaleString("es-CO")+'</div></div>';
  }).join("");
}

// Foto
function abrirFoto(){document.getElementById("fotoModal").classList.add("show");}
function cerrarFoto(){document.getElementById("fotoModal").classList.remove("show");fotoBase64=null;document.getElementById("fotoPreview").style.display="none";document.getElementById("fotoSendBtn").style.display="none";}
document.getElementById("fotoInput").addEventListener("change",function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();reader.onload=function(ev){fotoBase64=ev.target.result;var p=document.getElementById("fotoPreview");p.src=fotoBase64;p.style.display="block";document.getElementById("fotoSendBtn").style.display="flex";};reader.readAsDataURL(file);
});
async function enviarFoto(){
  if(!fotoBase64||!pedActivo)return;
  try{await fetch("/enviar-imagen-cliente",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({telefono:pedActivo.cliente_tel,restaurante_id:restId,imagen:fotoBase64,mime:"image/jpeg"})});cerrarFoto();toast("📷 Foto enviada al cliente");}catch(e){toast("Error enviando foto");}
}

// Luz voz
async function luzDecir(texto){
  luzBarUpdate(texto);if(luzBusy)return;luzBusy=true;
  try{
    var k=texto.substring(0,60);var url=luzCache[k];
    if(!url){var r=await fetch("/api/luz-voz",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({texto:texto}),signal:AbortSignal.timeout(8000)});if(!r.ok)throw new Error();url=URL.createObjectURL(await r.blob());luzCache[k]=url;var ks=Object.keys(luzCache);if(ks.length>20)delete luzCache[ks[0]];}
    var audio=new Audio(url);var wave=document.getElementById("luzWave");
    if(wave)wave.classList.add("on");luzBusy=true;
    audio.onended=function(){luzBusy=false;if(wave)wave.classList.remove("on");};
    audio.onerror=function(){luzBusy=false;if(wave)wave.classList.remove("on");luzWS(texto);};
    audio.play().catch(function(){luzBusy=false;luzWS(texto);});
  }catch(e){luzBusy=false;luzWS(texto);}
}
function luzWS(t){if(!window.speechSynthesis)return;var u=new SpeechSynthesisUtterance(t.substring(0,150));u.lang="es-CO";u.rate=1.05;u.pitch=1.1;u.volume=1;var vz=window.speechSynthesis.getVoices().find(function(v){return v.lang.startsWith("es");});if(vz)u.voice=vz;var w=document.getElementById("luzWave");if(w){w.classList.add("on");u.onend=function(){w.classList.remove("on");};}window.speechSynthesis.speak(u);}
function luzBarUpdate(txt){var el=document.getElementById("luzBarTxt");if(!el)return;el.style.opacity="0";setTimeout(function(){el.textContent=txt;el.style.opacity="1";},200);}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function formatDir(d){if(!d)return"Sin dirección";return d.length>55?d.substring(0,55)+"...":d;}
var toastT=null;
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");if(toastT)clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove("on");},3000);}

var luzMsgs=["Monitoreando pedidos en tiempo real 🛵","Todo tranquilo. Listo para la próxima.","Aquí estoy, te aviso cuando llegue algo."];
var luzIdx=0;setInterval(function(){if(!pedActivo){luzBarUpdate(luzMsgs[luzIdx%luzMsgs.length]);luzIdx++;}},12000);
</script>
