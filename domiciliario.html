<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>LUZ IA — Domiciliario</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a14;--bg2:#111120;--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);
  --p:#7c3aed;--p2:#a855f7;--g:#10b981;--o:#f97316;--r:#ef4444;--y:#fbbf24;
  --text:#f0eeff;--text2:rgba(240,238,255,0.6);--text3:rgba(240,238,255,0.35)
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}

/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 30% 50%,rgba(124,58,237,0.2),transparent 55%),var(--bg)}
.login-card{width:100%;max-width:340px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:24px;padding:32px 24px}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo-name{font-size:28px;font-weight:900;letter-spacing:-.01em}
.login-logo-name b{background:linear-gradient(135deg,#a855f7,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{font-size:12px;color:var(--text3);margin-top:2px;letter-spacing:.08em;text-transform:uppercase}
.l-input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;color:var(--text);font-size:15px;font-family:inherit;outline:none;margin-bottom:10px}
.l-input::placeholder{color:var(--text3)}
.l-input:focus{border-color:rgba(124,58,237,0.5);background:rgba(124,58,237,0.06)}
.l-btn{width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;border-radius:12px;color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.l-err{font-size:12px;color:#f87171;text-align:center;margin-top:8px;min-height:16px}

/* ── APP ── */
#app{display:none;padding-bottom:72px}

/* ── TOPBAR ── */
.topbar{background:rgba(10,10,20,0.95);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.tb-name{font-size:15px;font-weight:800}
.tb-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;animation:blink 2s ease infinite}
.status-dot.online{background:#10b981;box-shadow:0 0 6px #10b981}
.status-dot.offline{background:#ef4444}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── STATS STRIP ── */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,0.05);margin-bottom:1px}
.stat-cell{background:var(--bg);padding:12px 8px;text-align:center}
.stat-val{font-size:22px;font-weight:900;font-family:'Courier New',monospace}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.stat-val.g{color:#10b981}.stat-val.o{color:#f97316}.stat-val.p{color:#a855f7}.stat-val.y{color:#fbbf24}

/* ── PEDIDO ACTIVO ── */
.ped-activo{margin:12px;background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.2);border-radius:18px;overflow:hidden}
.ped-header{padding:14px 16px;background:rgba(16,185,129,0.08);border-bottom:1px solid rgba(16,185,129,0.15);display:flex;align-items:center;justify-content:space-between}
.ped-num{font-size:20px;font-weight:900;color:#6ee7b7;font-family:'Courier New',monospace}
.ped-estado{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.est-camino{background:rgba(124,58,237,0.2);color:#c4b5fd;border:1px solid rgba(124,58,237,0.3)}
.est-listo{background:rgba(16,185,129,0.2);color:#6ee7b7;border:1px solid rgba(16,185,129,0.3)}
.ped-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.ped-dir{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text)}
.ped-dir-ico{font-size:16px;flex-shrink:0;margin-top:1px}
.ped-items{font-size:12px;color:var(--text2);line-height:1.5}
.ped-total{font-size:16px;font-weight:900;color:#6ee7b7;font-family:'Courier New',monospace}
.ped-client{font-size:12px;color:var(--text3)}

/* ── MAPA ── */
.mapa-wrap{margin:12px;border-radius:16px;overflow:hidden;border:1px solid var(--border)}
#domiMapa{height:220px;background:#1a1a2e}

/* ── BOTONES ACCIÓN ── */
.acciones{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 12px 12px}
.accion-btn{padding:13px 10px;border:none;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.accion-btn:active{transform:scale(.95)}
.btn-navegar{background:linear-gradient(135deg,#2563eb,#4f46e5);color:white}
.btn-llamar{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.25);color:#6ee7b7}
.btn-entregar{background:linear-gradient(135deg,#10b981,#059669);color:white;grid-column:1/-1;padding:16px}
.btn-foto{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:#fbbf24}

/* ── FOTO ENTREGA ── */
#fotoModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
#fotoModal.show{display:flex}
#fotoPreview{width:100%;max-width:400px;border-radius:16px;border:2px solid var(--g);display:none;max-height:50vh;object-fit:cover}
.foto-btns{display:flex;gap:10px;width:100%;max-width:400px}
.foto-btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.foto-take{background:linear-gradient(135deg,#f97316,#fbbf24);color:white}
.foto-confirm{background:linear-gradient(135deg,#10b981,#059669);color:white;display:none}
.foto-cancel{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:var(--text2)}
#fotoInput{display:none}
.foto-msg{font-size:14px;color:var(--text2);text-align:center;line-height:1.5}

/* ── SIN PEDIDO ── */
.sin-pedido{margin:24px 16px;text-align:center}
.sin-pedido-ico{font-size:52px;margin-bottom:12px}
.sin-pedido-txt{font-size:16px;font-weight:700;color:var(--text2)}
.sin-pedido-sub{font-size:13px;color:var(--text3);margin-top:6px}

/* ── HISTORIAL ── */
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:12px 16px 6px}
.hist-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04)}
.hist-num{font-family:'Courier New',monospace;font-size:14px;font-weight:700;color:var(--p2);min-width:48px}
.hist-info{flex:1;min-width:0}
.hist-dir{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-time{font-size:10px;color:var(--text3);margin-top:1px}
.hist-total{font-size:13px;font-weight:800;color:var(--g);font-family:'Courier New',monospace}
.hist-foto{width:36px;height:36px;border-radius:8px;object-fit:cover;border:1px solid var(--border)}

/* ── TABS ── */
.bottom-tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,20,0.97);border-top:1px solid var(--border);display:flex;height:64px;backdrop-filter:blur(20px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;transition:color .2s}
.tab.active{color:var(--p2)}
.tab-ico{font-size:20px}

/* ── PAGES ── */
.page{display:none}.page.active{display:block}

/* ── LOADING ── */
.spinner{width:32px;height:32px;border:3px solid rgba(124,58,237,0.2);border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:44px;margin-bottom:8px">🛵</div>
      <div class="login-logo-name">LUZ <b>IA</b></div>
      <div class="login-sub">App Domiciliario</div>
    </div>
    <div id="loginRestNombreBox" style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:12px;padding:10px 14px;margin-bottom:12px;text-align:center;display:none">
      <div style="font-size:11px;color:var(--text3);margin-bottom:2px">Restaurante</div>
      <div style="font-size:14px;font-weight:700;color:#6ee7b7" id="loginRestNombreTxt">Cargando...</div>
    </div>
    <input class="l-input" id="loginDomiNombre" placeholder="Tu nombre" type="text">
    <input class="l-input" id="loginPin" placeholder="PIN (opcional)" type="password">
    <button class="l-btn" onclick="iniciarSesion()">Entrar →</button>
    <div class="l-err" id="loginErr"></div>
    <div style="font-size:11px;color:var(--text3);text-align:center;margin-top:12px">El link te lo comparte el restaurante</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <div class="tb-name" id="domiNombre">Domiciliario</div>
      <div style="font-size:11px;color:var(--text3)" id="domiRestNombre">Restaurante</div>
    </div>
    <div class="tb-status">
      <div class="status-dot online" id="statusDot"></div>
      <span id="statusTxt">En línea</span>
      <button onclick="cerrarSesion()" style="margin-left:8px;padding:4px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit">Salir</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-strip">
    <div class="stat-cell"><div class="stat-val g" id="statHoy">0</div><div class="stat-lbl">Hoy</div></div>
    <div class="stat-cell"><div class="stat-val o" id="statSemana">0</div><div class="stat-lbl">Semana</div></div>
    <div class="stat-cell"><div class="stat-val p" id="statTotal">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat-cell"><div class="stat-val y" id="statGanado">$0</div><div class="stat-lbl">Vendido</div></div>
  </div>

  <!-- PAGES -->
  <div class="page active" id="page-pedidos">
    <div id="pedidoContent"><div style="padding:40px;text-align:center"><div class="spinner"></div></div></div>
  </div>

  <div class="page" id="page-historial">
    <div class="section-title">Entregas recientes</div>
    <div id="historialContent"><div style="padding:24px;text-align:center;color:var(--text3)">Cargando...</div></div>
  </div>

  <!-- BOTTOM TABS -->
  <div class="bottom-tabs">
    <div class="tab active" id="tab-pedidos" onclick="showTab('pedidos')">
      <div class="tab-ico">🛵</div>Pedido
    </div>
    <div class="tab" id="tab-historial" onclick="showTab('historial')">
      <div class="tab-ico">📋</div>Historial
    </div>
  </div>
</div>

<!-- MODAL FOTO -->
<div id="fotoModal">
  <div class="foto-msg" id="fotoMsg">Toma una foto como comprobante de entrega</div>
  <img id="fotoPreview" src="" alt="preview">
  <div class="foto-btns">
    <button class="foto-btn foto-take" onclick="tomarFoto()" id="fotoBtnTomar">📷 Tomar foto</button>
    <button class="foto-btn foto-confirm" onclick="confirmarEntrega()" id="fotoBtnConfirm">✅ Confirmar entrega</button>
    <button class="foto-btn foto-cancel" onclick="cancelarFoto()">✕</button>
  </div>
  <input type="file" id="fotoInput" accept="image/*" capture="environment" onchange="onFotoSelected(event)">
</div>

<script>
var SESSION={restaurante_id:null,domi_id:null,domi_nombre:null};
var pedidoActivo=null;
var fotoBase64=null;
var pedidoAEntregar=null;
var mapaObj=null,mapaMarkerDomi=null,mapaMarkerDest=null;
var statsTimer=null,pedidosTimer=null;
var geoWatcher=null;
var miLat=null,miLng=null;

// Leer restaurante_id de la URL
var urlParams=new URLSearchParams(window.location.search);
var URL_REST_ID=urlParams.get("rest")||urlParams.get("restaurante_id")||null;

// ── INIT ──────────────────────────────────────────────────────────────────
// Si hay sesión guardada para este restaurante, entrar directo
var savedSession=JSON.parse(localStorage.getItem("domi_session_"+(URL_REST_ID||"x"))||"null");
if(savedSession&&savedSession.restaurante_id&&savedSession.domi_id){
  SESSION=savedSession;
  arrancarApp();
} else {
  // Mostrar nombre del restaurante en el login
  if(URL_REST_ID){
    var restBox=document.getElementById("loginRestNombreBox");
    if(restBox)restBox.style.display="block";
    fetch("/api/supabase/restaurantes?id=eq."+URL_REST_ID+"&select=nombre")
    .then(function(r){return r.json();})
    .then(function(d){
      var nomEl=document.getElementById("loginRestNombreTxt");
      if(nomEl)nomEl.textContent=(d&&d.length&&d[0].nombre)?d[0].nombre:"Restaurante";
    }).catch(function(){});
  }
}

function iniciarSesion(){
  var nombre=document.getElementById("loginDomiNombre").value.trim();
  if(!nombre){document.getElementById("loginErr").textContent="Escribe tu nombre";return;}
  if(!URL_REST_ID){document.getElementById("loginErr").textContent="Link inválido — pide el link correcto al restaurante";return;}
  SESSION={restaurante_id:URL_REST_ID,domi_id:nombre,domi_nombre:nombre};
  localStorage.setItem("domi_session_"+URL_REST_ID,JSON.stringify(SESSION));
  arrancarApp();
}

function cerrarSesion(){
  localStorage.removeItem("domi_session_"+(URL_REST_ID||SESSION.restaurante_id||"x"));
  clearInterval(statsTimer);clearInterval(pedidosTimer);
  if(geoWatcher)navigator.geolocation.clearWatch(geoWatcher);
  document.getElementById("app").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
}

function arrancarApp(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("domiNombre").textContent=SESSION.domi_nombre;
  cargarStats();
  cargarPedidoActivo();
  iniciarGPS();
  statsTimer=setInterval(cargarStats,30000);
  pedidosTimer=setInterval(cargarPedidoActivo,8000);
}

// ── STATS ─────────────────────────────────────────────────────────────────
function cargarStats(){
  fetch("/api/domi-stats?domiciliario_id="+encodeURIComponent(SESSION.domi_id)+"&restaurante_id="+SESSION.restaurante_id)
  .then(function(r){return r.json();})
  .then(function(d){
    document.getElementById("statHoy").textContent=d.hoy||0;
    document.getElementById("statSemana").textContent=d.semana||0;
    document.getElementById("statTotal").textContent=d.entregas||0;
    var g=d.total_ganado||0;
    document.getElementById("statGanado").textContent=g>999999?"$"+Math.round(g/1000000)+"M":g>999?"$"+Math.round(g/1000)+"k":"$"+g;
    // También cargar pedidos activos en historial
    if(d.pedidos_activos){renderHistorial(d.pedidos_activos);}
  }).catch(function(){});
}

// ── PEDIDO ACTIVO ─────────────────────────────────────────────────────────
function cargarPedidoActivo(){
  fetch("/api/supabase/pedidos?restaurante_id=eq."+SESSION.restaurante_id+
    "&domiciliario_id=eq."+encodeURIComponent(SESSION.domi_id)+
    "&estado=in.(en_camino,listo)&order=created_at.desc&limit=1&select=*")
  .then(function(r){return r.json();})
  .then(function(d){
    pedidoActivo=(d&&d.length)?d[0]:null;
    renderPedidoActivo();
  }).catch(function(){});
}

function renderPedidoActivo(){
  var el=document.getElementById("pedidoContent");
  if(!pedidoActivo){
    el.innerHTML='<div class="sin-pedido"><div class="sin-pedido-ico">🛵</div><div class="sin-pedido-txt">Sin pedido asignado</div><div class="sin-pedido-sub">Espera a que el restaurante te asigne un domicilio</div></div>';
    return;
  }
  var p=pedidoActivo;
  var items=Array.isArray(p.items)?p.items.join(", "):(p.items||"");
  var h='<div class="ped-activo">';
  h+='<div class="ped-header"><div class="ped-num">#'+p.numero_pedido+'</div>';
  h+='<div class="ped-estado '+(p.estado==="en_camino"?"est-camino":"est-listo")+'">'+( p.estado==="en_camino"?"🛵 En camino":"✅ Listo")+'</div></div>';
  h+='<div class="ped-body">';
  h+='<div class="ped-dir"><div class="ped-dir-ico">📍</div><div>'+escHtml(p.direccion||"Sin dirección")+'</div></div>';
  if(items)h+='<div class="ped-items">'+escHtml(items.substring(0,120))+'</div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center">';
  h+='<div class="ped-total">$'+Number(p.total||0).toLocaleString("es-CO")+'</div>';
  h+='<div class="ped-client">📱 '+escHtml(p.cliente_tel||"")+'</div></div>';
  h+='</div></div>';
  // Mapa
  h+='<div class="mapa-wrap"><div id="domiMapa"></div></div>';
  // Botones
  h+='<div class="acciones">';
  if(p.direccion){
    var dirEnc=encodeURIComponent(p.direccion);
    h+='<button class="accion-btn btn-navegar" onclick="window.open(\'https://maps.google.com/maps?q='+dirEnc+'\',\'_blank\')">🗺️ Navegar</button>';
  }
  if(p.cliente_tel){
    h+='<button class="accion-btn btn-llamar" onclick="window.open(\'tel:+57'+p.cliente_tel+'\')">📞 Llamar</button>';
  }
  h+='<button class="accion-btn btn-foto" onclick="abrirFotoModal(\''+p.id+'\')">📷 Foto entrega</button>';
  h+='<button class="accion-btn btn-entregar" onclick="abrirFotoModal(\''+p.id+'\',true)">✅ Marcar entregado</button>';
  h+='</div>';
  el.innerHTML=h;
  // Inicializar mapa
  setTimeout(function(){iniciarMapa(p);},100);
}

// ── MAPA ──────────────────────────────────────────────────────────────────
function iniciarMapa(p){
  var mapaEl=document.getElementById("domiMapa");
  if(!mapaEl)return;
  if(mapaObj){mapaObj.remove();mapaObj=null;}
  mapaObj=L.map("domiMapa",{zoomControl:false,attributionControl:false}).setView([3.4516,-76.5320],14);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(mapaObj);
  // Marcador destino si hay coords
  if(p.lat_destino&&p.lng_destino){
    mapaMarkerDest=L.circleMarker([p.lat_destino,p.lng_destino],{radius:10,fillColor:"#ef4444",color:"white",weight:2,fillOpacity:0.9}).addTo(mapaObj);
    mapaObj.setView([p.lat_destino,p.lng_destino],16);
  }
  // Marcador posición domi
  if(miLat&&miLng){
    mapaMarkerDomi=L.circleMarker([miLat,miLng],{radius:9,fillColor:"#7c3aed",color:"white",weight:2,fillOpacity:0.9}).addTo(mapaObj);
  }
}

// ── GPS ───────────────────────────────────────────────────────────────────
function iniciarGPS(){
  if(!navigator.geolocation)return;
  geoWatcher=navigator.geolocation.watchPosition(function(pos){
    miLat=pos.coords.latitude;miLng=pos.coords.longitude;
    // Actualizar marcador en mapa si existe
    if(mapaObj&&mapaMarkerDomi){mapaMarkerDomi.setLatLng([miLat,miLng]);}
    else if(mapaObj&&miLat){
      mapaMarkerDomi=L.circleMarker([miLat,miLng],{radius:9,fillColor:"#7c3aed",color:"white",weight:2,fillOpacity:0.9}).addTo(mapaObj);
    }
    // Enviar ubicación al backend
    if(pedidoActivo){
      fetch("/api/ubicacion-domiciliario",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({pedido_id:pedidoActivo.id,restaurante_id:SESSION.restaurante_id,domiciliario_id:SESSION.domi_id,lat:miLat,lng:miLng})
      }).catch(function(){});
    }
    document.getElementById("statusDot").className="status-dot online";
    document.getElementById("statusTxt").textContent="En línea";
  },function(){
    document.getElementById("statusDot").className="status-dot offline";
    document.getElementById("statusTxt").textContent="Sin GPS";
  },{enableHighAccuracy:true,maximumAge:5000});
}

// ── FOTO ENTREGA ──────────────────────────────────────────────────────────
function abrirFotoModal(pedidoId,confirmarDespues){
  pedidoAEntregar={id:pedidoId,confirmar:confirmarDespues||false};
  fotoBase64=null;
  document.getElementById("fotoPreview").style.display="none";
  document.getElementById("fotoBtnConfirm").style.display="none";
  document.getElementById("fotoBtnTomar").textContent="📷 Tomar foto";
  document.getElementById("fotoMsg").textContent=confirmarDespues?
    "Toma una foto como comprobante de entrega":"Toma una foto del paquete entregado";
  document.getElementById("fotoModal").classList.add("show");
}

function cancelarFoto(){
  document.getElementById("fotoModal").classList.remove("show");
  pedidoAEntregar=null;fotoBase64=null;
}

function tomarFoto(){
  document.getElementById("fotoInput").click();
}

function onFotoSelected(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    fotoBase64=ev.target.result;
    var preview=document.getElementById("fotoPreview");
    preview.src=fotoBase64;preview.style.display="block";
    document.getElementById("fotoBtnConfirm").style.display="block";
    document.getElementById("fotoBtnTomar").textContent="📷 Cambiar foto";
    document.getElementById("fotoMsg").textContent="Foto lista ✅";
  };
  reader.readAsDataURL(file);
  e.target.value="";
}

function confirmarEntrega(){
  if(!pedidoAEntregar)return;
  var btn=document.getElementById("fotoBtnConfirm");
  btn.disabled=true;btn.textContent="Subiendo...";
  // Subir foto si hay
  var uploadPromise=Promise.resolve(null);
  if(fotoBase64){
    uploadPromise=fetch("/api/foto-entrega",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({pedido_id:pedidoAEntregar.id,restaurante_id:SESSION.restaurante_id,imagen_base64:fotoBase64,domiciliario_id:SESSION.domi_id})
    }).then(function(r){return r.json();});
  }
  uploadPromise.then(function(){
    if(pedidoAEntregar.confirmar){
      // Cambiar estado a entregado
      return fetch("/api/supabase/pedidos?id=eq."+pedidoAEntregar.id,{method:"PATCH",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({estado:"entregado",updated_at:new Date().toISOString()})
      });
    }
  }).then(function(){
    cancelarFoto();
    pedidoActivo=null;
    renderPedidoActivo();
    cargarStats();
    mostrarToast(pedidoAEntregar.confirmar?"✅ ¡Entrega confirmada!":"📷 Foto guardada");
  }).catch(function(){
    btn.disabled=false;btn.textContent="✅ Confirmar entrega";
    mostrarToast("Error al subir. Intenta de nuevo.");
  });
}

// ── HISTORIAL ─────────────────────────────────────────────────────────────
function renderHistorial(pedidos){
  var el=document.getElementById("historialContent");
  if(!pedidos||!pedidos.length){
    el.innerHTML='<div style="padding:24px;text-align:center;color:var(--text3)">Sin entregas recientes</div>';
    return;
  }
  var h="";
  pedidos.forEach(function(p){
    var fecha=p.created_at?new Date(p.created_at).toLocaleString("es-CO",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):"";
    h+='<div class="hist-item">';
    h+='<div class="hist-num">#'+p.numero_pedido+'</div>';
    h+='<div class="hist-info"><div class="hist-dir">'+escHtml((p.direccion||"").substring(0,40))+'</div><div class="hist-time">'+fecha+'</div></div>';
    h+='<div class="hist-total">$'+Number(p.total||0).toLocaleString("es-CO")+'</div>';
    if(p.foto_entrega)h+='<img class="hist-foto" src="'+p.foto_entrega+'" alt="foto">';
    h+='</div>';
  });
  el.innerHTML=h;
}

// ── TABS ──────────────────────────────────────────────────────────────────
function showTab(name){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active");});
  document.getElementById("page-"+name).classList.add("active");
  document.getElementById("tab-"+name).classList.add("active");
  if(name==="historial")cargarStats();
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function mostrarToast(msg){
  var t=document.createElement("div");
  t.style.cssText="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#10b981;color:white;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:700;z-index:1000;animation:fadeIn .3s ease;white-space:nowrap";
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(function(){t.remove();},3000);
}
</script>
</body>
</html>
